[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnibase_core"
version = "0.46.8"
description = "ONEX Core Framework - Base classes and essential implementations"
authors = [
    {name = "OmniNode.ai", email = "contact@omninode.ai"}
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "onex",
    "framework",
    "architecture",
    "dependency-injection",
    "base-classes",
    "infrastructure",
    "event-driven",
    "error-handling",
    "node-architecture"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]
dependencies = [
    "pydantic>=2.12.5,<3.0.0",
    "pyyaml>=6.0.2,<7.0.0",
    "dependency-injector>=4.48.3,<5.0.0",
    "deepdiff>=8.0.0,<10.0.0",
    "click>=8.3.1,<9.0.0",
    "cryptography>=46.0.3,<50.0.0",
    "jsonschema>=4.25.1,<5.0.0",
    "httpx>=0.27.0,<1.0.0",
    "blake3>=1.0.8,<2.0.0",
    "ruamel-yaml>=0.18.0",
    "tree-sitter>=0.25.2,<0.27",
    "tree-sitter-python>=0.25.0,<0.26",
]

[project.urls]
Homepage = "https://github.com/OmniNode-ai/omnibase_core"
Repository = "https://github.com/OmniNode-ai/omnibase_core"
Documentation = "https://github.com/OmniNode-ai/omnibase_core/tree/main/docs"

[project.scripts]
onex = "omnibase_core.cli.cli_commands:cli"
# Backward-compatibility alias (renamed from 'omni-agent' to 'onex' in v0.3.0)
omni-agent = "omnibase_core.cli.cli_commands:cli"
# Dev/test runtime host CLI (Phase 1 MVP - LocalHandler only)
# WARNING: For development and testing ONLY, not for production use
omninode-runtime-host-dev = "omnibase_core.cli.cli_runtime_host:main"
check-local-paths = "omnibase_core.validation.validator_local_paths:main"
check-github-token-env-reads = "omnibase_core.validation.validator_github_token_env_reads:main"
# OMN-13293 (G1): the same local-paths check executed as a COMPUTE node over the
# in-memory event bus (two-transport seam; Kafka backend in CI). Proven
# equivalent to check-local-paths on the G1 corpus + 6999-file shadow-bake.
check-local-paths-compute = "omnibase_core.validation.local_paths.runtime_local_paths:main"
# OMN-13294 (G2): hardcoded private-IP (RFC1918) scanner, same COMPUTE/bus seam.
# Generated by node_generation_consumer and corpus-accepted.
check-private-ip-compute = "omnibase_core.validation.private_ip.runtime_private_ip:main"
# OMN-13497: no-faked-boundary scanner (bans hand-written fakes/stubs of the
# inference/routing/dispatch boundary), same COMPUTE/bus seam. Generated by
# node_generation_consumer and corpus-accepted. Lands report-only.
check-no-faked-boundary = "omnibase_core.validation.no_faked_boundary.runtime_no_faked_boundary:main"
# OMN-13480 (G2, SEA-dogfood): the TODO-marker scanner names its own subject tokens here.  # onex-allow-todo-marker OMN-13480 reason="describes the marker scanner; not agent-left unfinished work"
# scanner, same COMPUTE/bus seam. Generated by node_generation_consumer against the
# live model and corpus-accepted on the first attempt.
check-todo-fixme-marker-compute = "omnibase_core.validation.todo_marker.runtime_todo_marker:main"
# OMN-13509 (G2, SEA-dogfood): sibling pin-hygiene scanner (blocks off-dev-line
# omnibase-core/spi/compat git pins), same COMPUTE/bus seam. Generated by
# node_generation_consumer against the live model and corpus-accepted on the first
# attempt; git ancestry resolved at the EFFECT boundary. PR-time sibling of the
# deploy-time OMN-12977 guard.
check-pin-hygiene-compute = "omnibase_core.validation.pin_hygiene.runtime_pin_hygiene:main"
# OMN-13480 (G2 residual, SEA-dogfood): hardcoded localhost/loopback URL scanner
# (blocks http(s)://localhost / http(s)://127.0.0.1 literals — the loopback
# endpoints url-authority's public-https-literal rule excludes), same COMPUTE/bus
# seam. Generated by node_generation_consumer against the live model and
# corpus-accepted.
check-localhost-url-compute = "omnibase_core.validation.localhost_url.runtime_localhost_url:main"
# OMN-13294 (G2, SEA-dogfood): hardcoded onex.* topic-string scanner (blocks
# pasted onex.<a>.<b>.<c> topic literals that should be contract-declared), same
# COMPUTE/bus seam. Generated by node_generation_consumer against the live model
# and corpus-accepted on the first attempt.
check-hardcoded-topic-compute = "omnibase_core.validation.hardcoded_topic.runtime_hardcoded_topic:main"
# OMN-13569: doc-content COMPUTE validator (blocks local-environment traces +
# Linear ticket references in documentation), same COMPUTE/bus seam. Generated by
# node_generation_consumer against the live model and corpus-accepted on attempt 1.
# NOT yet wired as a gate — that is OMN-13572 (deferred).
check-doc-content-scan-compute = "omnibase_core.validation.doc_content_scan.runtime_doc_content_scan:main"
onex-validate-topics = "omnibase_core.validation.scripts.validate_topic_names:main"
validate-string-versions = "omnibase_core.validation.scripts.validate_string_versions:main"
onex-validate-links = "omnibase_core.scripts.validate_markdown_links:main"
onex-demo-path-topic-gate = "omnibase_core.validation.validator_demo_path_topic_coherence:main"
# OMN-13663: projection exposure⇄column drift validator. Reconciles every
# projection node contract.yaml's projection_api.exposures against the
# materialized columns of the table/view each reads from (extracted from the
# node's migration DDL). Existence drift fails the build; identity/tier/cost
# columns omitted from every exposure warn (the cost_tier_name class of bug).
check-projection-exposure-drift = "omnibase_core.validators.projection_exposure_drift:main"
# OMN-13735: FSM YAML-vs-handler drift validator. Reconciles every reducer
# contract.yaml's state_machine.transitions (filtered by fsm_handler_binding.state_filter)
# against the handler's VALID_TRANSITIONS and GUARD_CONDITIONS Python symbols via AST.
# Fails on any (from_state, trigger)->to_state or guard divergence; zero allowlist entries.
check-fsm-handler-drift = "omnibase_core.validators.fsm_handler_drift:main"

[project.entry-points."onex.backends"]
event_bus_inmemory = "omnibase_core.event_bus.event_bus_inmemory:EventBusInmemory"
state_disk = "omnibase_core.services.state.service_state_disk:ServiceStateDisk"

[project.entry-points."onex.cli"]
# Core CLI commands are registered directly via [project.scripts]
# This group is for extensions from other packages
gate = "omnibase_core.cli.cli_gate:gate"

[project.entry-points."onex.doctor"]
docker = "omnibase_core.doctor.checks.check_docker:CheckDocker"
kafka = "omnibase_core.doctor.checks.check_kafka:CheckKafka"
postgres = "omnibase_core.doctor.checks.check_postgres:CheckPostgres"
linear = "omnibase_core.doctor.checks.check_linear:CheckLinear"
repos_synced = "omnibase_core.doctor.checks.check_repos_synced:CheckReposSynced"
stale_worktrees = "omnibase_core.doctor.checks.check_stale_worktrees:CheckStaleWorktrees"
env_vars = "omnibase_core.doctor.checks.check_env_vars:CheckEnvVars"
python_version = "omnibase_core.doctor.checks.check_python_version:CheckPythonVersion"
js_runtime = "omnibase_core.doctor.checks.check_js_runtime:CheckJsRuntime"

[project.entry-points."onex.nodes"]
node_compliance_evidence_effect = "omnibase_core.nodes.node_compliance_evidence_effect"
node_compliance_orchestrator = "omnibase_core.nodes.node_compliance_orchestrator"
node_compliance_report_reducer = "omnibase_core.nodes.node_compliance_report_reducer"
node_compliance_scan_compute = "omnibase_core.nodes.node_compliance_scan_compute"
node_backend_secret_discipline_compute = "omnibase_core.nodes.node_backend_secret_discipline_compute" # pragma: allowlist secret
node_contract_resolve_compute = "omnibase_core.nodes.node_contract_resolve_compute"
node_contract_verify_replay_compute = "omnibase_core.nodes.node_contract_verify_replay_compute"

[project.optional-dependencies]
spi = ["omnibase-spi>=0.20.2"]
cli = ["psutil>=7.2.1"]
kafka = ["aiokafka>=0.12.0,<1.0.0", "confluent-kafka>=2.12.0,<3.0.0"]
cache = ["redis>=5.0.0,<9.0.0"]
metrics = ["prometheus-client>=0.21.0,<1.0.0"]
sql-parser = ["sqlglot>=26.0.0,<31.0.0"]
full = ["omnibase-spi>=0.20.2", "psutil>=7.2.1", "aiokafka>=0.12.0,<1.0.0", "confluent-kafka>=2.12.0,<3.0.0", "redis>=5.0.0,<9.0.0", "prometheus-client>=0.21.0,<1.0.0", "sqlglot>=26.0.0,<31.0.0"]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-asyncio>=1.3.0",
    "mypy>=1.19.1",
    "pyright>=1.1.408",
    "ruff>=0.14.13,<0.16.0",
    "types-pyyaml>=6.0.12.20250822",
    "pre-commit>=4.5.1",
    "types-requests>=2.32.4.20250913",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.8.0",
    "pytest-split>=0.10.0",
    "pytest-timeout>=2.4.0",
    "pytest-rerunfailures>=16.1",
    "pytest-testmon>=2.2.0",
    "interrogate>=1.7.0",
    # OMN-14216: intra-core dependency-layering oracle (import-linter + grimp)
    "import-linter>=2.13,<3.0.0",
    "hypothesis>=6.150",
    "psutil>=7.2.1",
    "confluent-kafka>=2.12.0,<3.0.0",
    "prometheus-client>=0.21.0,<1.0.0",
    "types-psutil>=7.2.1.20260116",
    "sqlglot>=26.0.0,<31.0.0",
    # Centralized governance hooks (OMN-5135)
    "onex-change-control>=0.1.0",
]

[tool.uv.sources]
onex-change-control = { git = "https://github.com/OmniNode-ai/onex_change_control.git", rev = "41054810a25db826a4c649f491a2d980bffb0c17" }  # pragma: allowlist secret  # OMN-13762: pinned to immutable SHA (was branch="main"; v0.1.0, last OCC version without omnibase-core circular dep)  # onex-allow-pin-hygiene OMN-13762

[tool.hatch.build.targets.wheel]
packages = ["src/omnibase_core"]

[tool.hatch.build]
# Include YAML contract files in the wheel for PyPI installs (OMN-6484)
# and the generated feature-flag catalog JSON (OMN-7776).
artifacts = [
    "src/omnibase_core/**/*.yaml",
    "src/omnibase_core/feature_flags/feature_flag_catalog.json",
]

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    "**/archived/**",
    "**/archive/**",
    "**/__pycache__/**",
    "**/site-packages/**",
    "tests/fixtures/validation/exports/syntax_error.py",  # Intentionally invalid for testing
]

[tool.ruff.format]
# Use black-compatible formatting (ruff format is a drop-in replacement for black)
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "N", "UP", "YTT", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T10", "EM", "EXE", "ISC", "ICN", "G", "INP", "PIE", "T20", "PT", "Q", "RSE", "RET", "SLF", "SIM", "TID", "TCH", "ARG", "PTH", "ERA", "PD", "PGH", "PL", "TRY", "NPY", "RUF"]
ignore = [
    "S101",      # Allow assert statements in tests
    "E501",      # Line too long (technical debt - will fix incrementally)
    "E402",      # Module level import not at top (technical debt)
    "TC001",     # Type checking imports (technical debt)
    "TC003",     # Type checking imports (technical debt)
    "TC004",     # Type checking imports in __all__ re-exports (technical debt)
    "TC006",     # Quotes in typing.cast() (technical debt - runtime micro-optimization)
    "UP046",     # Use PEP 695 type parameters instead of Generic[T] (technical debt - requires Python 3.12+)
    "PLR0911",   # Too many returns (technical debt)
    "PLR0912",   # Too many branches (technical debt)
    "PLR0913",   # Too many arguments (technical debt)
    "PLR0915",   # Too many statements (technical debt)
    "PLR2004",   # Magic values (technical debt)
    "FBT001",    # Boolean positional args (technical debt)
    "FBT002",    # Boolean default args (technical debt)
    "EM101",     # Exception string literal (technical debt)
    "EM102",     # Exception f-string literal (technical debt)
    "TRY003",    # Long exception messages (technical debt)
    "TRY004",    # Exception type preference (technical debt)
    "TRY300",    # Consider else block (technical debt)
    "DTZ005",    # datetime.now() without tz (technical debt)
    "B008",      # Function call in defaults (technical debt)
    "ARG003",    # Unused class method argument (technical debt)
    "ERA001",    # Commented out code (technical debt)
    "SIM102",    # Nested if statements (technical debt)
    "B007",      # Unused loop variable (technical debt)
    "PT018",     # Assertion breakdown (technical debt)
    "EXE001",    # Shebang without executable (technical debt)
    "B904",      # raise from (will fix incrementally)
    "RET505",    # Unnecessary elif (will fix incrementally)
    "COM812",    # Trailing commas (will fix incrementally)
    "C901",      # Function complexity (architectural - not fixable easily)
    "E721",      # Type comparisons (technical debt)
    "N806",      # Variable naming (technical debt)
    "TRY203",    # Redundant exception handler (technical debt)
    "RUF003",    # Comment formatting (technical debt)
    "SIM117",    # Nested with statements (technical debt)
    "SIM105",    # contextlib.suppress (technical debt)
    "PTH123",    # Path.open() (technical debt)
    "PT017",     # pytest.raises in except (technical debt)
    "F841",      # Unused variable (technical debt)
    "ARG002",    # Unused method argument (technical debt)
    # T201 removed — print statements enforced via ruff + per-file-ignores [OMN-5080]
    "FBT003",    # Boolean positional value in call (technical debt)
    "N802",      # Invalid function name (technical debt)
    "S603",      # Subprocess without shell (technical debt)
    "S607",      # Start process with partial path (technical debt)
    "PT011",     # Pytest raises too broad (technical debt)
    "SLF001",    # Private member access (technical debt)
    "DTZ001",    # Call datetime without tzinfo (technical debt)
    "ARG001",    # Unused function argument (technical debt)
    "G004",      # Logging f-string (technical debt)
    "INP001",    # Implicit namespace package (technical debt)
    "TRY301",    # Raise within try (technical debt)
    "RUF022",    # Unsorted dunder all (technical debt)
    "SIM103",    # Needless bool (technical debt)
    "S301",      # Suspicious pickle usage (technical debt)
    "B019",      # Cached instance method (technical debt)
    "PLW2901",   # Redefined loop name (technical debt)
    "B011",      # Assert false (technical debt)
    "PT015",     # Pytest assert always false (technical debt)
    "RUF005",    # Collection literal concatenation (technical debt)
    "S110",      # Try except pass (technical debt)
    "S112",      # Try except continue (technical debt)
    "SIM108",    # If else block instead of if exp (technical debt)
    "S311",      # Suspicious non-cryptographic random usage (technical debt)
    "S324",      # Hashlib insecure hash function (technical debt)
    "PLR1714",   # Repeated equality comparison (technical debt)

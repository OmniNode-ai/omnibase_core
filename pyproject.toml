    "PLR1722",   # Sys exit alias (technical debt)
    "ISC001",    # Implicit string concatenation (conflicts with formatter)
    # Intentional patterns (not technical debt)
    "PLC0415",   # Import not at top-level (intentional lazy imports for circular dep breaking)
    "PLW0603",   # Global statement (intentional caching/lazy initialization pattern)
    "PLW1641",   # Missing __hash__ (Pydantic BaseModels are intentionally unhashable)
    "DTZ901",    # datetime.min without tz (test sentinel values)
    "S106",      # Hardcoded password (test fixtures)
    "S608",      # SQL injection false positive (Dockerfile templates, not SQL)
    # Pre-existing issues revealed after noqa cleanup (technical debt)
    "F821",      # Undefined name (test fixtures using non-existent classes)
    "B010",      # setattr with constant (intentional dynamic attribute setting)
    "B027",      # Empty method without abstract decorator (intentional hooks)

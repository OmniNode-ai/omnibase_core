"src/omnibase_core/validation/scripts/validate_topic_names.py" = ["T201"]
"src/omnibase_core/validation/validator_demo_path_topic_coherence.py" = ["T201"]  # CLI output for demo-path topic coherence gate (OMN-12777)
"src/omnibase_core/validation/validator_backend_secret_discipline.py" = ["T201"]  # CLI output for backend secret-ref discipline gate (OMN-13305)
"src/omnibase_core/scripts/validate_markdown_links.py" = ["T201"]
"scripts/pin_bump.py" = ["T201"]  # CLI output for publish-downstream-pin-bump workflow [OMN-9050]
"scripts/emit_ts_types.py" = ["T201"]  # CLI output for omnidash-v2 TS type generation
"scripts/validate_deterministic_skill_routing.py" = ["T201"]  # CLI output for CI gate report
"scripts/migrate_dod_receipts.py" = ["T201"]  # CLI output for legacy DoD receipt migration [OMN-9790]
"scripts/check_release_identity.py" = ["T201"]  # CLI output for release-identity gate report [OMN-13411]
"scripts/validation/validate_no_new_env_vars.py" = ["T201"]  # CLI output for pre-commit hook report (OMN-11186)
# Test files: print() used for debug output and test diagnostics — bulk removal deferred
"tests/**/*.py" = ["T201"]

[tool.mypy]
# Strict mode enables: warn_return_any, warn_unused_configs, disallow_untyped_defs,
# disallow_incomplete_defs, check_untyped_defs, disallow_untyped_decorators,
# no_implicit_optional, warn_redundant_casts, warn_unused_ignores, strict_equality, and more
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.12"
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true

# Third-party libraries without type stubs
[[tool.mypy.overrides]]
module = "jsonpath_ng.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "sqlglot.*"
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = false
warn_required_dynamic_aliases = true
warn_untyped_fields = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "unit: Unit tests that test individual components in isolation",
    "integration: Integration tests that test multiple components together",
    "slow: Tests that take a long time to run (>1s)",
    "smoke: Quick smoke tests for basic functionality",
    "performance: Performance and benchmark tests",
    "cache: Cache-related tests",
    "nodes: Node architecture tests",
    "validation: Validation framework tests",
    "flaky: Marks tests as flaky and allows reruns (from pytest-rerunfailures)",
    "timeout: Timeout for individual tests using pytest-timeout plugin (e.g., @pytest.mark.timeout(60))"
]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--tb=short",
    "-n4",  # Limit parallel workers to prevent OOM (was: auto)
    "--timeout=60",  # Prevent hanging tests (60s per test)
    "--timeout-method=thread",  # Use thread-based timeout for better compatibility
    "--dist=loadgroup",  # Group tests by @pytest.mark.xdist_group for better control
    "--reruns=2",  # Auto-retry failed tests twice (handles flaky tests)
    "--reruns-delay=1",  # 1 second delay between reruns
]
filterwarnings = [
    # === Deprecation Warning Capture (OMN-199, Phase 7) ===
    # Display deprecation warnings during test runs so developers can address them
    # before v0.5.0 when these will become errors
    "default::DeprecationWarning",
    "default::PendingDeprecationWarning",
    # Suppress asyncio "Task was destroyed but it is pending!" warnings
    # These are expected during test cleanup when fixtures cancel pending tasks
    # The cleanup fixtures (event_loop_cleanup, cleanup_service_tasks) properly
    # cancel tasks, so these warnings are cosmetic and don't indicate real issues
    "ignore:.*Task was destroyed but it is pending.*:RuntimeWarning",
    # NOTE: "coroutine was never awaited" warnings are NOT suppressed
    # These indicate real bugs where async functions were called but never executed
    # If you encounter this warning, FIX the test by properly awaiting the coroutine
]
# Memory optimization notes:
# - Limited to 4 workers to prevent OOM on machines with 16GB RAM
# - Use --timeout to prevent hanging tests accumulating memory
# - Use --dist=loadscope to group tests by module (reduces import overhead)
# Test execution strategies:
#   Fast iteration: -n 2 --timeout=30
#   Full suite: -n 4 --timeout=60 (default)
#   CI/Large machines: -n 8 --timeout=120
#   Debug single test: -n 0 (disable xdist)
#
# Intelligent test selection with pytest-testmon:
#   Run only affected tests: uv run pytest --testmon
#   Reset testmon database: uv run pytest --testmon-noselect
#   Disable testmon: uv run pytest --testmon-off
#   Note: .testmondata file is gitignored and stores test dependencies

[tool.coverage.run]
source = ["src/omnibase_core"]
omit = [
    "*/tests/*",
    "*/archived/*",
    "*/archive/*",
    "*/__pycache__/*",
    "*/site-packages/*"
]
branch = true
parallel = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 60
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if typing.TYPE_CHECKING:",
    "@abstractmethod",
    "@abc.abstractmethod"
]

# ONEX contract for the no_db_in_orchestrator_check COMPUTE node.
# Archetype-specific layering rule: flags database-driver imports inside .py
# modules that sit in an ORCHESTRATOR node package. Keys off the archetype
# declared in each node's contract.yaml (node_type / descriptor.node_archetype)
# — it does NOT scan every file blindly, unlike the universal OMN-14659 lints.
#
# See: OMN-14694 — WS8 canary (no-db-in-orchestrator), epic OMN-2362.

name: node_no_db_in_orchestrator_check_compute
node_id: node_no_db_in_orchestrator_check_compute
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}
contract_version: {major: 1, minor: 0, patch: 0}

description: >
  Keys off each node's declared archetype (top-level node_type and descriptor.node_archetype in its contract.yaml)
  and AST-scans the .py modules co-located with an ORCHESTRATOR contract for database-driver imports (sqlite3,
  aiosqlite, psycopg, psycopg2, asyncpg, sqlalchemy). Returns an OMN-2362 ValidationReport with a per-violation
  FAIL finding — orchestrators coordinate and emit; database I/O belongs in a dedicated EFFECT node. Call
  sites carrying a # db-io-ok annotation are suppressed; unparseable contract YAML or Python yields an
  ERROR finding. Pure — no filesystem access, no clock, no global state. #magic___^_^___line
input_model: omnibase_core.models.nodes.no_db_in_orchestrator_check.model_no_db_in_orchestrator_check_input.ModelNoDbInOrchestratorCheckInput
output_model: omnibase_core.models.validation.model_validation_report.ModelValidationReport

handler_routing:
  version: {major: 1, minor: 0, patch: 0}
  default_handler: handler:NodeNoDbInOrchestratorCheckCompute

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 30000

# ONEX Mixin Capability Mapping
# Version: 1.0.0
# Purpose: Maps each mixin to its handler conversion target for the
#          mixins-to-handlers refactor (OMN-1115).
#
# Each entry specifies:
#   - handler_type_category: compute | effect | nondeterministic_compute
#   - capability_set: list of capability identifiers
#   - nondeterminism_classification: deterministic | time | random | network | external_state
#   - phase: migration phase (1 = pure compute first, 2 = stateful, 3 = I/O, 4 = orchestration)
#   - migration_priority: 1 (highest) to 5 (lowest)
#   - ordering_constraints: list of mixins that must be migrated before this one
#   - legacy_shim_required: true until proven otherwise
#   - conversion_evidence: null until shim removal is validated

mixins:

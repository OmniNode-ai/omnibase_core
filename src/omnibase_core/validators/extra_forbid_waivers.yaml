---
# Expiring waivers for the extra="forbid" ratchet (OMN-14515).
#
# THIS IS NOT AN ALLOWLIST. Every entry expires. An expired waiver is a HARD FAILURE,
# not a silent pass — that is precisely what stops this file from rotting into the
# permanent allowlist that every other enforcement surface eventually decays into.
#
# A waiver exists for exactly one reason: sanctioned, ticketed, time-boxed in-flight
# work that the gate would otherwise block (e.g. a model being graduated between repos
# across two PRs). It is NOT an escape hatch for "I did not feel like adding
# extra=forbid".
#
# Every field is REQUIRED. A missing/malformed field is a hard failure:
#
#   waivers:
#     - fqn: omnibase_core.models.registration.model_node_capabilities:ModelNodeCapabilities
#       ticket: OMN-14208            # must be a real, OPEN OMN-NNNN
#       pr: https://github.com/OmniNode-ai/omnibase_core/pull/1436   # the in-flight PR
#       expires_at: 2026-08-01       # absolute ISO date, set by the approver
#       reason: time-boxed cross-repo model graduation; consolidation lands in <PR>
#
# The fix is almost always cheaper than the waiver:
#
#   model_config = ConfigDict(extra="forbid")
#
waivers:
  - fqn: omnibase_core.models.contracts.subcontracts.model_handler_routing_entry:ModelHandlerRoutingEntry
    ticket: OMN-14771
    pr: https://github.com/OmniNode-ai/omnibase_core/pull/1468
    expires_at: 2026-09-30
    reason: >-
      S8 PR2 adds an additive optional `topic` field to this routing entry (the
      PR2<->PR3 RuntimeDispatch seam). The model deliberately keeps extra="ignore"
      to tolerate legacy handler_routing YAML fields (routing_key, handler_key,
      priority, output_events, callable, lazy_import) still carried by live
      contracts; the model docstring defers the extra="forbid" flip to a
      dedicated migration PR once all consumers carry the live shape. Flipping
      forbid here would break legacy contract loading and is out of scope for this
      additive change. Time-boxed to the coordinated migration.

---
schema_version: "1.0.0"
ticket_id: "OMN-604"
title: "FSM state mutation protection - mutate only on successful transitions"
summary: >
  Ensures MixinFSMExecution mutates _fsm_state only after execute_transition returns success=True. Guard
  rejections and raised transition errors leave current state and history untouched, while successful
  transitions commit a fresh FSMState snapshot with deep-copied context to prevent caller-side mutation
  from corrupting committed state.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Focused FSM mixin tests cover guard rejection, exceptions, success, and context isolation."
    command: "uv run pytest tests/unit/mixins/test_mixin_fsm_execution.py -q"
  - kind: "tests"
    description: "Changed FSM execution module and tests pass focused lint and type checks."
    command: "uv run ruff check src/omnibase_core/mixins/mixin_fsm_execution.py tests/unit/mixins/test_mixin_fsm_execution.py
      && uv run mypy src/omnibase_core/mixins/mixin_fsm_execution.py --strict"

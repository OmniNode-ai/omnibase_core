---
# No event-bus none-guard-before-publish gate [OMN-10818]
#
# Required status check context: "No None Guard Publish / validate"
#
# Runs unit tests for the validator then self-scans omnibase_core src/.
# Consumer repos wire this by adding the no-none-guard-publish pre-commit hook
# and a mirror of the `validate` job in their own CI.

name: No None Guard Publish

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

concurrency:
  group: no-none-guard-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run validator unit tests
        run: |
          uv run pytest tests/validation/test_validate_no_none_guard_publish.py -v

      - name: Self-scan omnibase_core src/ (report mode — baseline cleanup pending)
        run: |
          uv run python scripts/validation/validate_no_none_guard_publish.py --report

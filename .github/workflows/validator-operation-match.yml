---
# operation_match handler 'operation' field gate [OMN-13530]
#
# Required status check context: "operation_match Operation Field Validator / validate"
#
# Runs the validator unit tests, then self-scans omnibase_core/src for any
# operation_match (or absent-strategy) handler_routing entry missing 'operation'.
# A missing operation makes the contract fail closed at RuntimeLocal startup
# ('handlers[i].operation is missing') — the 0.46.0 regression that took down the
# headless automation fleet. Consumer repos wire this by adding the
# operation-match-requires-operation pre-commit hook and a mirror of the
# `validate` job in their own CI.

# MIGRATED INTO ci.yml (OMN-14877, OMN-14430 fast-follow): this workflow used to
# trigger on push/pull_request, giving it its OWN github.run_id — structurally
# invisible to ci.yml's ci-summary default-deny poller and gating nothing
# (pre-commit, if installed and not --no-verify'd, was the only enforcement).
# Its validate steps now run UNCONDITIONALLY inside ci.yml under the required
# "CI Summary" rollup, and its embedded occ-preflight caller no longer fires on
# PRs. This file is retained workflow_dispatch-only for manual/ad-hoc invocation.
#
name: operation_match Operation Field Validator

on:
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

concurrency:
  group: validator-operation-match-${{ github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  validate:
    needs: occ-preflight
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run validator unit tests
        run: |
          uv run pytest tests/unit/validators/test_operation_match_requires_operation.py -v

      - name: Self-scan omnibase_core/src
        run: |
          uv run python -m omnibase_core.validators.operation_match_requires_operation src/omnibase_core

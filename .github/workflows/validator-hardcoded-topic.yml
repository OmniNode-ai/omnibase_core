---
# Hardcoded-topic-string gate [OMN-13294]
#
# MIGRATED INTO ci.yml (OMN-14430): this workflow used to trigger independently
# on push/pull_request, which meant it got its OWN github.run_id and was
# STRUCTURALLY INVISIBLE to ci.yml's ci-summary default-deny poller
# (scripts/ci/ci_summary_gate.py only queries jobs from its own run) regardless
# of required_status_checks wiring — the exact systemic gap OMN-14430 audited.
# The validate job now runs unconditionally inside ci.yml
# (`hardcoded-topic-validator`), gated by the required "CI Summary" context.
# This file is retained workflow_dispatch-only for manual/ad-hoc invocation; it
# no longer auto-triggers and is NOT a duplicate gating run.
#
# Blocks any quoted onex.<a>.<b>.<c> event-topic string literal pasted into
# handler source instead of being declared in contract.yaml and resolved through
# it. The onex.<a>.<b>.<c> topic-shape scanning regex was generated by
# node_generation_consumer (omnimarket) and accepted against a deterministic
# acceptance corpus (corpus_hardcoded_topic, seeded from node_aislop_sweep's
# _HARDCODED_TOPIC_PATTERN ground truth). The COMPUTE handler is pure; the runner
# loads the source files at the EFFECT boundary and dispatches each over the
# in-memory event bus — the SAME handler that runs under the
# check-hardcoded-topic-compute pre-commit hook, so local and CI verdicts cannot
# drift.

name: Hardcoded Topic Validator

on:
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"
  UV_HTTP_TIMEOUT: "600"

concurrency:
  group: validator-hardcoded-topic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  validate:
    needs: occ-preflight
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run validator unit tests
        run: |
          uv run pytest tests/unit/validation/hardcoded_topic/ -v

      # Self-scan omnibase_core src/ for hardcoded onex.* topic literals. Lands
      # REPORT-ONLY (--report-only) for the OMN-13294 burn-down: the real shadow
      # run over src/omnibase_core/ surfaced a PRE-EXISTING population of legitimate
      # source-of-truth topic declarations (the canonical topics.py registry,
      # per-event event_type / *_EVENT constants, schema doc-examples) — NOT
      # handler-pasted contract drift. Flipping the full-src scan to blocking before
      # those are annotated with `# onex-allow-topic-literal` would red-wedge the
      # repo on day one. The BLOCKING enforcement for all NEW pasted topic literals
      # is the check-hardcoded-topic-compute pre-commit hook (pass_filenames: true,
      # staged files only) — the same handler, so verdicts cannot drift. Drop
      # --report-only to flip the full-src scan to blocking once findings reach zero.
      - name: Self-scan omnibase_core src/ (report mode — baseline burn-down pending)
        run: |
          uv run python -m omnibase_core.validation.hardcoded_topic.runtime_hardcoded_topic \
            --report-only src/omnibase_core/

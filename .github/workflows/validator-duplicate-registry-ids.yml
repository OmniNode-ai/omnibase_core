---
# Duplicate Registry Id Guard — ValidatorDuplicateConfigIds gate [OMN-14401]
#
# Canonical CI gate for `omnibase_core.validation.validator_duplicate_config_ids`.
# Required status check context: "Duplicate Registry Ids / validate".
#
# Rejects config/registry YAML files declaring duplicate ids over a key that is
# not guaranteed unique — the shape behind two independent production bugs in
# one wave: OMN-14395 (prod_promotion_grants.yaml grant resolution) and OMN-14396
# (routing_tiers.yaml model routing). Checked registries are config-as-data via
# a manifest file (.duplicate-id-registries.yaml); this workflow:
#   1. runs unit tests for the validator (regression guard, including the
#      RED->GREEN reconstruction of the real OMN-14396 routing_tiers.yaml shape)
#   2. self-scans omnibase_core's own manifest-declared registries, proving the
#      CLI is resolvable and the check is green on this repo's own tree
#
# Consumer repos (omnimarket: routing_tiers.yaml: two backends sharing model id
# "Qwen3.6-35B-A3B" disambiguated by use_for; onex_change_control:
# prod_promotion_grants.yaml keyed on grant_id) wire this by adding the hook
# entry to their own .pre-commit-config.yaml (remote repo: omnibase_core) and
# mirroring the `validate` job in their own CI, pointing --manifest at their
# own .duplicate-id-registries.yaml. Tracked as fast-follow — not in this PR.

name: Duplicate Registry Ids

on:
  push:
    branches: [main, develop, dev, "hotfix/**"]
  pull_request:
    branches: [main, develop, dev]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

concurrency:
  group: duplicate-registry-ids-${{ github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  validate:
    needs: occ-preflight
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout omnibase_core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ValidatorDuplicateConfigIds unit tests
        run: |
          uv run pytest tests/unit/validation/test_validator_duplicate_config_ids.py -v

      - name: Self-scan omnibase_core repo for duplicate registry ids
        run: |
          uv run python -m omnibase_core.validation.validator_duplicate_config_ids \
            --manifest .duplicate-id-registries.yaml \
            --repo-root .

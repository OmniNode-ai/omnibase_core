---
# Sibling pin-hygiene gate [OMN-13509]
#
# Required status check context: "Pin Hygiene Validator / validate"
#
# PR-time sibling of the deploy-time OMN-12977 guard. Blocks any sibling
# dependency pin (omnibase-core / omnibase-spi / omnibase-compat git rev or
# branch=) in pyproject.toml / uv.lock whose pinned commit is NOT an ancestor of
# that sibling's dev HEAD. The scanning logic was generated by
# node_generation_consumer (omnimarket) and accepted against a deterministic
# acceptance corpus; git ancestry is resolved at the EFFECT boundary.
#
# The COMPUTE handler is pure; the runner resolves ancestry from the sibling
# clones checked out below into $OMNI_HOME. This is the same handler that runs
# under the check-pin-hygiene-compute pre-commit hook, so local and CI verdicts
# cannot drift.

name: Pin Hygiene Validator

on:
  push:
    branches: [main, develop, dev, "hotfix/**"]
  pull_request:
    branches: [main, develop, dev]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

concurrency:
  group: validator-pin-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  validate:
    needs: occ-preflight
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 15

    steps:
      - name: Checkout omnibase_core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: omnibase_core
          persist-credentials: false

      # Sibling clones the runner needs to resolve pin ancestry. Each is fetched
      # with its dev line so `git merge-base --is-ancestor <pinned> origin/dev`
      # can be evaluated. The runner reads them from $OMNI_HOME/<repo>.
      - name: Checkout omnibase_compat (sibling)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: OmniNode-ai/omnibase_compat
          path: omnibase_compat
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout omnibase_spi (sibling)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: OmniNode-ai/omnibase_spi
          path: omnibase_spi
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        working-directory: omnibase_core
        run: uv sync --all-extras

      - name: Run validator unit tests
        working-directory: omnibase_core
        run: |
          uv run pytest tests/unit/validation/pin_hygiene/ -v

      # Self-scan omnibase_core's own pin manifests against the sibling dev lines.
      # OMNI_HOME points at the workspace root where the sibling clones above live,
      # so the runner can resolve ancestry. Exit non-zero (fails the check) on any
      # off-dev-line sibling pin.
      - name: Self-scan omnibase_core pin manifests
        working-directory: omnibase_core
        env:
          OMNI_HOME: ${{ github.workspace }}
        run: |
          uv run python -m omnibase_core.validation.pin_hygiene.runtime_pin_hygiene \
            pyproject.toml uv.lock

#
# Receipt-Gate — reusable workflow enforcing "Enforcement by Receipt" (OMN-TBD).
#
# Every PR must cite a Linear ticket whose dod_evidence items all have PASS
# receipts at the canonical path `<receipts-dir>/<OMN-XXXX>/<item-id>/<check-type>.yaml`.
# A missing or failing receipt blocks merge.
#
# Called by per-repo workflows via `workflow_call` (see cr-thread-gate.yml
# pattern for precedent). Required status-check name: `receipt-gate / verify`.
#
# Inputs:
#   contracts-dir:  path to ticket contract YAMLs, relative to the
#                   onex_change_control checkout (default: contracts). The
#                   Run Receipt-Gate step always prepends `.onex_change_control/`
#                   since this workflow checks that repo out at that path.
#   receipts-dir:   path to ModelDodReceipt YAMLs, relative to the
#                   onex_change_control checkout (default: drift/dod_receipts).
#
# Secrets:
#   (none — receipts + contracts are in-repo files, no API calls required)

name: receipt-gate

on:
  workflow_call:
    inputs:
      contracts-dir:
        description: Path to the contracts directory on disk, relative to the onex_change_control checkout.
        type: string
        required: false
        default: contracts
      receipts-dir:
        description: Path to the dod_receipts directory on disk, relative to the onex_change_control checkout.
        type: string
        required: false
        default: drift/dod_receipts

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      # We need the onex_change_control repo to find contracts + receipts.
      # In single-repo usage (omnibase_core hosting the gate), the tree is
      # already present as a submodule or sibling checkout. In fan-out
      # deployment, each caller repo checks out onex_change_control here.
      - name: Check out onex_change_control (for contracts + receipts)
        uses: actions/checkout@v4
        with:
          repository: OmniNode-ai/onex_change_control
          path: .onex_change_control
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Check out omnibase_compat + omnibase_core from source when running in a
      # caller repo (not omnibase_core itself). This avoids the broken PyPI
      # fallback where omnibase-core's published package references a git+https
      # URL for omnibase-compat that no longer resolves.
      - name: Check out omnibase_compat (transitive dep)
        if: "! hashFiles('./src/omnibase_compat/__init__.py') && ! hashFiles('./omnibase_compat/pyproject.toml')"
        uses: actions/checkout@v4
        with:
          repository: OmniNode-ai/omnibase_compat
          path: .receipt-gate-deps/omnibase_compat
          ref: main
          fetch-depth: 1

      - name: Check out omnibase_core (for receipt-gate deps)
        if: "! hashFiles('./src/omnibase_core/__init__.py') && ! hashFiles('./omnibase_core/pyproject.toml')"
        uses: actions/checkout@v4
        with:
          repository: OmniNode-ai/omnibase_core
          path: .receipt-gate-deps/omnibase_core
          ref: main
          fetch-depth: 1

      - name: Install omnibase_core
        # Install from the PR's in-tree checkout (omnibase_core repo itself),
        # or a sibling checkout, or the .receipt-gate-deps source checkouts.
        # Never fall back to PyPI — the published package has a broken transitive
        # dep (git+https omnibase-compat URL) that fails in CI.
        run: |
          # --refresh + --reinstall-package force uv to rebuild the editable source
          # and reinstall these specific packages regardless of whether a
          # same-version wheel is cached locally or resolvable from PyPI.
          #
          # Two-pass install (OMN-9198, see docs/diagnosis-omn-9198-receipt-gate-still-pulls-pypi.md):
          #   Pass 1: install omnibase_compat editable (with PyPI available
          #           so pydantic/etc. resolve). uv may still resolve
          #           omnibase-core transitively from PyPI into the cache.
          #   Pass 2: install omnibase_core editable with --no-index, forcing
          #           uv to use the local source checkout even when a cached
          #           PyPI wheel exists. All transitive deps are already
          #           satisfied by pass 1, so --no-index doesn't break.
          if [ -f "./pyproject.toml" ] && grep -qE '^\s*name\s*=\s*["\x27]omnibase[-_.]core["\x27]' ./pyproject.toml 2>/dev/null; then
            uv pip install --system --refresh --reinstall-package omnibase-core -e .
          elif [ -d "./omnibase_core" ] && [ -f "./omnibase_core/pyproject.toml" ]; then
            uv pip install --system --refresh \
              --reinstall-package omnibase-compat \
              -e ./omnibase_compat
            uv pip install --system --refresh --no-index \
              --reinstall-package omnibase-core \
              -e ./omnibase_core
          elif [ -f "./.receipt-gate-deps/omnibase_core/pyproject.toml" ]; then
            uv pip install --system --refresh \
              --reinstall-package omnibase-compat \
              -e ./.receipt-gate-deps/omnibase_compat
            uv pip install --system --refresh --no-index \
              --reinstall-package omnibase-core \
              -e ./.receipt-gate-deps/omnibase_core
          else
            echo "::error::omnibase_core not installable — no source checkout available"
            exit 1
          fi

      - name: Verify receipt_gate_cli importable
        # Fail-fast check: the preceding install step claims success, but if uv
        # silently substituted a PyPI wheel for omnibase-core (OMN-9198), the
        # installed package won't contain recent modules. Catch that here so the
        # actual gate step gets a clear error instead of a stack trace.
        run: |
          python -c "from omnibase_core.validation import receipt_gate_cli" || {
            echo "::error::omnibase_core.validation.receipt_gate_cli not importable — install step silently picked a stale PyPI wheel"
            python -c "import omnibase_core, os; print('omnibase_core at:', os.path.dirname(omnibase_core.__file__))" || true
            exit 1
          }

      - name: Resolve PR body
        id: resolve_body
        # merge_group events do not carry pull_request.body. Fetch it from the
        # merge_group head_ref (format: pr-<num>-<sha>) via the GitHub API so
        # the gate evaluates the same body across pull_request and merge_group.
        env:
          GH_TOKEN: ${{ github.token }}
          PR_EVENT_BODY: ${{ github.event.pull_request.body }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -e
          if [ -n "$PR_EVENT_BODY" ]; then
            printf '%s' "$PR_EVENT_BODY" > /tmp/pr_body.txt
          elif [ -n "$MERGE_GROUP_HEAD_REF" ]; then
            pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            if [ -n "$pr_num" ] && [ "$pr_num" != "$MERGE_GROUP_HEAD_REF" ]; then
              gh pr view "$pr_num" --repo "${{ github.repository }}" --json body --jq '.body' > /tmp/pr_body.txt
            else
              : > /tmp/pr_body.txt
            fi
          else
            : > /tmp/pr_body.txt
          fi

      - name: Run Receipt-Gate
        run: |
          PR_BODY="$(cat /tmp/pr_body.txt)"
          python -m omnibase_core.validation.receipt_gate_cli \
            --pr-body "$PR_BODY" \
            --contracts-dir ".onex_change_control/${{ inputs.contracts-dir }}" \
            --receipts-dir ".onex_change_control/${{ inputs.receipts-dir }}"

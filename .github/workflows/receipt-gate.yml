# SPDX-License-Identifier: MIT
#
# Receipt-Gate — reusable workflow enforcing "Enforcement by Receipt" (OMN-10419).
#
# Every PR must cite a Linear ticket whose dod_evidence items all have PASS
# receipts at the canonical path `<receipts-dir>/<OMN-XXXX>/<item-id>/<check-type>.yaml`.
# A missing or failing receipt blocks merge.
#
# Called by per-repo workflows via `workflow_call` (see cr-thread-gate.yml
# pattern for precedent). Required status-check name: `receipt-gate / verify`.
#
# Inputs:
#   contracts-dir:  path to ticket contract YAMLs, relative to the
#                   onex_change_control checkout (default: contracts). The
#                   Run Receipt-Gate step always prepends `.onex_change_control/`
#                   since this workflow checks that repo out at that path.
#   receipts-dir:   path to ModelDodReceipt YAMLs, relative to the
#                   onex_change_control checkout (default: drift/dod_receipts).
#
# Evidence-Source pinning (OMN-10419 / T6a):
#   PRs opened after this workflow's merge SHA must include a line in the PR body:
#     Evidence-Source: OCC#<PR-number>    # an open OCC PR
#     Evidence-Source: <40-char-sha>      # a merged OCC commit
#   The gate resolves the commit-ish to an exact head SHA and checks out
#   onex_change_control at that exact SHA — never at main. This prevents
#   retroactive evidence pushes from satisfying prior PRs (invariant I7).
#   OCC fetch failure → hard FAIL; no fallback to main (invariant I8).
#   The job explicitly disables GHA cache so merge_group re-fires fully (I9).
#
# Secrets:
#   (none — receipts + contracts are in-repo files, no API calls required)

name: receipt-gate

on:
  workflow_call:
    inputs:
      contracts-dir:
        description: Path to the contracts directory on disk, relative to the onex_change_control checkout.
        type: string
        required: false
        default: contracts
      receipts-dir:
        description: Path to the dod_receipts directory on disk, relative to the onex_change_control checkout.
        type: string
        required: false
        default: drift/dod_receipts

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: verify
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5
    # OMN-10419 invariant I9: disable GHA cache + artifact reuse so merge_group
    # entry always re-evaluates fully. No stale PASS from a previous run can
    # satisfy the gate on a new merge_group event.
    env:
      ACTIONS_CACHE_URL: ""
      ACTIONS_RUNTIME_URL: ""
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      # OMN-10419: Resolve Evidence-Source commit-ish to an exact OCC SHA before
      # checking out onex_change_control. Accepts two forms:
      #   OCC#<number> — open PR head SHA (resolved via GitHub API)
      #   <sha>        — merged commit SHA (validated as ancestor of OCC main)
      # Writes the resolved exact SHA to /tmp/occ_sha.txt.
      # Hard FAIL on OCC fetch failure — no fallback to main (invariant I8).
      # Cutoff: only PRs opened after OMN-10419's merge SHA are required to
      # include Evidence-Source. The PR creation date is compared against the
      # cutoff commit's authored date from OCC's git log.
      - name: Resolve Evidence-Source
        id: resolve_evidence_source
        if: github.repository != 'OmniNode-ai/onex_change_control'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
        run: |
          set -euo pipefail

          # Derive the PR number for both pull_request and merge_group events.
          if [ -n "${PR_NUMBER:-}" ]; then
            resolved_pr_num="$PR_NUMBER"
            pr_created_at="${PR_CREATED_AT:-}"
          elif [ -n "${MERGE_GROUP_HEAD_REF:-}" ]; then
            resolved_pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            if [ -z "$resolved_pr_num" ] || [ "$resolved_pr_num" = "$MERGE_GROUP_HEAD_REF" ]; then
              resolved_pr_num=""
            fi
            if [ -n "$resolved_pr_num" ]; then
              pr_created_at="$(gh pr view "$resolved_pr_num" --repo "${{ github.repository }}" --json createdAt --jq '.createdAt' 2>/dev/null || true)"
            else
              pr_created_at=""
            fi
          else
            resolved_pr_num=""
            pr_created_at=""
          fi

          # Fetch PR body (needed to extract Evidence-Source line).
          if [ -n "$resolved_pr_num" ]; then
            pr_body="$(gh pr view "$resolved_pr_num" --repo "${{ github.repository }}" --json body --jq '.body' 2>/dev/null || true)"
          else
            pr_body=""
          fi

          # Extract Evidence-Source line.
          # Accepts: "Evidence-Source: OCC#1234" or "Evidence-Source: <sha>"
          evidence_source="$(printf '%s' "$pr_body" | grep -iE '^Evidence-Source:[[:space:]]+\S' | head -1 | sed -E 's/^Evidence-Source:[[:space:]]*//; s/^[[:space:]]+//; s/[[:space:]]+$//' || true)"

          # Determine the cutoff commit date from OCC using the pinned SHA.
          # The cutoff SHA is the merge commit for OMN-10419 (merged 2026-05-09).
          # PRs opened before this commit are grandfathered; PRs after must have
          # Evidence-Source pinning OCC instead of falling back to main.
          OCC_CUTOFF_SHA="78710b840f3b08999a95b3e54f92d13ab1806494"

          if [ "$OCC_CUTOFF_SHA" = "PENDING_MERGE" ] && [ -z "$evidence_source" ]; then
            echo "::notice::Evidence-Source not required: OMN-10419 cutoff SHA is PENDING_MERGE and no Evidence-Source was provided, so this run is treated as pre-cutoff."
            echo "PENDING_MERGE" > /tmp/occ_sha.txt
            echo "occ_sha=PENDING_MERGE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cutoff_epoch=0
          # Resolve the cutoff date from OCC without a full checkout — use the
          # GitHub API's commit endpoint.
          cutoff_date="$(gh api "repos/OmniNode-ai/onex_change_control/commits/${OCC_CUTOFF_SHA}" --jq '.commit.committer.date' 2>/dev/null || true)"
          if [ -n "$cutoff_date" ]; then
            cutoff_epoch="$(date -d "$cutoff_date" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$cutoff_date" +%s 2>/dev/null || echo 0)"
          fi

          # Check if this PR is before the cutoff (grandfathered).
          pr_epoch=0
          if [ -n "$pr_created_at" ]; then
            pr_epoch="$(date -d "$pr_created_at" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$pr_created_at" +%s 2>/dev/null || echo 0)"
          fi

          if [ "$cutoff_epoch" -gt 0 ] && [ "$pr_epoch" -gt 0 ] && [ "$pr_epoch" -lt "$cutoff_epoch" ]; then
            # PR predates cutoff — Evidence-Source not required.
            echo "::notice::Evidence-Source not required: PR predates OMN-10419 cutoff (pr_epoch=${pr_epoch} < cutoff_epoch=${cutoff_epoch}). Falling back to OCC main."
            echo "PENDING_MERGE" > /tmp/occ_sha.txt
            echo "occ_sha=PENDING_MERGE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If no Evidence-Source line present, hard fail.
          if [ -z "$evidence_source" ]; then
            echo "::error::RECEIPT GATE FAILED: PR body is missing required 'Evidence-Source:' line (OMN-10419). Add one of: 'Evidence-Source: OCC#<PR-number>' or 'Evidence-Source: <occ-sha>'"
            exit 1
          fi

          # Resolve the commit-ish to an exact OCC SHA.
          if printf '%s' "$evidence_source" | grep -qiE '^OCC#[0-9]+$'; then
            # OCC PR form: resolve to the current head SHA of that PR.
            occ_pr_num="$(printf '%s' "$evidence_source" | sed -E 's/^OCC#//i')"
            occ_sha="$(gh pr view "$occ_pr_num" --repo "OmniNode-ai/onex_change_control" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)"
            if [ -z "$occ_sha" ]; then
              echo "::error::RECEIPT GATE FAILED: OCC PR #${occ_pr_num} could not be resolved — OCC unavailable or PR not found. Cannot verify evidence (OMN-10419 invariant I8)."
              exit 1
            fi
          elif printf '%s' "$evidence_source" | grep -qiE '^[0-9a-f]{7,40}$'; then
            # SHA form: validate it is an ancestor of OCC main or the head of an open OCC PR.
            occ_sha="$evidence_source"
            # First: check if it is an ancestor of OCC main.
            is_ancestor="$(gh api "repos/OmniNode-ai/onex_change_control/compare/HEAD...${occ_sha}" --jq '.status' 2>/dev/null || true)"
            if [ "$is_ancestor" = "behind" ] || [ "$is_ancestor" = "identical" ]; then
              occ_sha="$(gh api "repos/OmniNode-ai/onex_change_control/commits/${occ_sha}" --jq '.sha' 2>/dev/null || true)"
              if [ -z "$occ_sha" ]; then
                echo "::error::RECEIPT GATE FAILED: Evidence-Source SHA could not be canonicalized to a full OCC commit SHA (OMN-10419)."
                exit 1
              fi
            else
              # Not an ancestor of main: check if it matches any open OCC PR head.
              matched_head="$(gh pr list --repo "OmniNode-ai/onex_change_control" --state open --json headRefOid --jq ".[] | select(.headRefOid | startswith(\"${occ_sha}\")) | .headRefOid" 2>/dev/null | head -1 || true)"
              if [ -z "$matched_head" ]; then
                echo "::error::RECEIPT GATE FAILED: Evidence-Source SHA '${occ_sha}' is neither an ancestor of OCC main nor the head of an open OCC PR. Provide a valid OCC commit or open-PR head (OMN-10419)."
                exit 1
              fi
              occ_sha="$matched_head"
            fi
          else
            echo "::error::RECEIPT GATE FAILED: Evidence-Source value '${evidence_source}' is not a valid OCC#<number> or hex SHA. Accepted forms: 'OCC#1234' or '<sha>' (OMN-10419)."
            exit 1
          fi

          # Write the resolved exact SHA for subsequent steps.
          printf '%s' "$occ_sha" > /tmp/occ_sha.txt
          # Expose as step output for the checkout step's ref field.
          echo "occ_sha=${occ_sha}" >> "$GITHUB_OUTPUT"
          echo "::notice::Evidence-Source resolved to OCC SHA: ${occ_sha}"

      # We need the onex_change_control repo to find contracts + receipts.
      # OMN-10419: checkout at the exact SHA resolved above (never at main).
      # This prevents retroactive evidence pushes from satisfying prior PRs (I7).
      # OCC fetch failure → hard FAIL via the preceding Resolve Evidence-Source step.
      # The ref uses the step output: "PENDING_MERGE" for pre-cutoff PRs falls
      # back to main; any real SHA pins the checkout to that exact commit.
      # onex_change_control PRs are the only exception and validate evidence
      # inside the PR checkout to avoid circular "already on main" dependency.
      - name: Check out onex_change_control (for contracts + receipts)
        if: github.repository != 'OmniNode-ai/onex_change_control'
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: .onex_change_control
          ref: ${{ steps.resolve_evidence_source.outputs.occ_sha == 'PENDING_MERGE' && 'main' || steps.resolve_evidence_source.outputs.occ_sha || 'main' }}
          fetch-depth: 1

      # OMN-10419 Finding 2: assert that the contract for the cited ticket exists
      # at the pinned OCC SHA. A valid commit-ish with no contract for this
      # ticket (e.g., predates the ticket) is a hard FAIL.
      - name: Assert contract exists at pinned OCC SHA
        if: github.repository != 'OmniNode-ai/onex_change_control'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail

          # Skip if pre-cutoff (occ_sha.txt contains PENDING_MERGE).
          if [ -f /tmp/occ_sha.txt ]; then
            occ_sha="$(cat /tmp/occ_sha.txt)"
            if [ "$occ_sha" = "PENDING_MERGE" ]; then
              echo "::notice::Pre-cutoff PR — skipping contract existence assertion."
              exit 0
            fi
          fi

          # Derive PR number.
          if [ -n "${PR_NUMBER:-}" ]; then
            resolved_pr_num="$PR_NUMBER"
          elif [ -n "${MERGE_GROUP_HEAD_REF:-}" ]; then
            resolved_pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            [ "$resolved_pr_num" = "$MERGE_GROUP_HEAD_REF" ] && resolved_pr_num=""
          else
            resolved_pr_num=""
          fi

          # Extract ticket IDs from PR title (most direct source).
          if [ -n "$resolved_pr_num" ]; then
            pr_title="$(gh pr view "$resolved_pr_num" --repo "${{ github.repository }}" --json title --jq '.title' 2>/dev/null || true)"
          else
            pr_title=""
          fi

          ticket_ids="$(printf '%s' "$pr_title" | grep -oiE 'OMN-[0-9]+' | sort -u || true)"
          if [ -z "$ticket_ids" ]; then
            # No ticket in title — receipt_gate_cli will handle the "no ticket" error.
            exit 0
          fi

          # Assert each cited ticket has a contract file at the pinned OCC SHA.
          contracts_dir=".onex_change_control/${{ inputs.contracts-dir }}"
          fail=0
          while IFS= read -r ticket_id; do
            contract_path="${contracts_dir}/${ticket_id}.yaml"
            if [ ! -f "$contract_path" ]; then
              echo "::error::RECEIPT GATE FAILED: Evidence-Source predates this ticket's contract — ${contract_path} does not exist at the pinned OCC SHA. The cited OCC commit predates the contract for ${ticket_id} (OMN-10419 Finding 2)."
              fail=1
            fi
          done <<< "$ticket_ids"
          exit "$fail"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Check out omnibase_compat + omnibase_core from source when running in a
      # caller repo (not omnibase_core itself). This avoids the broken PyPI
      # fallback where omnibase-core's published package references a git+https
      # URL for omnibase-compat that no longer resolves.
      - name: Check out omnibase_compat (transitive dep)
        if: "! hashFiles('./src/omnibase_compat/__init__.py') && ! hashFiles('./omnibase_compat/pyproject.toml')"
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_compat
          path: .receipt-gate-deps/omnibase_compat
          ref: main
          fetch-depth: 1

      - name: Check out omnibase_core (for receipt-gate deps)
        if: "! hashFiles('./src/omnibase_core/__init__.py') && ! hashFiles('./omnibase_core/pyproject.toml')"
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_core
          path: .receipt-gate-deps/omnibase_core
          ref: main
          fetch-depth: 1

      - name: Install omnibase_core
        # Install from the PR's in-tree checkout (omnibase_core repo itself),
        # or a sibling checkout, or the .receipt-gate-deps source checkouts.
        # Never fall back to PyPI — the published package has a broken transitive
        # dep (git+https omnibase-compat URL) that fails in CI.
        run: |
          # OMN-9198 history (see docs/diagnosis-omn-9198-receipt-gate-v3-resolver-prefers-index.md):
          #   - PR #850 --no-index on pass 2: uv couldn't satisfy caller's
          #     `omnibase-core>=X` with index disabled.
          #   - PR #851 single-pass `--reinstall-package -e`: uv preferred the
          #     PyPI wheel over editable when both advertised 0.39.0.
          #   - PR #854 uninstall-then-install-editable: uv rebuilt the PyPI
          #     sdist instead of using the -e path.
          #   - PR #855 `--no-binary omnibase-core`: uv obeyed the no-wheel rule
          #     but built from the PyPI SOURCE (sdist), not from -e, because
          #     index and -e both ship 0.39.0.
          #
          # Root cause: `-e path` REGISTERS a candidate with uv's resolver but
          # does not MANDATE it. When an index candidate matches the same version,
          # uv picks either — and empirically picks the index (sdist or wheel).
          #
          # Fix: skip uv's resolver for omnibase-core entirely. Install transitive
          # deps explicitly from PyPI first, then `uv pip install --no-deps -e <path>`
          # to tell uv "install exactly this path, do not consult the index".
          # --no-deps is the only flag that fully bypasses candidate-selection.
          #
          # The explicit dep list below mirrors omnibase_core/pyproject.toml
          # [dependencies]. If core adds a new runtime dep this list must be
          # updated (tracked as OMN-FOLLOWUP pre-merge drift check).
          uv pip uninstall --system omnibase-core omnibase-compat 2>/dev/null || true

          if [ -f "./omnibase_compat/pyproject.toml" ]; then
            compat_path="./omnibase_compat"
          elif [ -f "./.receipt-gate-deps/omnibase_compat/pyproject.toml" ]; then
            compat_path="./.receipt-gate-deps/omnibase_compat"
          else
            compat_path=""
          fi

          if [ -n "$compat_path" ]; then
            uv pip install --system --refresh -e "$compat_path"
          fi

          if [ -f "./pyproject.toml" ] && grep -qE '^\s*name\s*=\s*["\x27]omnibase[-_.]core["\x27]' ./pyproject.toml 2>/dev/null; then
            core_path="."
          elif [ -f "./omnibase_core/pyproject.toml" ]; then
            core_path="./omnibase_core"
          elif [ -f "./.receipt-gate-deps/omnibase_core/pyproject.toml" ]; then
            core_path="./.receipt-gate-deps/omnibase_core"
          else
            echo "::error::omnibase_core not installable — no source checkout available"
            exit 1
          fi

          # Seed omnibase_core's transitive deps from PyPI before the --no-deps +
          # --no-index editable install below. Keep in sync with
          # omnibase_core/pyproject.toml [dependencies].
          #
          # Also includes `hatchling` (build backend from [build-system.requires])
          # because the editable install below uses --no-index, which disables
          # PyPI lookups for EVERYTHING including build-system requirements.
          # Without hatchling pre-installed, uv cannot build the editable source.
          uv pip install --system \
            'hatchling' \
            'editables' \
            'pydantic>=2.12.5,<3.0.0' \
            'pyyaml>=6.0.2,<7.0.0' \
            'dependency-injector>=4.48.3,<5.0.0' \
            'deepdiff>=8.0.0,<10.0.0' \
            'click>=8.3.1,<9.0.0' \
            'cryptography>=46.0.3,<47.0.0' \
            'jsonschema>=4.25.1,<5.0.0' \
            'httpx>=0.27.0,<1.0.0' \
            'blake3>=1.0.8,<2.0.0' \
            'ruamel-yaml>=0.18.0'

          # OMN-9283: PR #864 (--no-index + --no-deps + -e <subpath>) worked for
          # omnibase_core's OWN PRs (core_path=".") but FAILED in downstream callers
          # where core_path="./.receipt-gate-deps/omnibase_core". Evidence from
          # omnibase_infra PR #1351 run 24661986639 job 72110050548:
          #   × No solution found when resolving dependencies:
          #   ╰─▶ Because omnibase-core was not found in the provided package
          #       locations and you require omnibase-core>=0.39.0, we can conclude
          #       that your requirements are unsatisfiable.
          #
          # Root cause: uv auto-discovers the cwd's pyproject.toml (the caller
          # repo, e.g. omnibase_infra) and treats its "omnibase-core>=0.39.0"
          # declaration as a top-level resolver requirement. A nested -e <subpath>
          # outside the cwd-project root is registered as a candidate offer but
          # is not matched against the cwd-project's own constraint. With
          # --no-index, there is no other source, so uv fails with "no solution".
          # Self-project ("." as editable) works because the editable IS the cwd
          # project — uv collapses them into one node.
          #
          # Fix (Option B from diagnosis-receipt-gate-v4-subpath-editable.md):
          # build a wheel from source, install from a local --find-links. The
          # resolver operates on a named package from a wheel location, which
          # unambiguously satisfies the cwd-project's version constraint.
          # Not editable, but receipt-gate imports the module once and exits —
          # editability was never a functional requirement, only a means to use
          # source instead of PyPI.
          mkdir -p /tmp/receipt-gate-wheels
          (cd "$core_path" && uv build --wheel --out-dir /tmp/receipt-gate-wheels)

          uv pip install --system --no-deps --no-index \
            --find-links /tmp/receipt-gate-wheels \
            --reinstall-package omnibase-core \
            omnibase-core

      - name: Verify receipt_gate_cli importable
        # Fail-fast check: the preceding install step claims success, but if uv
        # silently substituted a PyPI wheel for omnibase-core (OMN-9198), the
        # installed package won't contain recent modules. Catch that here so the
        # actual gate step gets a clear error instead of a stack trace.
        run: |
          python -c "from omnibase_core.validation import receipt_gate_cli" || {
            echo "::error::omnibase_core.validation.receipt_gate_cli not importable — install step silently picked a stale PyPI wheel"
            python -c "import omnibase_core, os; print('omnibase_core at:', os.path.dirname(omnibase_core.__file__))" || true
            exit 1
          }

      - name: Resolve PR snapshot
        id: resolve_body
        # Resolve mutable GitHub state exactly once. All eligibility checks below
        # consume these files plus the pinned OCC SHA; they do not re-fetch PR
        # metadata or move the evidence ref during validation.
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_BODY: ${{ github.event.pull_request.body }}
          PR_EVENT_TITLE: ${{ github.event.pull_request.title }}
          PR_EVENT_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_EVENT_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_EVENT_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail
          : > /tmp/pr_commit_shas.txt
          : > /tmp/pr_commit_texts.txt

          write_pr_snapshot() {
            local pr_json="$1"
            printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr_body.txt
            printf '%s' "$pr_json" | jq -r '.title // ""' > /tmp/pr_title.txt
            printf '%s' "$pr_json" | jq -r '.author.login // ""' > /tmp/pr_author.txt
            printf '%s' "$pr_json" | jq -r '.headRefName // ""' > /tmp/pr_branch.txt
            printf '%s' "$pr_json" | jq -r '.commits[]?.oid // empty' > /tmp/pr_commit_shas.txt
            printf '%s' "$pr_json" | jq -r '.commits[]? | ((.messageHeadline // "") + " " + (.messageBody // "" | gsub("\r?\n"; " ")))' > /tmp/pr_commit_texts.txt
          }

          if [ -n "$PR_NUMBER" ]; then
            if pr_json="$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body,title,author,headRefName,commits 2>/dev/null)"; then
              write_pr_snapshot "$pr_json"
              printf '%s' "$PR_NUMBER" > /tmp/pr_number.txt
            else
              # API unavailable — fall back to event payload with a warning.
              echo "::warning::gh pr view failed for PR #${PR_NUMBER}; using event payload (may be stale)"
              printf '%s' "$PR_EVENT_BODY" > /tmp/pr_body.txt
              printf '%s' "$PR_EVENT_TITLE" > /tmp/pr_title.txt
              printf '%s' "$PR_EVENT_AUTHOR" > /tmp/pr_author.txt
              printf '%s' "$PR_EVENT_BRANCH" > /tmp/pr_branch.txt
              printf '%s\n' "$PR_EVENT_SHA" > /tmp/pr_commit_shas.txt
              printf '%s' "$PR_NUMBER" > /tmp/pr_number.txt
            fi
          elif [ -n "$MERGE_GROUP_HEAD_REF" ]; then
            pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            if [ -n "$pr_num" ] && [ "$pr_num" != "$MERGE_GROUP_HEAD_REF" ]; then
              pr_json="$(gh pr view "$pr_num" --repo "${{ github.repository }}" --json body,title,author,headRefName,commits)"
              write_pr_snapshot "$pr_json"
              printf '%s' "$pr_num" > /tmp/pr_number.txt
            else
              : > /tmp/pr_body.txt
              : > /tmp/pr_title.txt
              : > /tmp/pr_author.txt
              : > /tmp/pr_branch.txt
              : > /tmp/pr_number.txt
            fi
          else
            : > /tmp/pr_body.txt
            : > /tmp/pr_title.txt
            : > /tmp/pr_author.txt
            : > /tmp/pr_branch.txt
            : > /tmp/pr_number.txt
          fi

      - name: Resolve evidence snapshot
        id: evidence
        run: |
          set -euo pipefail
          repo_short="${GITHUB_REPOSITORY##*/}"
          contracts_input="${{ inputs.contracts-dir }}"
          receipts_input="${{ inputs.receipts-dir }}"
          if [ "$repo_short" = "onex_change_control" ]; then
            sha="$(git rev-parse HEAD)"
            root="."
            contracts_dir="${contracts_input#../}"
            receipts_dir="${receipts_input#../}"
          else
            sha="$(git -C .onex_change_control rev-parse HEAD)"
            root=".onex_change_control"
            contracts_dir="$root/$contracts_input"
            receipts_dir="$root/$receipts_input"
          fi
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::invalid evidence snapshot SHA: $sha"
            exit 1
          fi
          {
            echo "sha=$sha"
            echo "root=$root"
            echo "contracts_dir=$contracts_dir"
            echo "receipts_dir=$receipts_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Run OCC Eligibility
        run: |
          set -euo pipefail
          PR_TITLE="$(cat /tmp/pr_title.txt)"
          PR_BRANCH="$(cat /tmp/pr_branch.txt)"
          PR_NUMBER_RESOLVED="$(cat /tmp/pr_number.txt 2>/dev/null || true)"
          REPO_NAME="${{ github.repository }}"
          REPO_SHORT="${REPO_NAME##*/}"

          if [ -z "$PR_NUMBER_RESOLVED" ]; then
            echo "::error::could not resolve PR number for OCC eligibility"
            exit 1
          fi

          commit_args=()
          while IFS= read -r sha; do
            [ -n "$sha" ] && commit_args+=(--pr-commit-sha "$sha")
          done < /tmp/pr_commit_shas.txt
          while IFS= read -r text; do
            [ -n "$text" ] && commit_args+=(--pr-commit-text "$text")
          done < /tmp/pr_commit_texts.txt

          python -m omnibase_core.validation.validator_occ_merge_eligibility \
            --repo "$REPO_SHORT" \
            --pr-number "$PR_NUMBER_RESOLVED" \
            --pr-title "$PR_TITLE" \
            --pr-body-file /tmp/pr_body.txt \
            --pr-branch "$PR_BRANCH" \
            --occ-commit-sha "${{ steps.evidence.outputs.sha }}" \
            --contracts-dir "${{ steps.evidence.outputs.contracts_dir }}" \
            --receipts-dir "${{ steps.evidence.outputs.receipts_dir }}" \
            "${commit_args[@]}" \
            | tee /tmp/occ_eligibility.json

      - name: Run Receipt-Gate
        run: |
          PR_BODY="$(cat /tmp/pr_body.txt)"
          PR_TITLE="$(cat /tmp/pr_title.txt)"
          PR_AUTHOR="$(cat /tmp/pr_author.txt 2>/dev/null || true)"
          PR_NUMBER_RESOLVED="$(cat /tmp/pr_number.txt 2>/dev/null || true)"
          REPO_NAME="${{ github.repository }}"
          REPO_SHORT="${REPO_NAME##*/}"

          ALLOWLIST_ARG=""
          EVIDENCE_ROOT="${{ steps.evidence.outputs.root }}"
          if [ -f "$EVIDENCE_ROOT/allowlists/skip_token_approvals.yaml" ]; then
            ALLOWLIST_ARG="--allowlist-path $EVIDENCE_ROOT/allowlists/skip_token_approvals.yaml"
          fi

          PR_AUTHOR_ARG=""
          if [ -n "$PR_AUTHOR" ]; then
            PR_AUTHOR_ARG="--pr-author $PR_AUTHOR"
          fi

          PR_NUMBER_ARG=""
          if [ -n "$PR_NUMBER_RESOLVED" ]; then
            PR_NUMBER_ARG="--current-pr-number $PR_NUMBER_RESOLVED"
          fi

          # shellcheck disable=SC2086
          python -m omnibase_core.validation.receipt_gate_cli \
            --pr-body "$PR_BODY" \
            --pr-title "$PR_TITLE" \
            --contracts-dir "${{ steps.evidence.outputs.contracts_dir }}" \
            --receipts-dir "${{ steps.evidence.outputs.receipts_dir }}" \
            --current-repo "$REPO_SHORT" \
            $ALLOWLIST_ARG \
            $PR_AUTHOR_ARG \
            $PR_NUMBER_ARG

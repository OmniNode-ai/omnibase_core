#
# Required-Check Skip-Vector Guard — local caller for omnibase_core's own PRs.
# OMN-14863 (fan-out from OMN-14854 omniclaude canary; no branch-protection
# flip in this PR).
#
# Produces required status check: "required-check-skip-guard / check-skip-vectors"
#
# NOT YET added to required_status_checks on this branch (see
# .github/required-checks.yaml, where this context's manifest row is
# `mode: ADVISORY`). The branch-protection flip to REQUIRED happens in a
# follow-up PR only after this workflow has posted green on `dev` at least
# twice — never in the same PR that introduces the workflow, to avoid a
# self-inflicted wedge (a PR blocked on a required check that has never
# successfully run under real conditions).
#
# IMPORTANT: this trigger MUST NOT carry a `paths:`/`paths-ignore:` filter
# (design spec section 4c). This is the one required-check workflow that is
# exempt from "narrow the trigger for efficiency" — a path filter here would
# be the exact self-referential skip-vector this guard exists to catch.
#
# PIN NOTE (OMN-14874): the reusable workflow's own doc header says "uses:
# OmniNode-ai/omniclaude/.github/workflows/required-check-skip-guard-reusable.yml@main"
# for caller repos, but omniclaude has NOT YET promoted OMN-14854 from dev to
# main (verified: the file 404s at omniclaude@main, resolves at
# omniclaude@dev). A `uses:` ref pinned to `@main` fails at workflow-parse
# time (GitHub cannot resolve a `uses:` ref whose file does not exist on the
# given ref -- "workflow file issue", zero jobs created). Pinned instead to
# the omniclaude dev HEAD commit that carries OMN-14854 (mirrors the
# established "re-pin rev to the merged-dev SHA once <repo>#<pr> lands"
# convention for cross-repo refs, and the identical fix already landed in
# omnimarket#1846 / OMN-14874). Re-pin to `@main` once omniclaude promotes
# dev->main.
#
# KNOWN RESIDUAL (OMN-14874): even with this outer pin fixed, the reusable
# workflow's OWN internal "Fetch validator (omniclaude canonical source)"
# step hardcodes `ref: main` for its sparse-checkout of the validator
# scripts -- that ref is not parameterized as a workflow_call input, so it
# is not fixable from this caller. Until omniclaude promotes OMN-14854 to
# main, this guard's own ADVISORY check will report a real FAIL (validator
# script missing on omniclaude@main), not a parse-time error. That FAIL is
# expected and external to this repo; see OMN-14874 for the tracked
# resolution (omniclaude dev->main promotion).

name: Required-Check Skip-Vector Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  required-check-skip-guard:
    needs: occ-preflight
    # pinned to omniclaude dev HEAD carrying OMN-14854 (not yet promoted to
    # main as of this PR) -- see PIN NOTE above. Re-pin to @main post-promotion.
    uses: OmniNode-ai/omniclaude/.github/workflows/required-check-skip-guard-reusable.yml@4d60e9363728eed52a238cd5b47bb15808d51ca0

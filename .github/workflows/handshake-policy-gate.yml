name: Handshake Policy Gate
# Checks that every active OmniNode repo has the architecture-handshake
# CI workflow installed and passing on its default branch.
# Runs weekly, on manual dispatch, and on PR/merge_group (OMN-13875) so the
# check is a live, observable PR-time signal instead of only surfacing once a
# week. NOT wired into required-status-checks here — the required-context
# flip is a separate, staged decision (wedge-safety: this job depends on
# POLICY_GATE_TOKEN, a cross-repo PAT not available to fork PRs).

on:
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, dev]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  policy-gate:
    name: Check handshake compliance across repos
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Validate POLICY_GATE_TOKEN
        env:
          GH_TOKEN: ${{ secrets.POLICY_GATE_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::POLICY_GATE_TOKEN secret is not configured. Add a fine-grained PAT with Actions:Read scope to the repo secrets."
            exit 1
          fi

      - name: Run policy gate check
        env:
          # POLICY_GATE_TOKEN: fine-grained PAT scoped to OmniNode-ai org
          # with Actions:Read on private repos. GITHUB_TOKEN cannot read
          # workflow runs from private repos in the same org.
          GH_TOKEN: ${{ secrets.POLICY_GATE_TOKEN }}
        run: bash architecture-handshakes/check-policy-gate.sh --strict

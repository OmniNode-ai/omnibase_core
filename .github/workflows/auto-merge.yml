#
# OMN-6571: Automatically enable auto-merge on every PR opened
# by jonahgabriel. Ensures PRs do not sit idle in the merge queue waiting
# for manual enrollment.
#
# OMN-7786: Re-trigger on review and check_suite events so the workflow
# re-attempts auto-merge after CodeRabbit review finishes and branch
# protection gates clear. Silent continue-on-error removed; "already
# enqueued" races are tolerated but real failures surface.
#
# OMN-9398: Add explicit enqueuePullRequest step after arming auto-merge.
# Arming auto-merge (gh pr merge --auto) is not the same as enqueuing —
# the PR sits armed but idle until enqueuePullRequest is called. This was
# the root cause of the #869 incident (1hr idle → ejected → manual rescue).
#
# OMN-10602: Guard check_suite fanout. check_suite fires on every CI run
# completion (all workflows, all branches), flooding the Actions queue with
# runs that immediately no-op because there is no PR context. The pre-check
# job resolves the PR number cheaply (no checkout, no Python setup) and
# outputs skip=true for suites with no associated PR or for non-default-branch
# targets. The main job depends on pre-check and is skipped entirely when
# skip=true. A concurrency group per PR cancels redundant queued runs so
# only the most-recent check_suite completion for a given PR actually runs.
#
# OMN-13214: Arming auto-merge is NOT the same as enqueuing. During the
# 2026-06-17 dev wave, CLEAN + all-required-green + armed PRs sat OUTSIDE the
# merge queue for hours and each needed a manual enqueuePullRequest to land.
# Two fixes here: (1) the "Enable auto-merge" step previously passed bare
# `--auto --squash`, but dev is queue-controlled, so an explicit method is
# REJECTED ("The merge strategy for dev is set by the merge queue") and the PR
# is NEVER enqueued. Use bare `--auto` and let the queue pick the method.
# (2) The old "Force enqueue" step did not verify the PR actually entered the
# queue. This workflow now (a) arms bare --auto, (b) runs gh pr update-branch
# first on strict-update repos when the PR is BEHIND, (c) explicitly calls
# enqueuePullRequest, and (d) VERIFIES the PR actually entered the queue —
# failing loudly if a green+armed PR is not enqueued, so the gap surfaces
# instead of stalling silently. The classify/verify decision logic is
# unit-tested in scripts/ci/merge_queue_enqueue.py.
name: Auto-Merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to enable auto-merge on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One active run per PR (or per dispatch invocation). Cancels the queued
  # run when a newer check_suite completion arrives for the same PR, keeping
  # only the latest attempt in flight.
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.check_suite.pull_requests[0].number || github.event.check_suite.id }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    uses: ./.github/workflows/occ-preflight.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  pre-check:
    needs: occ-preflight
    name: Resolve PR (fanout guard)
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.resolve.outputs.pr }}
      actor: ${{ steps.resolve.outputs.actor }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Resolve PR number and author without checkout
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PAYLOAD: ${{ github.event.pull_request.number }}
          PR_AUTHOR_FROM_PAYLOAD: ${{ github.event.pull_request.user.login }}
          PR_FROM_DISPATCH: ${{ github.event.inputs.pr_number }}
          CHECK_SUITE_PRS: ${{ toJson(github.event.check_suite.pull_requests) }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request|pull_request_review)
              PR="$PR_FROM_PAYLOAD"
              ACTOR="${PR_AUTHOR_FROM_PAYLOAD:-$(gh pr view "$PR" --repo "$GH_REPO" --json author --jq '.author.login')}"
              echo "pr=$PR" >> "$GITHUB_OUTPUT"
              echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              PR="$PR_FROM_DISPATCH"
              ACTOR="$(gh pr view "$PR" --repo "$GH_REPO" --json author --jq '.author.login')"
              echo "pr=$PR" >> "$GITHUB_OUTPUT"
              echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            check_suite)
              DEFAULT_BRANCH="$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')"
              PR=""
              while IFS= read -r candidate_pr; do
                [ -z "$candidate_pr" ] && continue
                candidate_base="$(gh pr view "$candidate_pr" --repo "$GH_REPO" --json baseRefName --jq '.baseRefName')"
                if [ "$candidate_base" = "$DEFAULT_BRANCH" ]; then
                  PR="$candidate_pr"
                  break
                fi
              done < <(echo "$CHECK_SUITE_PRS" | jq -r 'if type == "array" then .[]?.number else empty end')
              if [ -z "$PR" ]; then
                echo "check_suite has no PR targeting '$DEFAULT_BRANCH'; skipping"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "pr=" >> "$GITHUB_OUTPUT"
                echo "actor=" >> "$GITHUB_OUTPUT"
              else
                ACTOR="$(gh pr view "$PR" --repo "$GH_REPO" --json author --jq '.author.login')"
                echo "pr=$PR" >> "$GITHUB_OUTPUT"
                echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
                echo "skip=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "unsupported event: $EVENT_NAME; skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "pr=" >> "$GITHUB_OUTPUT"
              echo "actor=" >> "$GITHUB_OUTPUT"
              ;;
          esac

  auto-merge:
    name: Enable Auto-Merge
    needs: [occ-preflight, pre-check]
    if: needs.occ-preflight.result == 'success' && (needs.pre-check.outputs.skip != 'true' && needs.pre-check.outputs.actor == 'jonahgabriel')
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve OCC main SHA
        id: occ_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(gh api repos/OmniNode-ai/onex_change_control/git/ref/heads/main --jq '.object.sha')"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::could not resolve immutable onex_change_control/main SHA"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out OCC evidence snapshot
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/onex_change_control
          path: .onex_change_control
          ref: ${{ steps.occ_ref.outputs.sha }}
          fetch-depth: 1

      - name: OCC auto-merge preflight
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ needs.pre-check.outputs.pr }}
        run: |
          set -euo pipefail
          pr_json="$(gh pr view "$PR" --repo "$GH_REPO" --json body,title,headRefName,commits)"
          printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr_body.txt
          PR_TITLE="$(printf '%s' "$pr_json" | jq -r '.title // ""')"
          PR_BRANCH="$(printf '%s' "$pr_json" | jq -r '.headRefName // ""')"

          commit_args=()
          while IFS= read -r sha; do
            [ -n "$sha" ] && commit_args+=(--pr-commit-sha "$sha")
          done < <(printf '%s' "$pr_json" | jq -r '.commits[]?.oid // empty')
          while IFS= read -r text; do
            [ -n "$text" ] && commit_args+=(--pr-commit-text "$text")
          done < <(printf '%s' "$pr_json" | jq -r '.commits[]? | ((.messageHeadline // "") + " " + (.messageBody // "" | gsub("\r?\n"; " ")))')

          PYTHONPATH=src uv run python -m omnibase_core.validation.validator_occ_merge_eligibility \
            --repo "${GH_REPO##*/}" \
            --pr-number "$PR" \
            --pr-title "$PR_TITLE" \
            --pr-body-file /tmp/pr_body.txt \
            --pr-branch "$PR_BRANCH" \
            --occ-commit-sha "${{ steps.occ_ref.outputs.sha }}" \
            --contracts-dir ".onex_change_control/contracts" \
            --receipts-dir ".onex_change_control/drift/dod_receipts" \
            "${commit_args[@]}" \
            | tee /tmp/occ_auto_merge_preflight.json

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ needs.pre-check.outputs.pr }}
        run: |
          set -euo pipefail
          # OMN-13138/13214: dev is queue-controlled — the merge method is set by
          # the merge queue, so passing an explicit --squash is rejected ("The
          # merge strategy for dev is set by the merge queue") and the PR is NEVER
          # enqueued (sits CLEAN + auto-merge armed forever). Use bare --auto and
          # let the queue pick the method.
          # OMN-13214: arming alone does not enqueue — the explicit enqueue +
          # verify step below closes that gap. Do NOT exit here on success.
          if output=$(gh pr merge "$PR" --repo "$GH_REPO" --auto 2>&1); then
            echo "auto-merge enabled: $output"
          elif echo "$output" | grep -qiE "already enqueued|already queued|auto-merge already enabled"; then
            echo "auto-merge not newly enabled (expected): $output"
          else
            echo "auto-merge failed: $output"
            exit 1
          fi

      - name: Enqueue armed PR and verify it entered the queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ needs.pre-check.outputs.pr }}
        run: |
          set -euo pipefail
          OWNER="${GH_REPO%/*}"
          NAME="${GH_REPO#*/}"

          classify() {
            python3 scripts/ci/merge_queue_enqueue.py classify \
              --pr-json "$1" --strict-update "$2"
          }

          # Is the target (default) branch strict-update? On strict repos a BEHIND
          # PR cannot enqueue until its branch is updated.
          DEFAULT_BRANCH="$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          STRICT="$(gh api "repos/${GH_REPO}/branches/${DEFAULT_BRANCH}/protection/required_status_checks" \
            --jq '.strict' 2>/dev/null || echo "false")"
          [ "$STRICT" = "true" ] || STRICT="false"
          echo "strict-update on '${DEFAULT_BRANCH}': ${STRICT}"

          fetch_pr() {
            # isInMergeQueue is only on the GraphQL PullRequest object, NOT a
            # `gh pr view --json` field, so fetch PR state via GraphQL.
            # shellcheck disable=SC2016  # $owner/$name/$number are GraphQL vars, not shell vars
            gh api graphql \
              -f owner="$OWNER" \
              -f name="$NAME" \
              -F number="$PR" \
              -f query='
                query($owner:String!, $name:String!, $number:Int!) {
                  repository(owner: $owner, name: $name) {
                    pullRequest(number: $number) {
                      isInMergeQueue
                      mergeStateStatus
                      mergeable
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }' \
              --jq '.data.repository.pullRequest'
          }

          PR_JSON="$(fetch_pr)"
          ACTION="$(classify "$PR_JSON" "$STRICT")"
          echo "classified action: ${ACTION}"

          case "$ACTION" in
            already_queued)
              echo "PR #${PR} already in the merge queue — nothing to do."
              exit 0
              ;;
            wait)
              echo "PR #${PR} is not enqueueable yet (BLOCKED/DIRTY/DRAFT/UNKNOWN); will re-fire on next event."
              exit 0
              ;;
            blocked)
              echo "::warning::PR #${PR} in an unrecognised merge state: $(printf '%s' "$PR_JSON" | jq -r '.mergeStateStatus'). Not enqueuing."
              exit 0
              ;;
            update_branch_then_enqueue)
              echo "PR #${PR} is BEHIND on a strict-update repo — updating branch before enqueue."
              if ! gh pr update-branch "$PR" --repo "$GH_REPO" 2>&1; then
                echo "::warning::update-branch reported no change or a benign error; continuing."
              fi
              echo "update-branch issued; the resulting check run re-fires this workflow when CI is green."
              exit 0
              ;;
            enqueue)
              : # fall through to enqueue below
              ;;
            *)
              echo "::error::unexpected action '${ACTION}' from classifier"
              exit 1
              ;;
          esac

          PR_ID="$(gh api graphql -f query='{repository(owner:"'"$OWNER"'",name:"'"$NAME"'"){pullRequest(number:'"$PR"'){id}}}' --jq '.data.repository.pullRequest.id')"
          if [ -z "$PR_ID" ] || [ "$PR_ID" = "null" ]; then
            echo "::error::could not resolve PR node id for #${PR}"
            exit 1
          fi

          # shellcheck disable=SC2016  # $prId is a GraphQL variable, not a shell var
          if enq_out=$(gh api graphql -f query='mutation($prId:ID!){enqueuePullRequest(input:{pullRequestId:$prId}){mergeQueueEntry{position}}}' -f prId="$PR_ID" 2>&1); then
            echo "enqueue issued: ${enq_out}"
          else
            if echo "$enq_out" | grep -qiE "merge queue (is )?not enabled|does not have a merge queue|merge_queue_not_enabled"; then
              echo "repo has no merge queue — arming auto-merge is sufficient: ${enq_out}"
              exit 0
            fi
            if echo "$enq_out" | grep -qiE "already (in|enqueued|queued)|in the merge queue"; then
              echo "benign enqueue race (already queued): ${enq_out}"
            else
              echo "::error::enqueuePullRequest failed for #${PR}: ${enq_out}"
              exit 1
            fi
          fi

          # OMN-13214 ENFORCEMENT: verify the PR actually entered the queue.
          # Poll briefly — GitHub may take a few seconds to reflect the entry.
          for attempt in 1 2 3 4 5; do
            sleep 6
            PR_AFTER="$(fetch_pr)"
            if python3 scripts/ci/merge_queue_enqueue.py verify --pr-json "$PR_AFTER"; then
              echo "VERIFIED: PR #${PR} is in the merge queue."
              exit 0
            fi
            echo "not yet in queue (attempt ${attempt}/5); state=$(printf '%s' "$PR_AFTER" | jq -r '.mergeStateStatus')"
          done

          echo "::error::PR #${PR} is green + armed but did NOT enter the merge queue after enqueue (OMN-13214 armed-but-not-enqueued). Manual intervention required."
          exit 1

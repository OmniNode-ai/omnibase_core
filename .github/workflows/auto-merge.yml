#
# OMN-6571: Automatically enable auto-merge on every PR opened
# by jonahgabriel. Ensures PRs do not sit idle in the merge queue waiting
# for manual enrollment.
#
# OMN-7786: Re-trigger on review and check_suite events so the workflow
# re-attempts auto-merge after CodeRabbit review finishes and branch
# protection gates clear. Silent continue-on-error removed; "already
# enqueued" races are tolerated but real failures surface.
#
# OMN-9398: Add explicit enqueuePullRequest step after arming auto-merge.
# Arming auto-merge (gh pr merge --auto) is not the same as enqueuing —
# the PR sits armed but idle until enqueuePullRequest is called. This was
# the root cause of the #869 incident (1hr idle → ejected → manual rescue).
#
# OMN-10602: Guard check_suite fanout. check_suite fires on every CI run
# completion (all workflows, all branches), flooding the Actions queue with
# runs that immediately no-op because there is no PR context. The pre-check
# job resolves the PR number cheaply (no checkout, no Python setup) and
# outputs skip=true for suites with no associated PR or for non-default-branch
# targets. The main job depends on pre-check and is skipped entirely when
# skip=true. A concurrency group per PR cancels redundant queued runs so
# only the most-recent check_suite completion for a given PR actually runs.
name: Auto-Merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to enable auto-merge on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One active run per PR (or per dispatch invocation). Cancels the queued
  # run when a newer check_suite completion arrives for the same PR, keeping
  # only the latest attempt in flight.
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.check_suite.id }}
  cancel-in-progress: true

jobs:
  pre-check:
    name: Resolve PR (fanout guard)
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.resolve.outputs.pr }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Resolve PR number without checkout
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PAYLOAD: ${{ github.event.pull_request.number }}
          PR_FROM_DISPATCH: ${{ github.event.inputs.pr_number }}
          CHECK_SUITE_PRS: ${{ toJson(github.event.check_suite.pull_requests) }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request|pull_request_review)
              echo "pr=$PR_FROM_PAYLOAD" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "pr=$PR_FROM_DISPATCH" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            check_suite)
              DEFAULT_BRANCH="$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')"
              PR=""
              while IFS= read -r candidate_pr; do
                [ -z "$candidate_pr" ] && continue
                candidate_base="$(gh pr view "$candidate_pr" --repo "$GH_REPO" --json baseRefName --jq '.baseRefName')"
                if [ "$candidate_base" = "$DEFAULT_BRANCH" ]; then
                  PR="$candidate_pr"
                  break
                fi
              done < <(echo "$CHECK_SUITE_PRS" | jq -r 'if type == "array" then .[]?.number else empty end')
              if [ -z "$PR" ]; then
                echo "check_suite has no PR targeting '$DEFAULT_BRANCH'; skipping"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "pr=" >> "$GITHUB_OUTPUT"
              else
                echo "pr=$PR" >> "$GITHUB_OUTPUT"
                echo "skip=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "unsupported event: $EVENT_NAME; skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "pr=" >> "$GITHUB_OUTPUT"
              ;;
          esac

  auto-merge:
    name: Enable Auto-Merge
    needs: pre-check
    if: needs.pre-check.outputs.skip != 'true'
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve PR author
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ needs.pre-check.outputs.pr }}
          PR_AUTHOR_FROM_PAYLOAD: ${{ github.event.pull_request.user.login }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # PR number already validated by pre-check; just resolve the author.
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_AUTHOR_FROM_PAYLOAD" ]; then
            ACTOR="$PR_AUTHOR_FROM_PAYLOAD"
          else
            ACTOR="$(gh pr view "$PR" --repo "$GH_REPO" --json author --jq '.author.login')"
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"

      - name: Resolve OCC main SHA
        id: occ_ref
        if: steps.resolve.outputs.actor == 'jonahgabriel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(gh api repos/OmniNode-ai/onex_change_control/git/ref/heads/main --jq '.object.sha')"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::could not resolve immutable onex_change_control/main SHA"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out OCC evidence snapshot
        if: steps.resolve.outputs.actor == 'jonahgabriel'
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: .onex_change_control
          ref: ${{ steps.occ_ref.outputs.sha }}
          fetch-depth: 1

      - name: OCC auto-merge preflight
        if: steps.resolve.outputs.actor == 'jonahgabriel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          pr_json="$(gh pr view "$PR" --repo "$GH_REPO" --json body,title,headRefName,commits)"
          printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr_body.txt
          PR_TITLE="$(printf '%s' "$pr_json" | jq -r '.title // ""')"
          PR_BRANCH="$(printf '%s' "$pr_json" | jq -r '.headRefName // ""')"

          commit_args=()
          while IFS= read -r sha; do
            [ -n "$sha" ] && commit_args+=(--pr-commit-sha "$sha")
          done < <(printf '%s' "$pr_json" | jq -r '.commits[]?.oid // empty')
          while IFS= read -r text; do
            [ -n "$text" ] && commit_args+=(--pr-commit-text "$text")
          done < <(printf '%s' "$pr_json" | jq -r '.commits[]? | ((.messageHeadline // "") + " " + (.messageBody // "" | gsub("\r?\n"; " ")))')

          PYTHONPATH=src uv run python -m omnibase_core.validation.validator_occ_merge_eligibility \
            --repo "${GH_REPO##*/}" \
            --pr-number "$PR" \
            --pr-title "$PR_TITLE" \
            --pr-body-file /tmp/pr_body.txt \
            --pr-branch "$PR_BRANCH" \
            --occ-commit-sha "${{ steps.occ_ref.outputs.sha }}" \
            --contracts-dir ".onex_change_control/contracts" \
            --receipts-dir ".onex_change_control/drift/dod_receipts" \
            "${commit_args[@]}" \
            | tee /tmp/occ_auto_merge_preflight.json

      - name: Enable auto-merge
        if: steps.resolve.outputs.actor == 'jonahgabriel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          # "already enqueued" race is benign — treat as success.
          # All other failures surface loudly (no silent continue-on-error).
          if output=$(gh pr merge "$PR" --repo "$GH_REPO" --auto --squash 2>&1); then
            echo "auto-merge enabled: $output"
            exit 0
          fi
          if echo "$output" | grep -qiE "already enqueued|already queued|auto-merge already enabled"; then
            echo "auto-merge not newly enabled (expected): $output"
            exit 0
          fi
          echo "auto-merge failed: $output"
          exit 1

      - name: Force enqueue to merge queue
        if: steps.resolve.outputs.actor == 'jonahgabriel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          OWNER="${GH_REPO%/*}"
          NAME="${GH_REPO#*/}"
          PR_ID=$(gh api graphql -f query='{repository(owner:"'"$OWNER"'",name:"'"$NAME"'"){pullRequest(number:'"$PR"'){id}}}' --jq '.data.repository.pullRequest.id')
          if [ -z "$PR_ID" ] || [ "$PR_ID" = "null" ]; then
            echo "could not resolve PR id"; exit 0
          fi
          if output=$(gh api graphql -f query='mutation($prId:ID!){enqueuePullRequest(input:{pullRequestId:$prId}){mergeQueueEntry{position}}}' -f prId="$PR_ID" 2>&1); then
            echo "enqueued: $output"
          else
            # Tolerate only known benign states.
            if echo "$output" | grep -qiE "already (in|enqueued|queued)|merge queue (is )?not enabled|not mergeable|required status check"; then
              echo "enqueue attempt result (tolerated): $output"
              exit 0
            fi
            echo "enqueue failed: $output"
            exit 1
          fi

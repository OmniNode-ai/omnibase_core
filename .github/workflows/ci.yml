  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Baseline security scan using detect-secrets (OMN-2226)
  # Uses detect-secrets-hook for proper baseline comparison (handles type+hash equality)
  detect-secrets:
    name: Detect Secrets
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run detect-secrets-hook
        run: |
          # Use detect-secrets-hook with baseline for proper CI enforcement.
          # detect-secrets-hook compares findings against the baseline using the
          # full equality model (hashed_secret + type), and exits non-zero only
          # for NEW secrets not already baselined.
          #
          # Excludes: uv.lock (dependency hashes), .venv/, test fixtures,
          # .git/, .secrets.baseline (contains hashed values that self-trigger),
          # workflow YAML (references "secret" in config context),
          # url_authority_baseline.json / canonical_inference_baseline.json
          # (sha256 fingerprints of known violations,
          #   not secrets — Hex High Entropy false-positive)
          set +e
          git ls-files -z | xargs -0 detect-secrets-hook \
            --baseline .secrets.baseline \
            --exclude-files 'uv\.lock' \
            --exclude-files '\.venv/' \
            --exclude-files 'tests/fixtures/' \
            --exclude-files '\.git/' \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files '\.github/workflows/.*\.yml' \
            --exclude-files 'url_authority_baseline\.json' \
            --exclude-files 'canonical_inference_baseline\.json'
          HOOK_EXIT=$?
          set -e

          if [[ $HOOK_EXIT -eq 0 ]]; then
            echo "## Secrets Scan" >> $GITHUB_STEP_SUMMARY
            echo "No new secrets detected (all findings are baselined)." >> $GITHUB_STEP_SUMMARY
          else
            echo "## New Secrets Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "detect-secrets-hook found secrets not present in .secrets.baseline." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If these are false positives, regenerate the baseline:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo 'detect-secrets scan --all-files --exclude-files "uv\.lock" --exclude-files "\.venv/" --exclude-files "tests/fixtures/" --exclude-files "\.git/" --exclude-files "\.secrets\.baseline" --exclude-files "\.github/workflows/.*\.yml" --exclude-files "url_authority_baseline\.json" --exclude-files "canonical_inference_baseline\.json" --force-use-all-plugins > .secrets.baseline' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1 - Version Pin Compliance Check (OMN-4806)
  # ---------------------------------------------------------------------------
  # Verifies that this repo's dependency pins are compliant with the shared

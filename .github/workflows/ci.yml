  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Pydantic Patterns (OMN-13574: Model B failing-rollup enforcement)
  # validator-requirements.yaml requires `pydantic-patterns`. The handshake
  # consumer's CI keyword "pydantic" previously matched ONLY incidental
  # `pip install pydantic` lines in receipt-gate / occ-preflight — there was NO
  # real pydantic-patterns validator job in CI. This job runs the actual
  # validator and feeds quality-gate so it gates the required rollup.
  pydantic-patterns:
    name: Pydantic Patterns
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate Pydantic patterns
        run: |
          # Match the pre-commit file scope: src/ excluding tests/, archived/,
          # archive/, and scripts/validation/ (where the validator lives).
          files=$(git ls-files 'src/**/*.py' \
            | grep -vE '^(tests/|archived/|archive/|scripts/validation/)' || true)
          if [ -z "$files" ]; then
            echo "No src/ Python files to validate."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python scripts/validation/validate-pydantic-patterns.py $files

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # AI-Slop Patterns (OMN-13574: Model B failing-rollup enforcement)
  # validator-requirements.yaml requires `aislop-patterns`. Previously this only
  # ran in omni-standards-compliance.yml (`ai-slop-check`), which is NOT in
  # branch protection. This copy runs the same strict scan over the full tracked
  # tree and feeds quality-gate so a real AI-slop violation turns the required
  # rollup red. Full-tree scan (not changed-files) avoids the merge_group /
  # no-diff exit-0 hole on the required path.
  aislop-patterns:
    name: AI Slop Patterns
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check tracked tree for AI-slop patterns (strict)
        run: |
          # Mirror the pre-commit / omni-standards exclude set: CHANGELOG.md,
          # docs/, and intentional syntax-error fixtures.
          files=$(git ls-files '*.py' '*.md' \
            | grep -vE '^(CHANGELOG\.md|docs/|tests/fixtures/validation/)' || true)
          if [ -z "$files" ]; then
            echo "No Python/Markdown files to scan."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python scripts/validation/check_ai_slop.py --strict $files

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Doc-Content Scan (OMN-13572: wire doc_content_scan as a required gate)
  # validator-requirements.yaml requires `doc-content-scan` on omnibase_core
  # (pilot). Runs the SAME corpus-accepted COMPUTE validator (OMN-13569) the
  # pre-commit hook runs — here over the full tracked documentation set — and
  # feeds quality-gate so a local-environment trace or unexempted OMN-<digits>
  # ticket reference in a doc turns the single required CI Summary rollup red.
  # The runner's EFFECT boundary selects docs-only extensions and the handler
  # applies the path-based exemptions (onex_change_control/ + contracts/ for the
  # OMN rule, SKILL.md `ticket:` frontmatter). Full-tree scan (not changed-files)
  # avoids the merge_group / no-diff exit-0 hole on the required path.
  doc-content-scan:
    name: Doc-Content Scan
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Scan documentation for local-env traces + ticket refs (OMN-13572)
        run: |
          # tests/ carry intentional doc-content fixtures (the violations the
          # scanner-under-test must flag); archived/ is frozen history. The
          # runner filters to docs-only extensions; the handler applies the
          # onex_change_control/ + contracts/ + SKILL.md `ticket:` exemptions.
          files=$(git ls-files '*.md' '*.mdx' '*.rst' '*.txt' '*.adoc' \
            | grep -vE '^(tests/|archived/|archive/)' || true)
          if [ -z "$files" ]; then
            echo "No documentation files to scan."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python -m omnibase_core.validation.doc_content_scan.runtime_doc_content_scan $files

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # SPDX Headers (OMN-13576: burn down validator-requirements baseline ratchet)
  # validator-requirements.yaml requires `spdx-headers` (ci_workflow: required) on
  # all repos. The pre-commit hook (validate-spdx-headers) was wired but no CI job
  # ran it — it was grandfathered in validator-requirements-baseline.yaml as a
  # MISSING_CI_WORKFLOW gap. This job runs the SAME validator the pre-commit hook
  # runs, over the full tracked tree mirroring the hook's files:/exclude: scope,
  # and feeds quality-gate so a missing/incorrect SPDX header turns the single
  # required CI Summary rollup red. Full-tree scan (not changed-files) avoids the
  # merge_group / no-diff exit-0 hole on the required path.
  spdx-headers:
    name: SPDX Headers
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate SPDX headers (OMN-13576)
        run: |
          # Mirror the pre-commit hook (validate-spdx-headers) file scope:
          # files: ^(src|tests|scripts|examples)/.*\.(py|sh|bash|yml|yaml|toml)$
          # exclude: ^(archived/|archive/)
          files=$(git ls-files \
            'src/**/*.py' 'src/**/*.sh' 'src/**/*.bash' 'src/**/*.yml' 'src/**/*.yaml' 'src/**/*.toml' \
            'tests/**/*.py' 'tests/**/*.sh' 'tests/**/*.bash' 'tests/**/*.yml' 'tests/**/*.yaml' 'tests/**/*.toml' \
            'scripts/**/*.py' 'scripts/**/*.sh' 'scripts/**/*.bash' 'scripts/**/*.yml' 'scripts/**/*.yaml' 'scripts/**/*.toml' \
            'examples/**/*.py' 'examples/**/*.sh' 'examples/**/*.bash' 'examples/**/*.yml' 'examples/**/*.yaml' 'examples/**/*.toml' \
            | grep -vE '^(archived/|archive/)' || true)
          if [ -z "$files" ]; then
            echo "No SPDX-eligible files to validate."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python scripts/validation/validate_spdx_headers.py $files

  # No-new-os-environ gate (OMN-13566) — canonical AST-based env-read enforcement.
  # Blocks ALL os.environ/os.getenv reads outside KEEP_ALLOWLIST. Feeds quality-gate
  # so a violation turns the single required CI Summary rollup red. The deliberate
  # red-test corpus (test_deliberate_violation_corpus) is the DoD proof that CI
  # would catch a real violation.
  no-new-os-environ:
    name: No New os.environ Reads (OMN-13566)
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Scan src/ for os.environ/os.getenv reads outside KEEP_ALLOWLIST (OMN-13566)
        run: |
          uv run python -m omnibase_core.validators.no_new_os_environ --all --src src/

  # Duplicate registry id guard (OMN-14401). Rejects config/registry YAML files
  # declaring duplicate ids over a key that is not guaranteed unique (the
  # OMN-14395/OMN-14396 bug shape). MUST run as a job in THIS workflow file —
  # the ci-summary poller (see scripts/ci/ci_summary_gate.py) only sees jobs
  # from its own run_id; a check defined in a separate workflow file is
  # structurally invisible to it regardless of required_status_checks wiring.
  # Unconditional (no `if:`, no `needs:`) — always runs to a terminal
  # success/failure, listed in SPEC_REQUIRED_VALIDATOR_JOBS.
  duplicate-registry-ids:
    name: Duplicate Registry Ids
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ValidatorDuplicateConfigIds unit tests
        run: |
          uv run pytest tests/unit/validation/test_validator_duplicate_config_ids.py -v

      - name: Check for duplicate ids in manifest-declared registries
        run: |
          uv run python -m omnibase_core.validation.validator_duplicate_config_ids \
            --manifest .duplicate-id-registries.yaml \
            --repo-root .

  # Hardcoded-topic-string gate (OMN-13294), migrated in (OMN-14430) from the
  # standalone validator-hardcoded-topic.yml workflow. MUST run as a job in
  # THIS workflow file — the ci-summary poller (scripts/ci/ci_summary_gate.py)
  # only sees jobs from its own run_id; a check defined in a separate workflow
  # file is structurally invisible to it regardless of required_status_checks
  # wiring (the exact gap OMN-14430 audited and closed for this instance).
  # Unconditional (no `if:`, no `needs:`) — always runs to a terminal
  # success/failure, listed in SPEC_REQUIRED_VALIDATOR_JOBS.
  hardcoded-topic-validator:
    name: Hardcoded Topic Validator
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run validator unit tests
        run: |
          uv run pytest tests/unit/validation/hardcoded_topic/ -v

      # Self-scan omnibase_core src/ for hardcoded onex.* topic literals. Lands
      # REPORT-ONLY (--report-only) — ported unchanged from the retired
      # standalone workflow; see validator-hardcoded-topic.yml history for the
      # burn-down rationale (OMN-13294). The BLOCKING enforcement for all NEW
      # pasted topic literals is the check-hardcoded-topic-compute pre-commit
      # hook (same handler, so verdicts cannot drift).
      - name: Self-scan omnibase_core src/ (report mode — baseline burn-down pending)
        run: |
          uv run python -m omnibase_core.validation.hardcoded_topic.runtime_hardcoded_topic \
            --report-only src/omnibase_core/

  # Non-canonical lifecycle-class ratchet (OMN-14350, omnibase_core canary)
  # Blocks any NEW Service/Engine/Adapter/Router/Daemon/Manager/Runner/Registry/
  # Controller/Server/Client class outside the frozen allowlist; --check-stale also
  # fails when an allowlisted FQN no longer exists (count-only-down discipline).
  no-noncanonical-lifecycle-classes:
    name: Non-Canonical Lifecycle-Class Ratchet (OMN-14350)
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ratchet non-canonical lifecycle-word classes against frozen allowlist (OMN-14350)
        run: |
          uv run python -m omnibase_core.validators.no_noncanonical_lifecycle_classes --check-stale src/omnibase_core

  # Pydantic extra="forbid" ratchet (OMN-14515, parent OMN-14208)
  # Asserts the POSITIVE: every Pydantic model must resolve to an explicit
  # extra="forbid" (inheriting it counts). ABSENCE IS A VIOLATION — Pydantic's default
  # for an undeclared extra is "ignore", which SILENTLY DROPS unknown fields; four live
  # data-loss bugs came from exactly that (OMN-14490/14506/14513/14514). Blocks NEW
  # models outright, blocks MODIFIED baselined models, and --check-stale forces the
  # frozen baseline count down (it may never grow).
  pydantic-extra-forbid:
    name: Pydantic extra="forbid" Ratchet (OMN-14515)
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # --enforce-modified diffs against the base branch. A shallow clone has no
          # merge base, and the validator fails CLOSED when it cannot read the diff —
          # so full history is required, not an optimization.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Assert explicit extra="forbid" on every Pydantic model (OMN-14515)
        run: |
          uv run python -m omnibase_core.validators.pydantic_extra_forbid \
            --check-stale \
            --enforce-modified "origin/${{ github.base_ref || 'dev' }}" \
            src/omnibase_core

  # Count-locked pull_request-workflow ratchet (C7 / OMN-14907)
  # Blocks any NEW .github/workflows/*.yml file that triggers on pull_request unless
  # it retires an existing one (net-negative) or carries an expiring waiver. The
  # per-PR workflow-run fan-out (~49 runs/PR here) is the C7 cost driver in
  # docs/plans/2026-07-21-ci-capacity-recovery-plan.md; this is CLAUDE.md's
  # net-negative-surface rule expressed as a MECHANISM. It MUST run as a ci.yml JOB:
  # a job living in a separate pull_request-triggered workflow file would be
  # structurally invisible to ci-summary's default-deny poller (OMN-14430) — and it
  # would itself add to the very surface this ratchet governs.
  pull-request-workflow-ratchet:
    name: Pull-Request Workflow Ratchet (OMN-14907)
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ratchet pull_request-triggered workflow files against the frozen budget (OMN-14907)
        run: |
          uv run python -m omnibase_core.validation.validator_pull_request_workflow_ratchet --repo-root .

  # ---------------------------------------------------------------------------
  # Phase 1.5 - Quality Gate (aggregates all Phase 1 quality checks)
  # ---------------------------------------------------------------------------
  # API-STABLE check_name: "Quality Gate"
  # This is the single required check for branch protection (replaces 6+ individual checks).
  # Individual Phase 1 job names can change without updating branch protection rules.
  quality-gate:
    name: Quality Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    # OMN-13574 (Model B): version-pin-check is intentionally NOT a need here.
    # It carries continue-on-error: true (advisory until OMN-5132 range-pin +
    # matrix alignment land), so its result is always "success" and it could
    # never turn this gate red — listing it in needs implied a gate it does not
    # provide. naming-conventions / pydantic-patterns / aislop-patterns ARE
    # spec-required validators (validator-requirements.yaml) and are now needs so
    # a real violation turns the single required CI Summary rollup red.
    needs: [lint, pyright, exports-validation, mypy-validation-scripts, core-infra-boundary, lint-imports, check-deterministic-skills, docs-validation, node-purity-check, enum-governance, detect-secrets, sdk-boundary-check, contract-compliance, contract-config-compliance, breaking-schema-change, no-env-fallbacks, demo-path-topic-coherence, dispatch-surface-test-required, naming-conventions, pydantic-patterns, aislop-patterns, doc-content-scan, no-new-os-environ, no-noncanonical-lifecycle-classes, pydantic-extra-forbid, pull-request-workflow-ratchet, spdx-headers]
    if: always()

    steps:
      - name: Evaluate quality checks
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          lint="${{ needs.lint.result }}"
          pyright="${{ needs.pyright.result }}"
          exports="${{ needs.exports-validation.result }}"
          mypy_scripts="${{ needs.mypy-validation-scripts.result }}"
          core_infra="${{ needs.core-infra-boundary.result }}"
          lint_imports="${{ needs.lint-imports.result }}"
          det_skills="${{ needs.check-deterministic-skills.result }}"
          docs="${{ needs.docs-validation.result }}"
          purity="${{ needs.node-purity-check.result }}"
          enum_gov="${{ needs.enum-governance.result }}"
          secrets="${{ needs.detect-secrets.result }}"
          sdk_boundary="${{ needs.sdk-boundary-check.result }}"
          # OMN-13574: contract-compliance is in needs but was never captured in
          # the gate logic — it could fail while quality-gate still passed. Same
          # failing-rollup hole this ticket exists to close.
          contract_compliance="${{ needs.contract-compliance.result }}"
          contract_config="${{ needs.contract-config-compliance.result }}"
          breaking_schema="${{ needs.breaking-schema-change.result }}"
          no_env_fallbacks="${{ needs.no-env-fallbacks.result }}"
          demo_path_gate="${{ needs.demo-path-topic-coherence.result }}"
          dispatch_surface="${{ needs.dispatch-surface-test-required.result }}"
          naming="${{ needs.naming-conventions.result }}"
          pydantic="${{ needs.pydantic-patterns.result }}"
          aislop="${{ needs.aislop-patterns.result }}"
          doc_content="${{ needs.doc-content-scan.result }}"
          no_new_os_environ="${{ needs.no-new-os-environ.result }}"
          noncanonical_classes="${{ needs.no-noncanonical-lifecycle-classes.result }}"
          extra_forbid="${{ needs.pydantic-extra-forbid.result }}"
          pr_workflow_ratchet="${{ needs.pull-request-workflow-ratchet.result }}"
          spdx_headers="${{ needs.spdx-headers.result }}"

          # Report each check
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality (lint) | $lint |" >> $GITHUB_STEP_SUMMARY
          echo "| Pyright Type Checking | $pyright |" >> $GITHUB_STEP_SUMMARY
          echo "| Exports Validation | $exports |" >> $GITHUB_STEP_SUMMARY
          echo "| Mypy Validation Scripts | $mypy_scripts |" >> $GITHUB_STEP_SUMMARY
          echo "| Core-Infra Boundary | $core_infra |" >> $GITHUB_STEP_SUMMARY
          echo "| Import Layering Oracle (OMN-14216) | $lint_imports |" >> $GITHUB_STEP_SUMMARY
          echo "| Deterministic Skill Routing | $det_skills |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Validation | $docs |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Purity Check | $purity |" >> $GITHUB_STEP_SUMMARY
          echo "| Enum Governance | $enum_gov |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Secrets | $secrets |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK Boundary Guard | $sdk_boundary |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Compliance | $contract_compliance |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract-Config Compliance | $contract_config |" >> $GITHUB_STEP_SUMMARY
          echo "| Breaking-Schema-Change (OMN-12621) | $breaking_schema |" >> $GITHUB_STEP_SUMMARY
          echo "| No Env Fallbacks (OMN-7227) | $no_env_fallbacks |" >> $GITHUB_STEP_SUMMARY
          echo "| Demo-Path Topic Coherence (OMN-12777) | $demo_path_gate |" >> $GITHUB_STEP_SUMMARY
          echo "| Dispatch-Surface Test Required (OMN-12960) | $dispatch_surface |" >> $GITHUB_STEP_SUMMARY
          echo "| Naming Conventions (OMN-13574) | $naming |" >> $GITHUB_STEP_SUMMARY
          echo "| Pydantic Patterns (OMN-13574) | $pydantic |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Slop Patterns (OMN-13574) | $aislop |" >> $GITHUB_STEP_SUMMARY
          echo "| Doc-Content Scan (OMN-13572) | $doc_content |" >> $GITHUB_STEP_SUMMARY
          echo "| No New os.environ Reads (OMN-13566) | $no_new_os_environ |" >> $GITHUB_STEP_SUMMARY
          echo "| Non-Canonical Lifecycle-Class Ratchet (OMN-14350) | $noncanonical_classes |" >> $GITHUB_STEP_SUMMARY
          echo "| Pydantic extra=\"forbid\" Ratchet (OMN-14515) | $extra_forbid |" >> $GITHUB_STEP_SUMMARY
          echo "| Pull-Request Workflow Ratchet (OMN-14907) | $pr_workflow_ratchet |" >> $GITHUB_STEP_SUMMARY
          echo "| SPDX Headers (OMN-13576) | $spdx_headers |" >> $GITHUB_STEP_SUMMARY

          # Gate logic: all must pass
          if [[ "$lint" == "success" ]] && \
             [[ "$pyright" == "success" ]] && \
             [[ "$exports" == "success" ]] && \
             [[ "$mypy_scripts" == "success" ]] && \
             [[ "$core_infra" == "success" ]] && \
             [[ "$lint_imports" == "success" ]] && \
             [[ "$det_skills" == "success" ]] && \
             [[ "$docs" == "success" ]] && \
             [[ "$purity" == "success" ]] && \
             [[ "$enum_gov" == "success" ]] && \
             [[ "$secrets" == "success" ]] && \
             [[ "$sdk_boundary" == "success" ]] && \
             [[ "$contract_compliance" == "success" ]] && \
             [[ "$contract_config" == "success" ]] && \
             [[ "$breaking_schema" == "success" ]] && \
             [[ "$no_env_fallbacks" == "success" ]] && \
             [[ "$demo_path_gate" == "success" ]] && \
             [[ "$dispatch_surface" == "success" ]] && \
             [[ "$naming" == "success" ]] && \
             [[ "$pydantic" == "success" ]] && \
             [[ "$aislop" == "success" ]] && \
             [[ "$doc_content" == "success" ]] && \
             [[ "$no_new_os_environ" == "success" ]] && \
             [[ "$noncanonical_classes" == "success" ]] && \
             [[ "$extra_forbid" == "success" ]] && \
             [[ "$pr_workflow_ratchet" == "success" ]] && \
             [[ "$spdx_headers" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "All quality checks passed."
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "Quality gate failed. See individual check results above."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6a - Zone Filter (OMN-10356, reusable in OMN-10400)
  # ---------------------------------------------------------------------------
  # Runs the caller branch's classifier inline. The reusable workflow added in
  # this PR cannot be called by required CI until it exists on main, because
  # GitHub cannot materialize jobs for a new local workflow_call target.
  zone-filter:
    name: Zone Filter (docs-only check)
    needs: [quality-gate]
    if: always() && needs.quality-gate.result == 'success'
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    outputs:
      docs_only: ${{ steps.zone.outputs.docs_only }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute changed files
        id: diff
        env:
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            FILES=$(git diff --name-only "$base"...HEAD | tr '\n' ',')
          elif [ "${{ github.event_name }}" = "push" ] \
            && [ -n "$GH_BEFORE" ] \
            && [ "$GH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "$GH_BEFORE" || true
            FILES=$(git diff --name-only "$GH_BEFORE" "$GH_SHA" | tr '\n' ',')
          else
            FILES=""
          fi
          echo "changed_files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run zone-diff filter
        id: zone
        env:
          ZONE_DIFF_FILTER_FAKE_DIFF: ${{ steps.diff.outputs.changed_files }}
          PYTHONPATH: src
        run: |
          if [ -z "$ZONE_DIFF_FILTER_FAKE_DIFF" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: no reliable diff for this event - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          set +e
          python scripts/zone_diff_filter.py --check docs-only
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Zone filter: DOCS-ONLY - heavy matrix may be skipped." >> "$GITHUB_STEP_SUMMARY"
          elif [ $RC -eq 1 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: production/mixed diff - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Zone filter exited with unexpected code $RC - defaulting to full matrix." >&2
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: ERROR (rc=$RC) - defaulting to full matrix." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6 - Detect Changes (shadow mode)
  # ---------------------------------------------------------------------------
  # Runs detect_test_paths and emits 5 outputs for shadow-mode comparison.
  # Outputs consumed by test-parallel (OMN-9852): matrix, split_count, is_full_suite, selected_paths.

  detect-changes:
    name: Detect Changes
    needs: [quality-gate, zone-filter]
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
            # Emit the base SHA so the selector can classify a pyproject.toml diff
            # content-aware (base-vs-head TOML). Only meaningful on pull_request;
            # push/merge_group escalate before the pyproject check regardless.
            echo "base_sha=$base" >> "$GITHUB_OUTPUT"
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
          BASE_SHA: ${{ steps.diff.outputs.base_sha }}
        run: |
          # Pass --base-ref only when we have a base SHA (pull_request). When
          # pyproject.toml is in the diff and no base ref is supplied, the selector
          # fails closed and escalates — the safe default.
          base_arg=()
          if [ -n "$BASE_SHA" ]; then
            base_arg=(--base-ref "$BASE_SHA")
          fi
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            "${base_arg[@]}" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

      # OMN-14342: compute the COUNTERFACTUAL selection with the selector forced
      # ON, independent of ENABLE_SMART_TESTS. Observational only — the full suite
      # still runs on the boundary; this only records what the selector WOULD have
      # skipped so shadow-compare can measure its real-world miss-rate.
      - name: Shadow selection (forced on)
        id: shadow
        env:
          BASE_SHA: ${{ steps.diff.outputs.base_sha }}
        run: |
          base_arg=()
          if [ -n "$BASE_SHA" ]; then
            base_arg=(--base-ref "$BASE_SHA")
          fi
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag on \
            "${base_arg[@]}" \
            > shadow_selection.json
          cat shadow_selection.json

      - name: Upload shadow inputs
        uses: actions/upload-artifact@v7
        with:
          name: shadow-inputs
          path: |
            shadow_selection.json
            changed.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 2 - Full Test Suite
  # ---------------------------------------------------------------------------

  # Parallel test execution — matrix shape driven by detect-changes output (OMN-9852).
  # When ENABLE_SMART_TESTS is off (default), detect-changes emits a 40-shard matrix
  # with full_suite_reason=FEATURE_FLAG_OFF so the full-suite pytest step runs.
  # When the flag is on and the change set is small, detect-changes emits a smaller
  # matrix and selected_paths, activating the smart-selection pytest step instead.
  #
  # Dependency rationale (fail-fast optimization):
  #   - quality-gate: Aggregates all Phase 1 checks (lint, pyright, exports, etc.)
  #   - detect-changes: provides matrix shape, split_count, selected_paths, is_full_suite
  #   - This ensures quality failures are caught BEFORE spawning N test runners
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    # Self-hosted runners can slow sharply under memory pressure when the
    # duration cache is cold; keep the full-suite split timeout above the
    # observed 20-minute saturation boundary.
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Restore test durations cache
        uses: actions/cache/restore@v6
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              github.event_name != 'pull_request'
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --ignore=tests/integration \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -n "$PYTEST_XDIST_WORKERS" \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              github.event_name != 'pull_request'
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --splits 40 \
            --group ${{ matrix.split }} \
            --store-durations \
            --durations-path .test_durations \
            -n "$PYTEST_XDIST_WORKERS" \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Save test durations (full suite only, split 1)
        if: |
          needs.detect-changes.outputs.is_full_suite == 'true' &&
          matrix.split == 1 &&
          success()
        uses: actions/cache/save@v6
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Shadow-mode test-selection compare (OMN-14342) — OBSERVATIONAL, non-blocking
  # ---------------------------------------------------------------------------
  # Compares the forced-on counterfactual selection against the full-suite junit
  # to measure what the selector WOULD have skipped (escaped failures / selected
  # fraction / wall-clock saved). Only meaningful when the ACTUAL run was a full
  # suite (flag off, or is_full_suite escalation) — otherwise there is no full
  # baseline to compare against, so it is gated on that condition. It never fails
  # the build (continue-on-error) and never changes what runs. The record artifact
  # is harvested to the durable ci-shadow-metrics branch by a separate workflow.
  shadow-compare:
    name: Shadow Selection Compare
    needs: [detect-changes, test-parallel]
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    # Run whenever the actual test-parallel run was a full suite (the only case
    # with a complete baseline). During rollout ENABLE_SMART_TESTS is off, so this
    # is every non-docs dev PR.
    if: >-
      always()
      && needs.detect-changes.result == 'success'
      && (vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true')
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download shadow inputs
        uses: actions/download-artifact@v8
        with:
          name: shadow-inputs
          path: shadow-inputs

      - name: Download full-suite junit
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: junit-artifacts

      - name: Build shadow record
        env:
          SHADOW_PR_NUMBER: ${{ github.event.pull_request.number }}
          SHADOW_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SHADOW_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          uv run python -m scripts.ci.test_selection_shadow \
            --selection shadow-inputs/shadow_selection.json \
            --changed-files-from shadow-inputs/changed.txt \
            --junit-dir junit-artifacts \
            --out shadow_record.json
          echo "## Shadow test-selection record" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat shadow_record.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload shadow record
        uses: actions/upload-artifact@v7
        with:
          name: shadow-record-${{ github.run_id }}
          path: shadow_record.json
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Integration Tests — always-run 4-split matrix (OMN-9851)
  # ---------------------------------------------------------------------------
  tests-integration:
    name: Integration Tests (Split ${{ matrix.split }}/4)
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 30
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        split: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests (split ${{ matrix.split }}/4)
        run: |
          uv run pytest tests/integration/ \
            --splits 4 --group ${{ matrix.split }} \
            -n "$PYTEST_XDIST_WORKERS" --timeout=120 --tb=short \
            --junitxml=junit-int-${{ matrix.split }}.xml

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-int-${{ matrix.split }}
          path: junit-int-${{ matrix.split }}.xml

  # ---------------------------------------------------------------------------
  # Phase 3 - Gates and Summary
  # ---------------------------------------------------------------------------

  # Tests Gate - aggregates test matrix results (dynamic shard count via OMN-9852)
  # API-STABLE check_name: "Tests Gate"
  # Shard count can change without updating branch protection rules.
  # GitHub Actions auto-aggregates matrix shard results into a single job result,
  # so this gate works for any matrix size (1, 4, 5, or 40 shards). No hardcoded count needed.
  tests-gate:
    name: Tests Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    needs: [test-parallel, tests-integration]
    if: always()

    steps:
      - name: Evaluate test results
        run: |
          echo "## Tests Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          parallel="${{ needs.test-parallel.result }}"
          integration="${{ needs.tests-integration.result }}"

          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Parallel Tests (dynamic splits) | $parallel |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests (4 splits) | $integration |" >> $GITHUB_STEP_SUMMARY

          # Accept "success" (tests ran and passed) or "skipped" (tests correctly
          # skipped because upstream quality-gate was skipped, e.g. dependabot PRs
          # that only touch .github/ files and skip version-pin-check).
          if [[ ("$parallel" == "success" || "$parallel" == "skipped") && \
                ("$integration" == "success" || "$integration" == "skipped") ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: PASSED** (unit=$parallel integration=$integration)" >> $GITHUB_STEP_SUMMARY
            echo "Test matrix result: unit=$parallel integration=$integration"
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "::error::tests gate failed (unit=$parallel integration=$integration)"
            exit 1
          fi

  # CI Summary - final aggregator for all gates (OMN-2226)
  # Cross-repo boundary validation (OMN-6576, OMN-10978)
  # Blocking mode: boundary parity is an architectural CI gate.
  boundary-validation:
    name: Cross-repo boundary validation
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    steps:
      - uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@77f63a25b67db14dbca603ed8f841c3c5c4ee93e # dev
        with:
          checks: "boundary-parity"
          warn-only: "false"
          repos: "omniclaude,omnidash,omniintelligence,omnibase_infra,omnibase_core,omnimemory,omnimarket,onex_change_control"

  # API-STABLE check_name: "CI Summary"
  # Aggregates Quality Gate + Tests Gate into a single top-level status.
  # Not strictly required for omnibase_core (no path filtering on Tier A gates),
  # but added for uniformity across all OmniNode repos.

  contract-compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
      - name: Clone onex_change_control
        run: |
          occ_dir="${RUNNER_TEMP}/onex_change_control_contract_compliance"
          occ_ref="3c98ab30af75650952246c3467e02e240552427f"
          rm -rf "$occ_dir"
          git init "$occ_dir"
          git -C "$occ_dir" remote add origin https://github.com/OmniNode-ai/onex_change_control.git
          git -C "$occ_dir" fetch --depth=1 origin "$occ_ref"
          git -C "$occ_dir" checkout --detach FETCH_HEAD
          echo "OCC_DIR=$occ_dir" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.3"
      # OMN-14436: this step does NOT execute DoD check_values, and the comment that
      # used to sit here claimed otherwise ("OMN-8808 — replaces dead
      # run_contract_compliance_check.py ref"). NOTHING REPLACED IT.
      #
      # validate-yaml only parses the contract YAML. A green result here means exactly
      # "the contract files are well-formed" — it says nothing about whether the PR's
      # evidence is true. The real executor (run_contract_compliance_check.py) was
      # deleted platform-wide in 2026-04 on a misdiagnosis: it was reported "missing"
      # only because onex_change_control's DEFAULT branch lagged the branch that had
      # it. The DoD gate has been dead here ever since, behind this green check.
      #
      # The executor is revived and proven in onex_change_control (OMN-14436) and wired
      # into omnibase_infra as the canary (OMN-14454), where it executes check_values
      # against the PRODUCT tree and is demonstrated to BLOCK. Fan-out to this repo is a
      # deliberate, watched decision — NOT a default — because a gate nobody watched
      # come up is a gate nobody has. Until then this step keeps its real, narrow name.
      - name: Parse ticket contract YAML (does NOT execute DoD checks — see OMN-14436)
        run: cd "$OCC_DIR" && uv run validate-yaml "$GITHUB_WORKSPACE"/contracts/OMN-*.yaml

  ci-summary:
    name: CI Summary
    # OMN-14127: REQUIRED branch-protection context, implemented as a NO-`needs`,
    # GitHub-hosted, FAIL-CLOSED poller (ported from omniclaude #1870). A
    # `needs`-gated job gets no check-run until its `needs` terminalize, so under
    # self-hosted fleet saturation the old needs-based CI Summary
    # (needs: [quality-gate, tests-gate, contract-compliance, boundary-validation],
    # all self-hosted leaves) was ABSENT forever and the PR wedged BLOCKED with no
    # auto-recovery. With NO `needs` this job's check-run instantiates immediately
    # (the required context can never be absent); it polls the current run's job
    # conclusions and posts a terminal success/failure within a bounded deadline.
    # DEFAULT-DENY: green ONLY when every aggregate gate is present+good AND no
    # non-allowlisted job failed — see scripts/ci/ci_summary_gate.py for the
    # auditable gating set + soft-allowlist (unit-tested in
    # tests/unit/scripts/ci/test_ci_summary_gate.py). Pure hosted GitHub-API
    # polling: zero self-hosted/LAN dependency. DO NOT rename — the job name IS the
    # required context; a rename re-wedges every PR.
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: read
      contents: read
    # Deadline (below) is comfortably under any run-cancellation window so the
    # required context ALWAYS posts a terminal state first. On pull_request the
    # concurrency group does NOT cancel-in-progress (only merge_group does), so
    # there is effectively no shorter PR cancel window than GitHub's job default.
    # This job timeout is only a hard backstop above the internal poll deadline.
    timeout-minutes: 100
    steps:
      - name: Checkout (gate script)
        uses: actions/checkout@v7
      - name: Poll run jobs and compute fail-closed CI Summary verdict
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          # Bounded poll window (minutes) — kept under the run-cancel window so
          # the required context always reaches a terminal state first.
          DEADLINE_MINUTES: "90"
          POLL_INTERVAL_SECONDS: "45"
        run: |
          # GitHub invokes this step as `bash -e {0}`; disable errexit because the
          # gate script's non-zero exit codes are handled explicitly below
          # (2 = PENDING must NOT terminate the poll loop).
          set +e
          set -uo pipefail
          deadline=$(( $(date +%s) + DEADLINE_MINUTES * 60 ))
          attempt=0
          while true; do
            attempt=$((attempt + 1))
            if ! gh api --paginate \
                "repos/${GH_REPO}/actions/runs/${RUN_ID}/jobs?filter=all&per_page=100" \
                --jq '.jobs[]' | jq -s '.' > jobs.json; then
              echo "gh api fetch failed (attempt ${attempt}); retrying after ${POLL_INTERVAL_SECONDS}s"
              sleep "${POLL_INTERVAL_SECONDS}"
              continue
            fi
            python3 scripts/ci/ci_summary_gate.py --jobs-file jobs.json --run-attempt "${RUN_ATTEMPT}"
            rc=$?
            case "${rc}" in
              0) echo "::notice::CI Summary = SUCCESS (all gating jobs provably passed)"; exit 0 ;;
              1) echo "::error::CI Summary = FAILURE (fail-closed: a gating job failed/cancelled)"; exit 1 ;;
              2) : ;;  # PENDING — gating jobs still running; keep polling
              *) echo "::error::ci_summary_gate.py returned unexpected code ${rc}; failing closed"; exit 1 ;;
            esac
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::CI Summary poll deadline (${DEADLINE_MINUTES}m) reached with gating jobs still pending — failing closed"
              python3 scripts/ci/ci_summary_gate.py --jobs-file jobs.json --run-attempt "${RUN_ATTEMPT}" --report-only || true
              exit 1
            fi
            sleep "${POLL_INTERVAL_SECONDS}"
          done

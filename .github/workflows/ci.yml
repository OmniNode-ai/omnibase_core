    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Checkout onex_change_control standards
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/onex_change_control
          token: ${{ secrets.CROSS_REPO_PAT }}

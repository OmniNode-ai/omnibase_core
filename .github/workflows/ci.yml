      - name: Validate class naming conventions
        run: uv run python scripts/validate_class_naming.py

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Pydantic Patterns (OMN-13574: Model B failing-rollup enforcement)
  # validator-requirements.yaml requires `pydantic-patterns`. The handshake
  # consumer's CI keyword "pydantic" previously matched ONLY incidental
  # `pip install pydantic` lines in receipt-gate / occ-preflight — there was NO
  # real pydantic-patterns validator job in CI. This job runs the actual
  # validator and feeds quality-gate so it gates the required rollup.
  pydantic-patterns:
    name: Pydantic Patterns
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate Pydantic patterns
        run: |
          # Match the pre-commit file scope: src/ excluding tests/, archived/,
          # archive/, and scripts/validation/ (where the validator lives).
          files=$(git ls-files 'src/**/*.py' \
            | grep -vE '^(tests/|archived/|archive/|scripts/validation/)' || true)
          if [ -z "$files" ]; then
            echo "No src/ Python files to validate."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python scripts/validation/validate-pydantic-patterns.py $files

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # AI-Slop Patterns (OMN-13574: Model B failing-rollup enforcement)
  # validator-requirements.yaml requires `aislop-patterns`. Previously this only
  # ran in omni-standards-compliance.yml (`ai-slop-check`), which is NOT in
  # branch protection. This copy runs the same strict scan over the full tracked
  # tree and feeds quality-gate so a real AI-slop violation turns the required
  # rollup red. Full-tree scan (not changed-files) avoids the merge_group /
  # no-diff exit-0 hole on the required path.
  aislop-patterns:
    name: AI Slop Patterns
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check tracked tree for AI-slop patterns (strict)
        run: |
          # Mirror the pre-commit / omni-standards exclude set: CHANGELOG.md,
          # docs/, and intentional syntax-error fixtures.
          files=$(git ls-files '*.py' '*.md' \
            | grep -vE '^(CHANGELOG\.md|docs/|tests/fixtures/validation/)' || true)
          if [ -z "$files" ]; then
            echo "No Python/Markdown files to scan."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python scripts/validation/check_ai_slop.py --strict $files

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Doc-Content Scan (OMN-13572: wire doc_content_scan as a required gate)
  # validator-requirements.yaml requires `doc-content-scan` on omnibase_core
  # (pilot). Runs the SAME corpus-accepted COMPUTE validator (OMN-13569) the
  # pre-commit hook runs — here over the full tracked documentation set — and
  # feeds quality-gate so a local-environment trace or unexempted OMN-<digits>
  # ticket reference in a doc turns the single required CI Summary rollup red.
  # The runner's EFFECT boundary selects docs-only extensions and the handler
  # applies the path-based exemptions (onex_change_control/ + contracts/ for the
  # OMN rule, SKILL.md `ticket:` frontmatter). Full-tree scan (not changed-files)
  # avoids the merge_group / no-diff exit-0 hole on the required path.
  doc-content-scan:
    name: Doc-Content Scan
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Scan documentation for local-env traces + ticket refs (OMN-13572)
        run: |
          # tests/ carry intentional doc-content fixtures (the violations the
          # scanner-under-test must flag); archived/ is frozen history. The
          # runner filters to docs-only extensions; the handler applies the
          # onex_change_control/ + contracts/ + SKILL.md `ticket:` exemptions.
          files=$(git ls-files '*.md' '*.mdx' '*.rst' '*.txt' '*.adoc' \
            | grep -vE '^(tests/|archived/|archive/)' || true)
          if [ -z "$files" ]; then
            echo "No documentation files to scan."
            exit 0
          fi
          # shellcheck disable=SC2086
          uv run python -m omnibase_core.validation.doc_content_scan.runtime_doc_content_scan $files

  # ---------------------------------------------------------------------------
  # Phase 1.5 - Quality Gate (aggregates all Phase 1 quality checks)
  # ---------------------------------------------------------------------------
  # API-STABLE check_name: "Quality Gate"
  # This is the single required check for branch protection (replaces 6+ individual checks).
  # Individual Phase 1 job names can change without updating branch protection rules.
  quality-gate:
    name: Quality Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    # OMN-13574 (Model B): version-pin-check is intentionally NOT a need here.
    # It carries continue-on-error: true (advisory until OMN-5132 range-pin +
    # matrix alignment land), so its result is always "success" and it could
    # never turn this gate red — listing it in needs implied a gate it does not
    # provide. naming-conventions / pydantic-patterns / aislop-patterns ARE
    # spec-required validators (validator-requirements.yaml) and are now needs so
    # a real violation turns the single required CI Summary rollup red.
    needs: [lint, pyright, exports-validation, mypy-validation-scripts, core-infra-boundary, check-deterministic-skills, docs-validation, node-purity-check, enum-governance, detect-secrets, sdk-boundary-check, contract-compliance, contract-config-compliance, breaking-schema-change, no-env-fallbacks, demo-path-topic-coherence, dispatch-surface-test-required, naming-conventions, pydantic-patterns, aislop-patterns, doc-content-scan]
    if: always()

    steps:
      - name: Evaluate quality checks
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          lint="${{ needs.lint.result }}"
          pyright="${{ needs.pyright.result }}"
          exports="${{ needs.exports-validation.result }}"
          mypy_scripts="${{ needs.mypy-validation-scripts.result }}"
          core_infra="${{ needs.core-infra-boundary.result }}"
          det_skills="${{ needs.check-deterministic-skills.result }}"
          docs="${{ needs.docs-validation.result }}"
          purity="${{ needs.node-purity-check.result }}"
          enum_gov="${{ needs.enum-governance.result }}"
          secrets="${{ needs.detect-secrets.result }}"
          sdk_boundary="${{ needs.sdk-boundary-check.result }}"
          # OMN-13574: contract-compliance is in needs but was never captured in
          # the gate logic — it could fail while quality-gate still passed. Same
          # failing-rollup hole this ticket exists to close.
          contract_compliance="${{ needs.contract-compliance.result }}"
          contract_config="${{ needs.contract-config-compliance.result }}"
          breaking_schema="${{ needs.breaking-schema-change.result }}"
          no_env_fallbacks="${{ needs.no-env-fallbacks.result }}"
          demo_path_gate="${{ needs.demo-path-topic-coherence.result }}"
          dispatch_surface="${{ needs.dispatch-surface-test-required.result }}"
          naming="${{ needs.naming-conventions.result }}"
          pydantic="${{ needs.pydantic-patterns.result }}"
          aislop="${{ needs.aislop-patterns.result }}"
          doc_content="${{ needs.doc-content-scan.result }}"

          # Report each check
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality (lint) | $lint |" >> $GITHUB_STEP_SUMMARY
          echo "| Pyright Type Checking | $pyright |" >> $GITHUB_STEP_SUMMARY
          echo "| Exports Validation | $exports |" >> $GITHUB_STEP_SUMMARY
          echo "| Mypy Validation Scripts | $mypy_scripts |" >> $GITHUB_STEP_SUMMARY
          echo "| Core-Infra Boundary | $core_infra |" >> $GITHUB_STEP_SUMMARY
          echo "| Deterministic Skill Routing | $det_skills |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Validation | $docs |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Purity Check | $purity |" >> $GITHUB_STEP_SUMMARY
          echo "| Enum Governance | $enum_gov |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Secrets | $secrets |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK Boundary Guard | $sdk_boundary |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Compliance | $contract_compliance |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract-Config Compliance | $contract_config |" >> $GITHUB_STEP_SUMMARY
          echo "| Breaking-Schema-Change (OMN-12621) | $breaking_schema |" >> $GITHUB_STEP_SUMMARY
          echo "| No Env Fallbacks (OMN-7227) | $no_env_fallbacks |" >> $GITHUB_STEP_SUMMARY
          echo "| Demo-Path Topic Coherence (OMN-12777) | $demo_path_gate |" >> $GITHUB_STEP_SUMMARY
          echo "| Dispatch-Surface Test Required (OMN-12960) | $dispatch_surface |" >> $GITHUB_STEP_SUMMARY
          echo "| Naming Conventions (OMN-13574) | $naming |" >> $GITHUB_STEP_SUMMARY
          echo "| Pydantic Patterns (OMN-13574) | $pydantic |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Slop Patterns (OMN-13574) | $aislop |" >> $GITHUB_STEP_SUMMARY
          echo "| Doc-Content Scan (OMN-13572) | $doc_content |" >> $GITHUB_STEP_SUMMARY

          # Gate logic: all must pass
          if [[ "$lint" == "success" ]] && \
             [[ "$pyright" == "success" ]] && \
             [[ "$exports" == "success" ]] && \
             [[ "$mypy_scripts" == "success" ]] && \
             [[ "$core_infra" == "success" ]] && \
             [[ "$det_skills" == "success" ]] && \
             [[ "$docs" == "success" ]] && \
             [[ "$purity" == "success" ]] && \
             [[ "$enum_gov" == "success" ]] && \
             [[ "$secrets" == "success" ]] && \
             [[ "$sdk_boundary" == "success" ]] && \
             [[ "$contract_compliance" == "success" ]] && \
             [[ "$contract_config" == "success" ]] && \
             [[ "$breaking_schema" == "success" ]] && \
             [[ "$no_env_fallbacks" == "success" ]] && \
             [[ "$demo_path_gate" == "success" ]] && \
             [[ "$dispatch_surface" == "success" ]] && \
             [[ "$naming" == "success" ]] && \
             [[ "$pydantic" == "success" ]] && \
             [[ "$aislop" == "success" ]] && \
             [[ "$doc_content" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "All quality checks passed."
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "Quality gate failed. See individual check results above."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6a - Zone Filter (OMN-10356, reusable in OMN-10400)
  # ---------------------------------------------------------------------------
  # Runs the caller branch's classifier inline. The reusable workflow added in
  # this PR cannot be called by required CI until it exists on main, because
  # GitHub cannot materialize jobs for a new local workflow_call target.
  zone-filter:
    name: Zone Filter (docs-only check)
    needs: quality-gate
    if: always() && needs.quality-gate.result == 'success'
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    outputs:
      docs_only: ${{ steps.zone.outputs.docs_only }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute changed files
        id: diff
        env:
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            FILES=$(git diff --name-only "$base"...HEAD | tr '\n' ',')
          elif [ "${{ github.event_name }}" = "push" ] \
            && [ -n "$GH_BEFORE" ] \
            && [ "$GH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "$GH_BEFORE" || true
            FILES=$(git diff --name-only "$GH_BEFORE" "$GH_SHA" | tr '\n' ',')
          else
            FILES=""
          fi
          echo "changed_files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run zone-diff filter
        id: zone
        env:
          ZONE_DIFF_FILTER_FAKE_DIFF: ${{ steps.diff.outputs.changed_files }}
          PYTHONPATH: src
        run: |
          if [ -z "$ZONE_DIFF_FILTER_FAKE_DIFF" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: no reliable diff for this event - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          set +e
          python scripts/zone_diff_filter.py --check docs-only
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Zone filter: DOCS-ONLY - heavy matrix may be skipped." >> "$GITHUB_STEP_SUMMARY"
          elif [ $RC -eq 1 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: production/mixed diff - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Zone filter exited with unexpected code $RC - defaulting to full matrix." >&2
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: ERROR (rc=$RC) - defaulting to full matrix." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6 - Detect Changes (shadow mode)
  # ---------------------------------------------------------------------------
  # Runs detect_test_paths and emits 5 outputs for shadow-mode comparison.
  # Outputs consumed by test-parallel (OMN-9852): matrix, split_count, is_full_suite, selected_paths.

  detect-changes:
    name: Detect Changes
    needs: [quality-gate, zone-filter]
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 2 - Full Test Suite
  # ---------------------------------------------------------------------------

  # Parallel test execution — matrix shape driven by detect-changes output (OMN-9852).
  # When ENABLE_SMART_TESTS is off (default), detect-changes emits a 40-shard matrix
  # with full_suite_reason=FEATURE_FLAG_OFF so the full-suite pytest step runs.
  # When the flag is on and the change set is small, detect-changes emits a smaller
  # matrix and selected_paths, activating the smart-selection pytest step instead.
  #
  # Dependency rationale (fail-fast optimization):
  #   - quality-gate: Aggregates all Phase 1 checks (lint, pyright, exports, etc.)
  #   - detect-changes: provides matrix shape, split_count, selected_paths, is_full_suite
  #   - This ensures quality failures are caught BEFORE spawning N test runners
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    # Self-hosted runners can slow sharply under memory pressure when the
    # duration cache is cold; keep the full-suite split timeout above the
    # observed 20-minute saturation boundary.
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Restore test durations cache
        uses: actions/cache/restore@v6
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              github.event_name != 'pull_request'
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --ignore=tests/integration \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -n "$PYTEST_XDIST_WORKERS" \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              github.event_name != 'pull_request'
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --splits 40 \
            --group ${{ matrix.split }} \
            --store-durations \
            --durations-path .test_durations \
            -n "$PYTEST_XDIST_WORKERS" \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Save test durations (full suite only, split 1)
        if: |
          needs.detect-changes.outputs.is_full_suite == 'true' &&
          matrix.split == 1 &&
          success()
        uses: actions/cache/save@v6
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Integration Tests — always-run 4-split matrix (OMN-9851)
  # ---------------------------------------------------------------------------
  tests-integration:
    name: Integration Tests (Split ${{ matrix.split }}/4)
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 30
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        split: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests (split ${{ matrix.split }}/4)
        run: |
          uv run pytest tests/integration/ \
            --splits 4 --group ${{ matrix.split }} \
            -n "$PYTEST_XDIST_WORKERS" --timeout=120 --tb=short \
            --junitxml=junit-int-${{ matrix.split }}.xml

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-int-${{ matrix.split }}
          path: junit-int-${{ matrix.split }}.xml

  # ---------------------------------------------------------------------------
  # Phase 3 - Gates and Summary
  # ---------------------------------------------------------------------------

  # Tests Gate - aggregates test matrix results (dynamic shard count via OMN-9852)
  # API-STABLE check_name: "Tests Gate"
  # Shard count can change without updating branch protection rules.
  # GitHub Actions auto-aggregates matrix shard results into a single job result,
  # so this gate works for any matrix size (1, 4, 5, or 40 shards). No hardcoded count needed.
  tests-gate:
    name: Tests Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    needs: [test-parallel, tests-integration]
    if: always()

    steps:
      - name: Evaluate test results
        run: |
          echo "## Tests Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          parallel="${{ needs.test-parallel.result }}"
          integration="${{ needs.tests-integration.result }}"

          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Parallel Tests (dynamic splits) | $parallel |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests (4 splits) | $integration |" >> $GITHUB_STEP_SUMMARY

          # Accept "success" (tests ran and passed) or "skipped" (tests correctly
          # skipped because upstream quality-gate was skipped, e.g. dependabot PRs
          # that only touch .github/ files and skip version-pin-check).
          if [[ ("$parallel" == "success" || "$parallel" == "skipped") && \
                ("$integration" == "success" || "$integration" == "skipped") ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: PASSED** (unit=$parallel integration=$integration)" >> $GITHUB_STEP_SUMMARY
            echo "Test matrix result: unit=$parallel integration=$integration"
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "::error::tests gate failed (unit=$parallel integration=$integration)"
            exit 1
          fi

  # CI Summary - final aggregator for all gates (OMN-2226)
  # Cross-repo boundary validation (OMN-6576, OMN-10978)
  # Blocking mode: boundary parity is an architectural CI gate.
  boundary-validation:
    name: Cross-repo boundary validation
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    steps:
      - uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@552200ce4ac3dae5ac38d2fe1adf17adc7b8a7ac # main
        with:
          checks: "boundary-parity"
          warn-only: "false"
          repos: "omniclaude,omnidash,omniintelligence,omnibase_infra,omnibase_core,omnimemory,onex_change_control"

  # API-STABLE check_name: "CI Summary"
  # Aggregates Quality Gate + Tests Gate into a single top-level status.
  # Not strictly required for omnibase_core (no path filtering on Tier A gates),
  # but added for uniformity across all OmniNode repos.

  contract-compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
      - name: Clone onex_change_control
        run: |
          occ_dir="${RUNNER_TEMP}/onex_change_control_contract_compliance"
          occ_ref="3c98ab30af75650952246c3467e02e240552427f"
          rm -rf "$occ_dir"
          git init "$occ_dir"
          git -C "$occ_dir" remote add origin https://github.com/OmniNode-ai/onex_change_control.git
          git -C "$occ_dir" fetch --depth=1 origin "$occ_ref"
          git -C "$occ_dir" checkout --detach FETCH_HEAD
          echo "OCC_DIR=$occ_dir" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.3"
      - name: Validate all ticket contracts (OMN-8808 — replaces dead run_contract_compliance_check.py ref)
        run: cd "$OCC_DIR" && uv run validate-yaml "$GITHUB_WORKSPACE"/contracts/OMN-*.yaml

  ci-summary:
    name: CI Summary
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    needs: [quality-gate, tests-gate, contract-compliance, boundary-validation]
    if: always()

    steps:
      - name: Evaluate all gates
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          quality="${{ needs.quality-gate.result }}"
          tests="${{ needs.tests-gate.result }}"
          compliance="${{ needs['contract-compliance'].result }}"
          boundary="${{ needs['boundary-validation'].result }}"

          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | $quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Gate | $tests |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance | $compliance |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-repo Boundary Validation | $boundary |" >> $GITHUB_STEP_SUMMARY

          # Accept "success" or "skipped" for gates. Skipped is valid when
          # upstream jobs are correctly skipped (e.g. dependabot PRs).
          quality_ok=$([[ "$quality" == "success" || "$quality" == "skipped" ]] && echo true || echo false)
          tests_ok=$([[ "$tests" == "success" || "$tests" == "skipped" ]] && echo true || echo false)
          compliance_ok=$([[ "$compliance" == "success" || "$compliance" == "skipped" ]] && echo true || echo false)
          boundary_ok=$([[ "$boundary" == "success" || "$boundary" == "skipped" ]] && echo true || echo false)

          if [[ "$quality_ok" == "true" ]] && [[ "$tests_ok" == "true" ]] && [[ "$compliance_ok" == "true" ]] && [[ "$boundary_ok" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**CI Summary: ALL GATES PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "All CI gates passed (quality=$quality, tests=$tests, compliance=$compliance, boundary=$boundary)."
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**CI Summary: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "Gate results:"
            echo "  Quality Gate: $quality"
            echo "  Tests Gate: $tests"
            echo "  Compliance: $compliance"
            echo "  Cross-repo Boundary Validation: $boundary"
            exit 1
          fi

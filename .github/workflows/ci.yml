name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "13 7 * * *"   # 07:13 UTC nightly

# Prevent auto-cancellation of running workflows when new commits are pushed
# This ensures test splits actually run to completion instead of being skipped
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_VERSION: "0.8.3"
  PYTHON_VERSION: "3.12"

jobs:
  # =============================================================================
  # JOB ORDERING RATIONALE (Fail-Fast Optimization)
  # =============================================================================
  #
  # Phase 1 - Quick Validation (parallel, ~2-3 min):
  #   - lint: Code quality (ruff format, ruff check, mypy strict)
  #   - pyright: Type checking (complementary to mypy)
  #   - exports-validation: __all__ exports validation
  #   - docs-validation: Documentation link validation
  #   - node-purity-check: Declarative node purity guarantees
  #   - mypy-validation-scripts: Type check validation scripts
  #   - core-infra-boundary: Transport/I/O import validation (ADR-005)
  #   - check-deterministic-skills: AST-based SkillRoutingError enforcement (OMN-8765)
  #   - enum-governance: Enum architectural standards validation (OMN-1313)
  #   - detect-secrets: Baseline security scan (detect-secrets)
  #
  # Phase 1.5 - Quality Gate:
  #   - quality-gate: Aggregates all Phase 1 quality checks into single gate
  #     This is the API-stable check_name for branch protection
  #
  # Phase 2 - Full Test Suite (after quality-gate passes):
  #   - test-parallel: 40 splits of full test suite (~7-9 min each)
  #     Depends on: quality-gate
  #     This ensures type errors and lint failures are caught BEFORE
  #     spawning 40 parallel test runners (saves ~120 runner-minutes on failure)
  #
  # Phase 3 - Gates and Summary:
  #   - tests-gate: Aggregates 40-shard test matrix results (API-stable gate)
  #   - ci-summary: Final aggregator for all gates
  #
  # This ordering ensures:
  #   1. Fast feedback on code quality issues (type errors, lint, exports)
  #   2. No wasted compute on test splits when validation fails
  #   3. All Phase 1 jobs run in parallel for speed
  #   4. Branch protection uses stable gate names (Quality Gate, Tests Gate)
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Phase 1 - Quick Validation Jobs (all run in parallel)
  # ---------------------------------------------------------------------------

  # Phase 1 validation job - runs in parallel with pyright, exports-validation
  # Must complete before test-parallel starts (fail-fast optimization)
  lint:
    name: Code Quality
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/

      - name: Check ruff linting (includes import sorting)
        run: uv run ruff check src/ tests/

      - name: Run mypy type checking (strict)
        run: uv run mypy src/omnibase_core

  # Phase 1 validation job - runs in parallel with lint, exports-validation
  # Must complete before test-parallel starts (fail-fast optimization)
  # Pyright complements mypy (in lint job) - catches different type error categories
  pyright:
    name: Pyright Type Checking
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pyright type checking
        run: uv run pyright src/omnibase_core

  # Phase 1 validation job - runs in parallel with lint, pyright
  # Must complete before test-parallel starts (fail-fast optimization)
  # Quick check (~5 min) ensures __all__ exports are valid before expensive test splits
  exports-validation:
    name: Exports Validation
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate __all__ exports
        run: uv run python scripts/validation/validate-all-exports.py

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Separate job for validation scripts mypy (not blocking test-parallel)
  # Rationale: These scripts are CI tooling, not core library code
  mypy-validation-scripts:
    name: Mypy Validation Scripts
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy on architectural validation scripts (strict)
        run: |
          uv run mypy --strict \
            scripts/validation/validate-no-direct-io.py \
            scripts/validation/validate-all-exports.py \
            scripts/validation/validate-no-infra-imports.py \
            scripts/validation/validate-check-names.py \
            scripts/check_transport_imports.py

      # check_name Validator (OMN-2229)
      # Validates that every gates[].check_name in required-checks.yaml matches
      # an actual job 'name:' field in the referenced workflow file and that
      # workflow_job_key values resolve to real job keys.
      # Catches drift before it silently breaks branch protection gates.
      - name: Validate check_names in required-checks.yaml (OMN-2229)
        run: uv run python scripts/validation/validate-check-names.py

      # CRITICAL: Transport Import Validation (B+ Hybrid Mode)
      # This step enforces dependency inversion architecture by preventing omnibase_core
      # from importing transport-layer modules (kafka, redis, etc.).
      #
      # Mode selection:
      #   - Feature branches: Changed-files mode (fast ~15s feedback)
      #   - Protected branches (main/develop): Full scan mode (comprehensive validation)
      #
      # WARNING: Do not modify the branch detection logic without understanding RISK-009.
      # See: docs/decisions/RISK-009-ci-workflow-modification-risk.md
      - name: Check for transport import violations (OMN-220)
        id: transport-check
        run: |
          set +e  # Don't exit on first error, capture results

          # Determine what checks to run
          RUN_CHANGED_FILES="false"
          RUN_FULL_SCAN="false"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.base_ref }}" == "main" || "${{ github.base_ref }}" == "develop" ]]; then
              # PR to protected branch: full scan only (changed-files is redundant)
              RUN_FULL_SCAN="true"
              echo "=== Transport Import Check (Full Scan - PR to ${{ github.base_ref }}) ==="
            else
              # PR to non-protected branch: changed files only (fast feedback)
              RUN_CHANGED_FILES="true"
              echo "=== Transport Import Check (Changed Files - PR to ${{ github.base_ref }}) ==="
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Only full scan on pushes to protected branches
            if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/develop" ]]; then
              RUN_FULL_SCAN="true"
              echo "=== Transport Import Check (Full Scan - Push to ${GITHUB_REF#refs/heads/}) ==="
            else
              # Push to non-protected branch: changed files only
              RUN_CHANGED_FILES="true"
              echo "=== Transport Import Check (Changed Files - Push to ${GITHUB_REF#refs/heads/}) ==="
            fi
          fi

          CHANGED_FILES_EXIT=0
          FULL_SCAN_EXIT=0

          if [[ "$RUN_CHANGED_FILES" == "true" ]]; then
            uv run python scripts/check_transport_imports.py --changed-files --verbose
            CHANGED_FILES_EXIT=$?
          fi

          if [[ "$RUN_FULL_SCAN" == "true" ]]; then
            uv run python scripts/check_transport_imports.py --verbose
            FULL_SCAN_EXIT=$?
          fi

          # Output for summary step
          echo "changed_files_exit=$CHANGED_FILES_EXIT" >> $GITHUB_OUTPUT
          echo "full_scan_exit=$FULL_SCAN_EXIT" >> $GITHUB_OUTPUT
          echo "run_changed_files=$RUN_CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "run_full_scan=$RUN_FULL_SCAN" >> $GITHUB_OUTPUT

          # Restore strict mode
          set -e

          # Fail if any check found violations
          if [[ $CHANGED_FILES_EXIT -ne 0 ]] || [[ $FULL_SCAN_EXIT -ne 0 ]]; then
            echo ""
            echo "Transport import violations detected!"
            exit 1
          fi

          echo ""
          echo "All transport import checks passed."

      - name: Transport check summary
        if: always()
        run: |
          echo "## Transport Import Validation (OMN-220)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RUN_CHANGED="${{ steps.transport-check.outputs.run_changed_files }}"
          RUN_FULL="${{ steps.transport-check.outputs.run_full_scan }}"
          CHANGED_EXIT="${{ steps.transport-check.outputs.changed_files_exit }}"
          FULL_EXIT="${{ steps.transport-check.outputs.full_scan_exit }}"

          if [[ "$RUN_CHANGED" == "true" ]]; then
            if [[ "$CHANGED_EXIT" == "0" ]]; then
              echo "- Changed files check: Passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Changed files check: **Failed** (exit code: $CHANGED_EXIT)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- Changed files check: Skipped (targeting protected branch)" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "$RUN_FULL" == "true" ]]; then
            if [[ "$FULL_EXIT" == "0" ]]; then
              echo "- Full scan: Passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Full scan: **Failed** (exit code: $FULL_EXIT)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- Full scan: Skipped (not targeting protected branch)" >> $GITHUB_STEP_SUMMARY
          fi

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Core-Infra Boundary Validation (ADR-005)
  # Enforces that omnibase_core has no direct transport/I/O library imports
  # Complements the Python-based check in mypy-validation-scripts with a simple grep scan
  core-infra-boundary:
    name: Core-Infra Boundary
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate No Transport Imports (ADR-005)
        run: |
          chmod +x ./scripts/validate-no-transport-imports.sh
          ./scripts/validate-no-transport-imports.sh

      - name: Core-Infra boundary summary
        if: always()
        run: |
          echo "## Core-Infra Boundary Validation (ADR-005)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates that omnibase_core has no direct transport/I/O imports:" >> $GITHUB_STEP_SUMMARY
          echo "- No HTTP clients (aiohttp, httpx, requests, urllib3)" >> $GITHUB_STEP_SUMMARY
          echo "- No Kafka clients (kafka-python, aiokafka, confluent-kafka)" >> $GITHUB_STEP_SUMMARY
          echo "- No Redis clients (redis, aioredis)" >> $GITHUB_STEP_SUMMARY
          echo "- No Database clients (asyncpg, psycopg2, aiomysql)" >> $GITHUB_STEP_SUMMARY
          echo "- No Message queues (pika, kombu, celery)" >> $GITHUB_STEP_SUMMARY
          echo "- No gRPC or WebSocket libraries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See: docs/decisions/ADR-005-core-infra-dependency-boundary.md" >> $GITHUB_STEP_SUMMARY

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Deterministic Skill Routing Gate (OMN-8765) — enforces that every Tier 1
  # deterministic skill in omniclaude routes through `onex run-node` / `onex
  # node` (or a Kafka publish) and surfaces `SkillRoutingError`. Blocking gate.
  check-deterministic-skills:
    name: Deterministic Skill Routing
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout omnibase_core
        uses: actions/checkout@v6

      - name: Checkout omniclaude (skill source)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniclaude
          path: _external/omniclaude
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run AST-based skill routing validator (OMN-8765)
        run: |
          python scripts/validate_deterministic_skill_routing.py \
            --skills-root _external/omniclaude/plugins/onex/skills

      - name: Skill routing summary
        if: always()
        run: |
          echo "## Deterministic Skill Routing (OMN-8765)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AST-based CI lint gate — verifies every Tier 1 deterministic" >> $GITHUB_STEP_SUMMARY
          echo "skill:" >> $GITHUB_STEP_SUMMARY
          echo "- declares a node dispatch (\`onex run-node\` / \`onex node\` /" >> $GITHUB_STEP_SUMMARY
          echo "  Kafka publish to \`onex.cmd.*\`)" >> $GITHUB_STEP_SUMMARY
          echo "- imports zero LLM SDKs (anthropic/openai/google.generativeai)" >> $GITHUB_STEP_SUMMARY
          echo "- does not wrap dispatch in subprocess orchestration" >> $GITHUB_STEP_SUMMARY
          echo "- does not call \`client.messages.create\` / completion APIs" >> $GITHUB_STEP_SUMMARY
          echo "- does not contain conditional prose fallback branches" >> $GITHUB_STEP_SUMMARY
          echo "- references \`SkillRoutingError\` with \`do not produce prose\`" >> $GITHUB_STEP_SUMMARY

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Quick documentation check (not blocking test-parallel)
  # Rationale: Doc link validation is independent of code correctness
  docs-validation:
    name: Documentation Validation
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate documentation links
        id: validate-doc-links
        run: |
          uv run onex-validate-links --verbose

      - name: Documentation validation summary
        if: always()
        run: |
          echo "## Documentation Validation" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate-doc-links.outcome }}" = "success" ]; then
            echo "All documentation links validated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "Documentation link validation failed - check logs above for details" >> $GITHUB_STEP_SUMMARY
          fi

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Node Purity Validation (OMN-203) - not blocking test-parallel
  # Rationale: Currently non-blocking (continue-on-error: true) due to tech debt
  # Ensures declarative nodes (COMPUTE, REDUCER) maintain purity guarantees
  node-purity-check:
    name: Node Purity Check
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Node Purity Check
        run: |
          # Node Purity Check (OMN-203)
          # Validates declarative nodes (COMPUTE, REDUCER) maintain purity guarantees
          # TECH DEBT NOTE: Existing 'Any' type violations in node_compute.py and node_reducer.py
          # are tracked tech debt. Once fixed, remove --continue-on-error and make blocking.
          uv run python scripts/check_node_purity.py --verbose
        continue-on-error: true  # Non-blocking until tech debt resolved

      - name: Node purity check summary
        if: always()
        run: |
          echo "## Node Purity Validation (OMN-203)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates that declarative nodes (COMPUTE, REDUCER) maintain purity:" >> $GITHUB_STEP_SUMMARY
          echo "- No I/O operations or network calls" >> $GITHUB_STEP_SUMMARY
          echo "- No forbidden imports (networking, subprocess, threading)" >> $GITHUB_STEP_SUMMARY
          echo "- No class-level mutable state" >> $GITHUB_STEP_SUMMARY
          echo "- No caching decorators that introduce state" >> $GITHUB_STEP_SUMMARY

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Enum Governance Validation (OMN-1313)
  # Ensures all enums follow architectural standards:
  # - Centralized in src/omnibase_core/enums/
  # - Single responsibility per enum
  # - Use StrValueHelper for string serialization
  enum-governance:
    name: Enum Governance Check
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run enum governance validator
        run: uv run python -m omnibase_core.validation.checker_enum_governance src/omnibase_core/

      - name: Enum governance summary
        if: always()
        run: |
          echo "## Enum Governance Validation (OMN-1313)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates enum governance with three rules:" >> $GITHUB_STEP_SUMMARY
          echo "- ENUM_001: Enforce UPPER_SNAKE_CASE naming for enum members" >> $GITHUB_STEP_SUMMARY
          echo "- ENUM_002: Detect Literal type aliases that should be enums" >> $GITHUB_STEP_SUMMARY
          echo "- ENUM_003: Detect duplicate enum values across files (warn-only)" >> $GITHUB_STEP_SUMMARY

  # Phase 1 validation job - runs in parallel with all other Phase 1 jobs
  # Baseline security scan using detect-secrets (OMN-2226)
  # Uses detect-secrets-hook for proper baseline comparison (handles type+hash equality)
  detect-secrets:
    name: Detect Secrets
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run detect-secrets-hook
        run: |
          # Use detect-secrets-hook with baseline for proper CI enforcement.
          # detect-secrets-hook compares findings against the baseline using the
          # full equality model (hashed_secret + type), and exits non-zero only
          # for NEW secrets not already baselined.
          #
          # Excludes: uv.lock (dependency hashes), .venv/, test fixtures,
          # .git/, .secrets.baseline (contains hashed values that self-trigger),
          # workflow YAML (references "secret" in config context)
          set +e
          git ls-files -z | xargs -0 detect-secrets-hook \
            --baseline .secrets.baseline \
            --exclude-files 'uv\.lock' \
            --exclude-files '\.venv/' \
            --exclude-files 'tests/fixtures/' \
            --exclude-files '\.git/' \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files '\.github/workflows/.*\.yml'
          HOOK_EXIT=$?
          set -e

          if [[ $HOOK_EXIT -eq 0 ]]; then
            echo "## Secrets Scan" >> $GITHUB_STEP_SUMMARY
            echo "No new secrets detected (all findings are baselined)." >> $GITHUB_STEP_SUMMARY
          else
            echo "## New Secrets Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "detect-secrets-hook found secrets not present in .secrets.baseline." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If these are false positives, regenerate the baseline:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo 'detect-secrets scan --all-files --exclude-files "uv\.lock" --exclude-files "\.venv/" --exclude-files "tests/fixtures/" --exclude-files "\.git/" --exclude-files "\.secrets\.baseline" --exclude-files "\.github/workflows/.*\.yml" --force-use-all-plugins > .secrets.baseline' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1 - Version Pin Compliance Check (OMN-4806)
  # ---------------------------------------------------------------------------
  # Verifies that this repo's dependency pins are compliant with the shared
  # version matrix defined in onex_change_control/standards/version-matrix.yaml.
  version-pin-check:
    name: Version Pin Compliance
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    # Skip for Dependabot PRs — CROSS_REPO_PAT is not available [OMN-5332]
    if: github.actor != 'dependabot[bot]'
    # Advisory until range pin support (OMN-5132) and matrix alignment land
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout onex_change_control standards
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: onex_change_control
          sparse-checkout: |
            standards/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml packaging

      - name: Check version pin compliance
        run: python onex_change_control/standards/check_version_pins.py --repo omnibase_core --root onex_change_control --repo-path .

  # Phase 1 validation job - ensures no internal OmniNode packages leak into
  # [project.dependencies] (they belong in [project.optional-dependencies]).
  sdk-boundary-check:
    name: SDK Boundary Guard
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check SDK boundary (no internal hard deps)
        run: uv run pytest tests/unit/test_no_internal_deps.py -v

  # ---------------------------------------------------------------------------
  # Phase 1 - ONEX Compliance Check
  # ---------------------------------------------------------------------------
  # Runs `onex compliance check` to validate contracts, handlers, and schemas.
  # Conditional: only runs if the `onex compliance` command is available.
  compliance:
    name: Contract Compliance
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run compliance check
        uses: ./.github/actions/compliance-check

  # ---------------------------------------------------------------------------
  # Phase 1.5 - Quality Gate (aggregates all Phase 1 quality checks)
  # ---------------------------------------------------------------------------
  # API-STABLE check_name: "Quality Gate"
  # This is the single required check for branch protection (replaces 6+ individual checks).
  # Individual Phase 1 job names can change without updating branch protection rules.
  quality-gate:
    name: Quality Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [lint, pyright, exports-validation, mypy-validation-scripts, core-infra-boundary, check-deterministic-skills, docs-validation, node-purity-check, enum-governance, detect-secrets, version-pin-check, sdk-boundary-check, contract-compliance]
    if: always()

    steps:
      - name: Evaluate quality checks
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          lint="${{ needs.lint.result }}"
          pyright="${{ needs.pyright.result }}"
          exports="${{ needs.exports-validation.result }}"
          mypy_scripts="${{ needs.mypy-validation-scripts.result }}"
          core_infra="${{ needs.core-infra-boundary.result }}"
          det_skills="${{ needs.check-deterministic-skills.result }}"
          docs="${{ needs.docs-validation.result }}"
          purity="${{ needs.node-purity-check.result }}"
          enum_gov="${{ needs.enum-governance.result }}"
          secrets="${{ needs.detect-secrets.result }}"
          sdk_boundary="${{ needs.sdk-boundary-check.result }}"

          # Report each check
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality (lint) | $lint |" >> $GITHUB_STEP_SUMMARY
          echo "| Pyright Type Checking | $pyright |" >> $GITHUB_STEP_SUMMARY
          echo "| Exports Validation | $exports |" >> $GITHUB_STEP_SUMMARY
          echo "| Mypy Validation Scripts | $mypy_scripts |" >> $GITHUB_STEP_SUMMARY
          echo "| Core-Infra Boundary | $core_infra |" >> $GITHUB_STEP_SUMMARY
          echo "| Deterministic Skill Routing | $det_skills |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Validation | $docs |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Purity Check | $purity |" >> $GITHUB_STEP_SUMMARY
          echo "| Enum Governance | $enum_gov |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Secrets | $secrets |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK Boundary Guard | $sdk_boundary |" >> $GITHUB_STEP_SUMMARY

          # Gate logic: all must pass
          # node-purity-check is NOT evaluated by this gate (continue-on-error until tech debt resolved)
          if [[ "$lint" == "success" ]] && \
             [[ "$pyright" == "success" ]] && \
             [[ "$exports" == "success" ]] && \
             [[ "$mypy_scripts" == "success" ]] && \
             [[ "$core_infra" == "success" ]] && \
             [[ "$det_skills" == "success" ]] && \
             [[ "$docs" == "success" ]] && \
             [[ "$enum_gov" == "success" ]] && \
             [[ "$secrets" == "success" ]] && \
             [[ "$sdk_boundary" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "All quality checks passed."
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "Quality gate failed. See individual check results above."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6a - Zone Filter (OMN-10356, reusable in OMN-10400)
  # ---------------------------------------------------------------------------
  # Runs the caller branch's classifier inline. The reusable workflow added in
  # this PR cannot be called by required CI until it exists on main, because
  # GitHub cannot materialize jobs for a new local workflow_call target.
  zone-filter:
    name: Zone Filter (docs-only check)
    needs: quality-gate
    if: always() && needs.quality-gate.result == 'success'
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    outputs:
      docs_only: ${{ steps.zone.outputs.docs_only }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute changed files
        id: diff
        env:
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            FILES=$(git diff --name-only "$base"...HEAD | tr '\n' ',')
          elif [ "${{ github.event_name }}" = "push" ] \
            && [ -n "$GH_BEFORE" ] \
            && [ "$GH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "$GH_BEFORE" || true
            FILES=$(git diff --name-only "$GH_BEFORE" "$GH_SHA" | tr '\n' ',')
          else
            FILES=""
          fi
          echo "changed_files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run zone-diff filter
        id: zone
        env:
          ZONE_DIFF_FILTER_FAKE_DIFF: ${{ steps.diff.outputs.changed_files }}
          PYTHONPATH: src
        run: |
          if [ -z "$ZONE_DIFF_FILTER_FAKE_DIFF" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: no reliable diff for this event - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          set +e
          python scripts/zone_diff_filter.py --check docs-only
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Zone filter: DOCS-ONLY - heavy matrix may be skipped." >> "$GITHUB_STEP_SUMMARY"
          elif [ $RC -eq 1 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: production/mixed diff - full matrix will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Zone filter exited with unexpected code $RC - defaulting to full matrix." >&2
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Zone filter: ERROR (rc=$RC) - defaulting to full matrix." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Phase 1.6 - Detect Changes (shadow mode)
  # ---------------------------------------------------------------------------
  # Runs detect_test_paths and emits 5 outputs for shadow-mode comparison.
  # Outputs consumed by test-parallel (OMN-9852): matrix, split_count, is_full_suite, selected_paths.

  detect-changes:
    name: Detect Changes
    needs: [quality-gate, zone-filter]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 2 - Full Test Suite
  # ---------------------------------------------------------------------------

  # Parallel test execution — matrix shape driven by detect-changes output (OMN-9852).
  # When ENABLE_SMART_TESTS is off (default), detect-changes emits a 40-shard matrix
  # with full_suite_reason=FEATURE_FLAG_OFF so the full-suite pytest step runs.
  # When the flag is on and the change set is small, detect-changes emits a smaller
  # matrix and selected_paths, activating the smart-selection pytest step instead.
  #
  # Dependency rationale (fail-fast optimization):
  #   - quality-gate: Aggregates all Phase 1 checks (lint, pyright, exports, etc.)
  #   - detect-changes: provides matrix shape, split_count, selected_paths, is_full_suite
  #   - This ensures quality failures are caught BEFORE spawning N test runners
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Restore test durations cache
        uses: actions/cache/restore@v5
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              (github.event_name != 'pull_request' ||
               github.event.pull_request.head.repo.full_name == github.repository)
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --ignore=tests/integration \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -n auto \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        env:
          # OMN-3327: Performance tests use CI_RUNNER_TYPE to relax thresholds on
          # shared self-hosted runners (15-25% lower throughput vs dedicated runners)
          CI_RUNNER_TYPE: >-
            ${{
              (github.event_name != 'pull_request' ||
               github.event.pull_request.head.repo.full_name == github.repository)
              && 'self-hosted'
              || 'github-hosted'
            }}
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --splits 40 \
            --group ${{ matrix.split }} \
            --store-durations \
            --durations-path .test_durations \
            -n auto \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Save test durations (full suite only, split 1)
        if: |
          needs.detect-changes.outputs.is_full_suite == 'true' &&
          matrix.split == 1 &&
          success()
        uses: actions/cache/save@v5
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Integration Tests — always-run 4-split matrix (OMN-9851)
  # ---------------------------------------------------------------------------
  tests-integration:
    name: Integration Tests (Split ${{ matrix.split }}/4)
    needs: [quality-gate, zone-filter, detect-changes]
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 30
    if: always() && needs.quality-gate.result == 'success' && needs.zone-filter.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        split: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests (split ${{ matrix.split }}/4)
        run: |
          uv run pytest tests/integration/ \
            --splits 4 --group ${{ matrix.split }} \
            -n auto --timeout=120 --tb=short \
            --junitxml=junit-int-${{ matrix.split }}.xml

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-int-${{ matrix.split }}
          path: junit-int-${{ matrix.split }}.xml

  # ---------------------------------------------------------------------------
  # Phase 3 - Gates and Summary
  # ---------------------------------------------------------------------------

  # Tests Gate - aggregates test matrix results (dynamic shard count via OMN-9852)
  # API-STABLE check_name: "Tests Gate"
  # Shard count can change without updating branch protection rules.
  # GitHub Actions auto-aggregates matrix shard results into a single job result,
  # so this gate works for any matrix size (1, 4, 5, or 40 shards). No hardcoded count needed.
  tests-gate:
    name: Tests Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [test-parallel, tests-integration]
    if: always()

    steps:
      - name: Evaluate test results
        run: |
          echo "## Tests Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          parallel="${{ needs.test-parallel.result }}"
          integration="${{ needs.tests-integration.result }}"

          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Parallel Tests (dynamic splits) | $parallel |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests (4 splits) | $integration |" >> $GITHUB_STEP_SUMMARY

          # Accept "success" (tests ran and passed) or "skipped" (tests correctly
          # skipped because upstream quality-gate was skipped, e.g. dependabot PRs
          # that only touch .github/ files and skip version-pin-check).
          if [[ ("$parallel" == "success" || "$parallel" == "skipped") && \
                ("$integration" == "success" || "$integration" == "skipped") ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: PASSED** (unit=$parallel integration=$integration)" >> $GITHUB_STEP_SUMMARY
            echo "Test matrix result: unit=$parallel integration=$integration"
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tests Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "::error::tests gate failed (unit=$parallel integration=$integration)"
            exit 1
          fi

  # CI Summary - final aggregator for all gates (OMN-2226)
  # Cross-repo boundary validation (OMN-6576)
  # Warn-only mode — does not block PRs, just surfaces boundary parity issues.
  boundary-validation:
    name: Cross-repo boundary validation
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    continue-on-error: true
    steps:
      - uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@36865708ae7ecec2f8c5942a1db30a8b3420a879 # main 2026-03-25
        continue-on-error: true
        with:
          checks: "boundary-parity"
          warn-only: "true"

  # API-STABLE check_name: "CI Summary"
  # Aggregates Quality Gate + Tests Gate into a single top-level status.
  # Not strictly required for omnibase_core (no path filtering on Tier A gates),
  # but added for uniformity across all OmniNode repos.

  compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Clone onex_change_control
        run: |
          occ_dir="${RUNNER_TEMP}/onex_change_control_contract_compliance"
          rm -rf "$occ_dir"
          git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git "$occ_dir"
          echo "OCC_DIR=$occ_dir" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.3"
      - name: Validate all ticket contracts (OMN-8808 — replaces dead run_contract_compliance_check.py ref)
        run: cd "$OCC_DIR" && uv run validate-yaml contracts/OMN-*.yaml

  ci-summary:
    name: CI Summary
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [quality-gate, tests-gate, compliance]
    if: always()

    steps:
      - name: Evaluate all gates
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          quality="${{ needs.quality-gate.result }}"
          tests="${{ needs.tests-gate.result }}"
          compliance="${{ needs.compliance.result }}"

          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | $quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Gate | $tests |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance | $compliance |" >> $GITHUB_STEP_SUMMARY

          # Accept "success" or "skipped" for both gates. Skipped is valid when
          # upstream jobs are correctly skipped (e.g. dependabot PRs).
          quality_ok=$([[ "$quality" == "success" || "$quality" == "skipped" ]] && echo true || echo false)
          tests_ok=$([[ "$tests" == "success" || "$tests" == "skipped" ]] && echo true || echo false)
          compliance_ok=$([[ "$compliance" == "success" || "$compliance" == "skipped" ]] && echo true || echo false)

          if [[ "$quality_ok" == "true" ]] && [[ "$tests_ok" == "true" ]] && [[ "$compliance_ok" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**CI Summary: ALL GATES PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "All CI gates passed (quality=$quality, tests=$tests, compliance=$compliance)."
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**CI Summary: FAILED**" >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "Gate results:"
            echo "  Quality Gate: $quality"
            echo "  Tests Gate: $tests"
            echo "  Compliance: $compliance"
            exit 1
          fi

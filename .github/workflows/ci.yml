          sparse-checkout: |
            standards/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml packaging

      - name: Check version pin compliance
        run: python onex_change_control/standards/check_version_pins.py --repo omnibase_core --root onex_change_control --repo-path .

  # Phase 1 validation job - ensures no internal OmniNode packages leak into

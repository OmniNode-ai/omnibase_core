# SPDX-License-Identifier: MIT
#
# OCC Preflight — reusable workflow enforcing OCC eligibility before auto-merge
# and merge_group promotion. (OMN-10485 / OMN-10482 epic)
#
# Design invariants:
#   I1. PR metadata and OCC evidence SHA are resolved exactly once (in `preflight`).
#       All eligibility steps consume the snapshot; they do not re-fetch mutable state.
#   I2. `merge_group` events re-run eligibility fully against the pinned OCC evidence SHA.
#       A cached PASS from the PR-open event cannot satisfy a merge_group run.
#   I3. OCC's own PRs validate evidence from the PR diff (in-tree checkout) to avoid
#       the circular dependency of checking OCC main while merging into OCC main.
#   I4. OCC fetch failure is a hard FAIL — no fallback to stale/cached evidence.
#   I5. Auto-merge cannot arm until this workflow completes with exit 0.
#
# Required status check name: "occ-preflight / eligibility"
#
# Called by per-repo `call-occ-preflight.yml` workflows via `workflow_call`.
# The auto-merge workflow (`auto-merge.yml`) in each repo should list this
# check as a required predecessor via `needs:` to prevent arming on ineligible PRs.
#
# Inputs:
#   contracts-dir:  path to ticket contract YAMLs relative to OCC checkout (default: contracts)
#   receipts-dir:   path to ModelDodReceipt YAMLs relative to OCC checkout (default: drift/dod_receipts)

name: occ-preflight

on:
  workflow_call:
    inputs:
      contracts-dir:
        description: Path to contracts directory relative to OCC checkout.
        type: string
        required: false
        default: contracts
      receipts-dir:
        description: Path to dod_receipts directory relative to OCC checkout.
        type: string
        required: false
        default: drift/dod_receipts

permissions:
  contents: read
  pull-requests: read

jobs:
  eligibility:
    name: eligibility
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10
    # I2: Disable GHA cache so merge_group re-fires fully.
    # A stale PASS from a prior PR-open run cannot satisfy the gate on a new merge_group event.
    env:
      ACTIONS_CACHE_URL: ""
      ACTIONS_RUNTIME_URL: ""
    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      # OMN-13762: Dependency-bot PRs (Dependabot, Renovate) are authored by bots
      # that structurally cannot cite a Linear ticket, an Evidence-Source, or an
      # OCC receipt. Detect a trusted dependency-bot author up front from
      # GitHub-verified PR metadata (never from caller-supplied body text) and
      # skip the eligibility steps below. The job still concludes `success` (its
      # remaining steps are skipped, not failed), so the
      # `occ-preflight / eligibility` status check passes WITHOUT a skip token.
      # The allowlist mirrors validator_receipt_gate.DEPENDENCY_BOT_AUTHORS.
      - name: Detect dependency-bot author (occ-preflight exemption)
        id: bot_exempt
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail

          # Resolve the PR number for both pull_request and merge_group events.
          if [ -n "${PR_NUMBER:-}" ]; then
            resolved_pr_num="$PR_NUMBER"
          elif [ -n "${MERGE_GROUP_HEAD_REF:-}" ]; then
            resolved_pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            [ "$resolved_pr_num" = "$MERGE_GROUP_HEAD_REF" ] && resolved_pr_num=""
          else
            resolved_pr_num=""
          fi

          # GitHub-verified author identity. Prefer the API login; fall back to
          # the event-payload login when the API is unavailable.
          author_login=""
          if [ -n "$resolved_pr_num" ]; then
            author_login="$(gh pr view "$resolved_pr_num" --repo "${{ github.repository }}" --json author --jq '.author.login' 2>/dev/null || true)"
          fi
          if [ -z "$author_login" ]; then
            author_login="${PR_EVENT_AUTHOR:-}"
          fi

          # Trusted dependency-bot allowlist. Matches the gh CLI login form
          # ("app/dependabot") and the raw API/event login form
          # ("dependabot[bot]"). Keep in sync with
          # validator_receipt_gate.DEPENDENCY_BOT_AUTHORS.
          exempt="false"
          case "$author_login" in
            "dependabot[bot]"|"app/dependabot"|"dependabot"|"renovate[bot]"|"app/renovate"|"renovate")
              exempt="true"
              ;;
          esac

          if [ "$exempt" = "true" ]; then
            echo "::notice::OCC-preflight exemption (OMN-13762): PR authored by trusted dependency bot '${author_login}'. Dependency-bump PRs carry no Linear ticket or OCC receipt; the eligibility gate is not applicable. Eligibility steps are skipped; the job still reports success."
          fi
          echo "exempt=${exempt}" >> "$GITHUB_OUTPUT"

      # I1: Resolve all mutable GitHub state exactly once.
      # Writes /tmp/pr_{body,title,author,branch,number}.txt and
      # /tmp/pr_commit_{shas,texts}.txt for downstream steps.
      - name: Resolve PR snapshot
        id: resolve
        if: steps.bot_exempt.outputs.exempt != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_BODY: ${{ github.event.pull_request.body }}
          PR_EVENT_TITLE: ${{ github.event.pull_request.title }}
          PR_EVENT_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_EVENT_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_EVENT_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail
          : > /tmp/pr_commit_shas.txt
          : > /tmp/pr_commit_texts.txt

          write_pr_snapshot() {
            local pr_json="$1"
            printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr_body.txt
            printf '%s' "$pr_json" | jq -r '.title // ""' > /tmp/pr_title.txt
            printf '%s' "$pr_json" | jq -r '.author.login // ""' > /tmp/pr_author.txt
            printf '%s' "$pr_json" | jq -r '.headRefName // ""' > /tmp/pr_branch.txt
            printf '%s' "$pr_json" | jq -r '.commits[]?.oid // empty' > /tmp/pr_commit_shas.txt
            printf '%s' "$pr_json" | jq -r \
              '.commits[]? | ((.messageHeadline // "") + " " + (.messageBody // "" | gsub("\r?\n"; " ")))' \
              > /tmp/pr_commit_texts.txt
          }

          if [ -n "${PR_NUMBER:-}" ]; then
            if pr_json="$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
                --json body,title,author,headRefName,commits 2>/dev/null)"; then
              write_pr_snapshot "$pr_json"
              printf '%s' "$PR_NUMBER" > /tmp/pr_number.txt
            else
              echo "::warning::gh pr view failed for PR #${PR_NUMBER}; using event payload"
              printf '%s' "${PR_EVENT_BODY:-}" > /tmp/pr_body.txt
              printf '%s' "${PR_EVENT_TITLE:-}" > /tmp/pr_title.txt
              printf '%s' "${PR_EVENT_AUTHOR:-}" > /tmp/pr_author.txt
              printf '%s' "${PR_EVENT_BRANCH:-}" > /tmp/pr_branch.txt
              printf '%s\n' "${PR_EVENT_SHA:-}" > /tmp/pr_commit_shas.txt
              printf '%s' "$PR_NUMBER" > /tmp/pr_number.txt
            fi
          elif [ -n "${MERGE_GROUP_HEAD_REF:-}" ]; then
            pr_num="$(printf '%s' "$MERGE_GROUP_HEAD_REF" \
              | sed -E 's@^.*/pr-([0-9]+)-.*$@\1@')"
            if [ -n "$pr_num" ] && [ "$pr_num" != "$MERGE_GROUP_HEAD_REF" ]; then
              pr_json="$(gh pr view "$pr_num" --repo "${{ github.repository }}" \
                --json body,title,author,headRefName,commits)"
              write_pr_snapshot "$pr_json"
              printf '%s' "$pr_num" > /tmp/pr_number.txt
            else
              : > /tmp/pr_body.txt
              : > /tmp/pr_title.txt
              : > /tmp/pr_author.txt
              : > /tmp/pr_branch.txt
              : > /tmp/pr_number.txt
            fi
          else
            : > /tmp/pr_body.txt
            : > /tmp/pr_title.txt
            : > /tmp/pr_author.txt
            : > /tmp/pr_branch.txt
            : > /tmp/pr_number.txt
          fi

      # I1: Resolve Evidence-Source to an exact OCC SHA before checkout.
      # I4: OCC fetch failure is a hard FAIL — no fallback to stale/cached evidence.
      - name: Resolve Evidence-Source
        id: resolve_evidence_source
        if: steps.bot_exempt.outputs.exempt != 'true' && github.repository != 'OmniNode-ai/onex_change_control'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_body="$(cat /tmp/pr_body.txt 2>/dev/null || true)"
          evidence_source="$(printf '%s' "$pr_body" | grep -iE '^Evidence-Source:[[:space:]]+\S' | head -1 | sed -E 's/^Evidence-Source:[[:space:]]*//; s/^[[:space:]]+//; s/[[:space:]]+$//' || true)"

          if [ -z "$evidence_source" ]; then
            echo "::error::OCC PREFLIGHT FAILED: PR body is missing required 'Evidence-Source:' line. Add one of: 'Evidence-Source: OCC#<PR-number>' or 'Evidence-Source: <occ-sha>'"
            exit 1
          fi

          if printf '%s' "$evidence_source" | grep -qiE '^OCC#[0-9]+$'; then
            occ_pr_num="$(printf '%s' "$evidence_source" | sed -E 's/^OCC#//i')"
            occ_json="$(gh pr view "$occ_pr_num" --repo "OmniNode-ai/onex_change_control" --json state,headRefOid,mergeCommit 2>/dev/null || true)"
            occ_state="$(printf '%s' "$occ_json" | jq -r '.state // ""' 2>/dev/null || true)"
            if [ "$occ_state" = "MERGED" ]; then
              occ_sha="$(printf '%s' "$occ_json" | jq -r '.mergeCommit.oid // ""' 2>/dev/null || true)"
            else
              occ_sha="$(printf '%s' "$occ_json" | jq -r '.headRefOid // ""' 2>/dev/null || true)"
            fi
            if [ -z "$occ_sha" ]; then
              echo "::error::OCC PREFLIGHT FAILED: OCC PR #${occ_pr_num} could not be resolved — OCC unavailable or PR not found."
              exit 1
            fi
          elif printf '%s' "$evidence_source" | grep -qiE '^[0-9a-f]{7,40}$'; then
            occ_sha="$(gh api "repos/OmniNode-ai/onex_change_control/commits/${evidence_source}" --jq '.sha' 2>/dev/null || true)"
            if [ -z "$occ_sha" ]; then
              echo "::error::OCC PREFLIGHT FAILED: Evidence-Source SHA could not be canonicalized to a full OCC commit SHA."
              exit 1
            fi
          else
            echo "::error::OCC PREFLIGHT FAILED: Evidence-Source value '${evidence_source}' is not a valid OCC#<number> or hex SHA."
            exit 1
          fi

          echo "sha=${occ_sha}" >> "$GITHUB_OUTPUT"
          echo "::notice::Evidence-Source resolved to OCC SHA: ${occ_sha}"

      # I3: OCC's own PRs use in-tree checkout; other repos check out pinned OCC evidence.
      # I4: OCC fetch failure is a hard FAIL — no fallback to stale/cached evidence.
      - name: Check out onex_change_control (for contracts + receipts)
        if: steps.bot_exempt.outputs.exempt != 'true' && github.repository != 'OmniNode-ai/onex_change_control'
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/onex_change_control
          path: .onex_change_control
          ref: ${{ steps.resolve_evidence_source.outputs.sha }}
          fetch-depth: 1

      # Pin the OCC SHA used for eligibility evaluation. Once resolved here, all
      # subsequent steps use this exact SHA — never re-fetching. (I1, I2)
      - name: Resolve OCC evidence SHA
        id: occ_sha
        if: steps.bot_exempt.outputs.exempt != 'true'
        run: |
          set -euo pipefail
          repo_short="${GITHUB_REPOSITORY##*/}"
          if [ "$repo_short" = "onex_change_control" ]; then
            sha="$(git rev-parse HEAD)"
            root="."
            contracts_dir="${{ inputs.contracts-dir }}"
            receipts_dir="${{ inputs.receipts-dir }}"
          else
            sha="$(git -C .onex_change_control rev-parse HEAD)"
            root=".onex_change_control"
            contracts_dir="$root/${{ inputs.contracts-dir }}"
            receipts_dir="$root/${{ inputs.receipts-dir }}"
          fi
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::OCC SHA resolution failed: '$sha'"
            exit 1
          fi
          {
            echo "sha=$sha"
            echo "root=$root"
            echo "contracts_dir=$contracts_dir"
            echo "receipts_dir=$receipts_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.13
        if: steps.bot_exempt.outputs.exempt != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        if: steps.bot_exempt.outputs.exempt != 'true'
        uses: astral-sh/setup-uv@v7

      # OMN-12565: Runner Python write-contract preflight.
      #
      # The merge-group eligibility check previously installed omnibase-core into
      # the system interpreter via `uv pip install --system`, which writes
      # /usr/local/lib/python3.12/dist-packages. On a freshly recreated
      # self-hosted runner that path is not writable by the `runner` user, so the
      # gate failed until each container was manually chowned — container state,
      # not an image guarantee.
      #
      # The durable shape removes `--system` entirely and installs into a
      # uv-managed virtual environment under $GITHUB_WORKSPACE (always writable
      # on a fresh runner). This preflight asserts that contract up front and
      # fails loudly if it is violated, before any install or gate step runs.
      - name: Preflight runner Python write contract
        if: steps.bot_exempt.outputs.exempt != 'true'
        env:
          OCC_PREFLIGHT_VENV: ${{ github.workspace }}/.occ-preflight-venv
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "::error::OMN-12565 write-contract preflight: GITHUB_WORKSPACE is unset; cannot locate the writable venv root."
            exit 1
          fi

          # Contract part 1: the workspace-rooted venv parent must be writable.
          # This is the path the install step uses instead of the system path.
          venv_parent="$(dirname "$OCC_PREFLIGHT_VENV")"
          probe="${venv_parent}/.omn12565-write-probe"
          if ! ( touch "$probe" && rm -f "$probe" ) 2>/dev/null; then
            echo "::error::OMN-12565 write-contract preflight FAILED: ${venv_parent} is not writable by the runner user. The OCC preflight venv cannot be created. A freshly recreated runner must expose a writable workspace; check the runner image and mount permissions."
            exit 1
          fi

          # Contract part 2: prove we do NOT depend on writing the system
          # dist-packages path. If a workflow ever reintroduces `uv pip install
          # --system`, this preflight is the canary — the venv-only path means
          # /usr/local/lib/python3.12/dist-packages writability is irrelevant.
          system_dist="/usr/local/lib/python3.12/dist-packages"
          if [ -d "$system_dist" ] && [ ! -w "$system_dist" ]; then
            echo "::notice::OMN-12565: ${system_dist} is not writable — that is fine. The OCC preflight installs into ${OCC_PREFLIGHT_VENV} (workspace venv), so the unwritable system path is not part of the contract."
          fi

          echo "::notice::OMN-12565 write-contract preflight PASSED: ${venv_parent} writable; gate uses workspace venv at ${OCC_PREFLIGHT_VENV}; no --system / dist-packages write required."

      # Install omnibase_compat and omnibase_core from source so the validator
      # module is available. Pattern mirrors receipt-gate.yml install block.
      - name: Check out omnibase_compat (transitive dep)
        if: "steps.bot_exempt.outputs.exempt != 'true' && ! hashFiles('./src/omnibase_compat/__init__.py') && ! hashFiles('./omnibase_compat/pyproject.toml')"
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/omnibase_compat
          path: .occ-preflight-deps/omnibase_compat
          ref: main
          fetch-depth: 1

      - name: Check out omnibase_core (for eligibility validator)
        if: "steps.bot_exempt.outputs.exempt != 'true' && ! hashFiles('./src/omnibase_core/__init__.py') && ! hashFiles('./omnibase_core/pyproject.toml')"
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/omnibase_core
          path: .occ-preflight-deps/omnibase_core
          ref: main
          fetch-depth: 1

      - name: Install omnibase_core
        if: steps.bot_exempt.outputs.exempt != 'true'
        # OMN-12565: install into a uv-managed virtual environment under
        # $GITHUB_WORKSPACE instead of the system interpreter. `uv pip install
        # --system` wrote /usr/local/lib/python3.12/dist-packages, which a
        # freshly recreated self-hosted runner cannot write. The workspace venv
        # is always writable, so the write contract no longer depends on a
        # mutable, manually-chowned system path. The venv python is exported as
        # OCC_PREFLIGHT_PY for the downstream eligibility step.
        env:
          OCC_PREFLIGHT_VENV: ${{ github.workspace }}/.occ-preflight-venv
        run: |
          set -euo pipefail

          # Create a clean uv venv in the writable workspace. --clear makes the
          # step idempotent across re-runs on a warm runner.
          uv venv --clear --python 3.13 "$OCC_PREFLIGHT_VENV"
          venv_py="$OCC_PREFLIGHT_VENV/bin/python"

          if [ -f "./omnibase_compat/pyproject.toml" ]; then
            compat_path="./omnibase_compat"
          elif [ -f "./.occ-preflight-deps/omnibase_compat/pyproject.toml" ]; then
            compat_path="./.occ-preflight-deps/omnibase_compat"
          else
            compat_path=""
          fi

          if [ -n "$compat_path" ]; then
            uv pip install --python "$venv_py" --refresh -e "$compat_path"
          fi

          if [ -f "./pyproject.toml" ] && grep -qE '^\s*name\s*=\s*["\x27]omnibase[-_.]core["\x27]' ./pyproject.toml 2>/dev/null; then
            core_path="."
          elif [ -f "./omnibase_core/pyproject.toml" ]; then
            core_path="./omnibase_core"
          elif [ -f "./.occ-preflight-deps/omnibase_core/pyproject.toml" ]; then
            core_path="./.occ-preflight-deps/omnibase_core"
          else
            echo "::error::omnibase_core not installable — no source checkout available"
            exit 1
          fi

          uv pip install --python "$venv_py" \
            'hatchling' \
            'editables' \
            'pydantic>=2.12.5,<3.0.0' \
            'pyyaml>=6.0.2,<7.0.0' \
            'dependency-injector>=4.48.3,<5.0.0' \
            'deepdiff>=8.0.0,<10.0.0' \
            'click>=8.3.1,<9.0.0' \
            'cryptography>=46.0.3,<47.0.0' \
            'jsonschema>=4.25.1,<5.0.0' \
            'httpx>=0.27.0,<1.0.0' \
            'blake3>=1.0.8,<2.0.0' \
            'ruamel-yaml>=0.18.0'

          mkdir -p /tmp/occ-preflight-wheels
          (cd "$core_path" && uv build --wheel --out-dir /tmp/occ-preflight-wheels)

          core_wheel="$(find /tmp/occ-preflight-wheels -maxdepth 1 -type f -name 'omnibase_core-*.whl' | head -1)"
          if [ -z "$core_wheel" ]; then
            echo "::error::omnibase_core wheel was not produced"
            exit 1
          fi

          uv pip install --python "$venv_py" --no-deps --reinstall-package omnibase-core "$core_wheel"

          # Export the venv interpreter for the downstream gate steps so they run
          # against this install instead of bare `python` (the system interpreter).
          echo "OCC_PREFLIGHT_PY=$venv_py" >> "$GITHUB_ENV"

      - name: Verify eligibility validator importable
        if: steps.bot_exempt.outputs.exempt != 'true'
        run: |
          "$OCC_PREFLIGHT_PY" -c "from omnibase_core.validation.validator_occ_merge_eligibility import validate_occ_merge_eligibility" || {
            echo "::error::validator_occ_merge_eligibility not importable after install"
            "$OCC_PREFLIGHT_PY" -c "import omnibase_core, os; print('omnibase_core at:', os.path.dirname(omnibase_core.__file__))" || true
            exit 1
          }

      # Run the eligibility validator. Exit code propagates: 0 = eligible, 1 = ineligible.
      # Auto-merge MUST NOT arm when this step exits non-zero.
      - name: Run OCC eligibility check
        id: occ_eligibility
        if: steps.bot_exempt.outputs.exempt != 'true'
        run: |
          set -euo pipefail

          PR_TITLE="$(cat /tmp/pr_title.txt)"
          PR_BRANCH="$(cat /tmp/pr_branch.txt)"
          PR_NUMBER_RESOLVED="$(cat /tmp/pr_number.txt 2>/dev/null || true)"
          REPO_NAME="${{ github.repository }}"
          REPO_SHORT="${REPO_NAME##*/}"

          if [ -z "$PR_NUMBER_RESOLVED" ]; then
            echo "::error::Could not resolve PR number for OCC eligibility check"
            exit 1
          fi

          commit_args=()
          while IFS= read -r sha; do
            [ -n "$sha" ] && commit_args+=(--pr-commit-sha "$sha")
          done < /tmp/pr_commit_shas.txt
          while IFS= read -r text; do
            [ -n "$text" ] && commit_args+=(--pr-commit-text "$text")
          done < /tmp/pr_commit_texts.txt

          "$OCC_PREFLIGHT_PY" -m omnibase_core.validation.validator_occ_merge_eligibility \
            --repo "$REPO_SHORT" \
            --pr-number "$PR_NUMBER_RESOLVED" \
            --pr-title "$PR_TITLE" \
            --pr-body-file /tmp/pr_body.txt \
            --pr-branch "$PR_BRANCH" \
            --occ-commit-sha "${{ steps.occ_sha.outputs.sha }}" \
            --contracts-dir "${{ steps.occ_sha.outputs.contracts_dir }}" \
            --receipts-dir "${{ steps.occ_sha.outputs.receipts_dir }}" \
            "${commit_args[@]}" \
            | tee /tmp/occ_preflight_result.json

          result_eligible="$("$OCC_PREFLIGHT_PY" -c "import json,sys; d=json.load(open('/tmp/occ_preflight_result.json')); sys.exit(0 if d.get('eligible') else 1)" 2>/dev/null; echo $?)"
          if [ "$result_eligible" != "0" ]; then
            detail="$("$OCC_PREFLIGHT_PY" -c "import json; d=json.load(open('/tmp/occ_preflight_result.json')); print(d.get('detail','(no detail)'))" 2>/dev/null || true)"
            reason="$("$OCC_PREFLIGHT_PY" -c "import json; d=json.load(open('/tmp/occ_preflight_result.json')); print(d.get('reason','(no reason)'))" 2>/dev/null || true)"
            echo "::error::OCC PREFLIGHT FAILED: reason=${reason} — ${detail}"
            echo "::error::Auto-merge cannot arm until OCC eligibility is satisfied."
            echo "::error::Add a passing receipt to drift/dod_receipts/ in onex_change_control for all dod_evidence items cited in this PR's ticket contract."
            exit 1
          fi

          echo "OCC eligibility: PASS (occ_sha=${{ steps.occ_sha.outputs.sha }})"

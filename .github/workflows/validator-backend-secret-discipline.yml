---
# Backend Secret Discipline gate [OMN-13290]
#
# Required status check context: "Backend Secret Discipline / validate"
#
# Runs the validator unit tests then self-scans omnibase_core for literal
# credentials in committed config and missing secret/credential refs on
# authenticated cloud backends. Consumer repos (omnibase_infra, omnimarket, ...)
# wire this by adding the backend-secret-discipline pre-commit hook and a mirror
# of the `validate` job in their own CI.

name: Backend Secret Discipline

on:
  push:
    branches: [main, develop, dev, "hotfix/**"]
  pull_request:
    branches: [main, develop, dev]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

concurrency:
  group: backend-secret-discipline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run validator unit tests
        run: |
          uv run pytest tests/unit/validators/test_backend_secret_discipline.py -v

      - name: Self-scan omnibase_core config (literal credentials + backend refs)
        run: |
          uv run python -m omnibase_core.validators.backend_secret_discipline src/

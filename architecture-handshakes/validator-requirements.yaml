---
# onex-allow-file-todo-marker OMN-13480 reason="this is a validator-requirements registry; several validator descriptions (stub-implementations, no-untracked-todos) name the TODO/FIXME/HACK marker tokens as their SUBJECT — the tokens document what those validators block, they are not agent-left unfinished work"
# Canonical validator requirements for OmniNode-ai downstream repos.
#
# This file is the single source of truth for which validators must be wired
# on every repo's pre-commit + CI + branch protection. The handshake verifier
# (validator_requirements_consumer.py) reads this spec and cross-references
# each downstream repo's .pre-commit-config.yaml + .github/workflows/ + branch
# protection required-checks, and fails loud on any missing/mis-configured
# validator.
#
# Adding a new validator here automatically propagates to all 12 repos via the
# OMN-9050 pin-bump bot: spec change → bot opens a bump PR on every downstream
# repo → each repo's handshake workflow fails until wiring is added.
#
# See: OMN-9048 (validator standardization epic), OMN-9051 (spec),
#      OMN-9115 (spec consumer + enforcement wiring).

schema_version:
  major: 1
  minor: 4
  patch: 0

# Canonical list of all OmniNode repos governed by this spec. The consumer
# uses this list to reject typos in repo arguments. Keep in sync when
# onboarding/offboarding a repo; adding a repo here without wiring its
# validators will surface as gaps on the next handshake run.
known_repos:
  - omniclaude
  - omnibase_compat
  - omnibase_core
  - omnibase_spi
  - omnibase_infra
  - omnidash
  - omnimarket
  - omniintelligence
  - omnimemory
  - omninode_infra
  - omniweb
  - onex_change_control
  # OMN-13579: previously ungoverned public repos — onboarded here so universal
  # validators (applies_to_repos: "all") automatically apply; Python-specific
  # validators added per-repo below based on repo language and content.
  - omnibase  # meta/registry repo (repos.yaml + docs); no Python src
  - omnicursor  # Python repo: cursor AI plugin
  - onex-self-extending-agent  # Python repo: ONEX self-extending agent
  - knowledge-base  # Python tooling + documentation; doc-content-scan applies

# Scopes:
#   - pre_commit: "required" | "optional"  — entry in .pre-commit-config.yaml
#   - ci_workflow: "required" | "optional" — .github/workflows/*.yml that runs it
#   - required_check_on_main: exact context name that must be in branch
#     protection required_status_checks (or null if not gated at that level)
#   - silent_skip_allowed: false (no advisory modes per feedback_no_informational_gates)
#   - excludes.forbidden: regex patterns the exclude list MUST NOT contain
#   - excludes.allowed: regex patterns the exclude list MAY contain (fixtures only)
#   - applies_to_repos: which repos must have this validator wired.
#     "all" = all known_repos. Override with a list for validators that legitimately
#     skip some repos (e.g., Python validators skip omniweb PHP, omnibase meta-repo).
#   - central_source: canonical module/script location
#   - pre_commit_hook_ids: list of acceptable pre-commit hook id substrings.
#     The consumer accepts any repo whose .pre-commit-config.yaml contains at
#     least one hook whose id matches one of these substrings.
#   - ci_workflow_keywords: list of acceptable CI workflow step-name / run-line
#     substrings. The consumer accepts any repo whose .github/workflows/*.yml
#     contains at least one step mentioning one of these keywords.

required_validators:

  hardcoded-local-paths:
    description: |
      Blocks /Users/, /Volumes/, /home/, C:\Users\ absolute paths in source.  # local-path-ok OMN-13294 doc text naming the patterns this gate blocks
      Violations escape this on any repo without the hook wired.
    central_source: "omnibase_core.validation.validator_local_paths"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "validate-local-paths / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validate-local-paths"
      - "check-local-paths"
    ci_workflow_keywords:
      - "validator_local_paths"
      - "validate-local-paths"
    excludes:
      allowed: ["^tests/fixtures/", "^docs/"]
      forbidden: ["^tests/$", "^tests/[^f]", "^src/"]
    applies_to_repos: all

  hardcoded-private-ip:
    description: |
      Blocks hardcoded RFC1918 private-IP literals (10/8, 172.16/12, 192.168/16)
      in source. A quoted private IP is an environment-config leak that breaks
      portability and pins code to one host. Generated by node_generation_consumer
      and corpus-accepted (OMN-13294, G2); executed as a COMPUTE node over the
      event bus (in-memory pre-commit, Kafka in CI). Suppress a line with
      `# onex-allow-internal-ip`; suppress a doc-heavy file whose subject is IP
      literals with `# onex-allow-file-internal-ip`.
    central_source: "omnibase_core.validation.private_ip.runtime_private_ip"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "validate-private-ip / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-private-ip-compute"
      - "private-ip"
    ci_workflow_keywords:
      - "private_ip"
      - "private-ip"
    excludes:
      # Tests legitimately use example private IPs as test data; the gate targets
      # src/ where a hardcoded private IP is a real environment-config leak.
      allowed: ["^tests/", "^docs/"]
      forbidden: ["^src/"]
    applies_to_repos: all

  hardcoded-localhost-url:
    description: |
      Blocks hardcoded http(s)://localhost / http(s)://127.0.0.1 URL literals in
      source. A quoted loopback URL is an endpoint-config leak that only resolves
      on the author's box, never in CI / containers / the .201 server. Generated
      by node_generation_consumer and corpus-accepted (OMN-13480, residual of
      OMN-13294, G2); executed as a COMPUTE node over the event bus (in-memory
      pre-commit, Kafka in CI). The COMPLEMENT of url-authority, whose
      public-https-literal rule deliberately excludes localhost/loopback and whose
      url-const-assignment rule only catches a loopback literal assigned to a
      *_URL/*_ENDPOINT constant. Suppress a line with `# onex-allow-internal-ip`;
      suppress a doc-heavy file whose subject is localhost URL literals with
      `# onex-allow-file-internal-ip`.
    central_source: "omnibase_core.validation.localhost_url.runtime_localhost_url"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "validate-localhost-url / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-localhost-url-compute"
      - "localhost-url"
    ci_workflow_keywords:
      - "localhost_url"
      - "localhost-url"
    excludes:
      # Tests + docs legitimately use example localhost URLs as test/example data;
      # the gate targets src/ where a hardcoded localhost URL is a real
      # endpoint-config leak.
      allowed: ["^tests/", "^docs/"]
      forbidden: ["^src/"]
    applies_to_repos: all

  spdx-headers:
    description: |
      Enforces MIT SPDX headers on source + tests + scripts + examples.
    central_source: "omnibase_core CLI: onex spdx validate"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "SPDX Headers / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validate-spdx-headers"
      - "spdx-headers"
    ci_workflow_keywords:
      - "spdx"
      - "onex spdx validate"
    excludes:
      allowed: ["\\.md$", "\\.ya?ml$", "\\.json$"]
      forbidden: ["^tests/", "^src/"]
    applies_to_repos: all

  no-hardcoded-topics:
    description: |
      Kafka topic strings must come from contract.yaml, not hardcoded in source.
    central_source: "onex_change_control (centralized hook)"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "ARCH-Invariants / no-hardcoded-topics"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "no-hardcoded-topics"
    ci_workflow_keywords:
      - "no-hardcoded-topics"
      - "hardcoded-topics"
    excludes:
      allowed: ["^docs/", "\\.yaml$"]
      forbidden: ["^src/", "^tests/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnimarket
      - omnimemory
      - omniintelligence
      - omninode_infra
      - onex_change_control
      # OMN-13579: these repos have hardcoded topic strings in source
      # (omnicursor: _TOPIC_MAP dict; onex-self-extending-agent: TOPIC_* constants)
      - omnicursor
      - onex-self-extending-agent
      # knowledge-base is doc-only; no contract.yaml / Kafka coupling — excluded

  stub-implementations:
    description: |
      Blocks NotImplementedError, bare pass, bare TODO docstrings in non-test source.
    central_source: "omnibase_core.validation.check_stub_implementations"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Stub Implementations / check"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-stub-implementations"
      - "stub-implementations"
    ci_workflow_keywords:
      - "check_stub_implementations"
      - "stub-implementations"
    excludes:
      allowed: ["^tests/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos with non-test source code
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  enum-governance:
    description: |
      Enforces UPPER_SNAKE_CASE enum members + detects Literal-duplication anti-pattern.
    central_source: "omnibase_core.validation.checker_enum_governance"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Enum Governance / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-enum-governance"
      - "enum-governance"
    ci_workflow_keywords:
      - "checker_enum_governance"
      - "enum-governance"
    excludes:
      allowed: ["^tests/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos using enums
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  naming-conventions:
    description: |
      File-naming (model_*, enum_*, protocol_*, handler_*, service_*, node_*) +
      class-naming prefix (Model*, Enum*, Protocol*, Handler*, Service*).
    central_source: "omnibase_core.validation.validate_naming_conventions"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Naming Conventions / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validate-naming-conventions"
      - "validate-file-naming-conventions"
    ci_workflow_keywords:
      - "naming-conventions"
      - "validate_naming"
    excludes:
      allowed: ["^tests/", "^archived/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos with src/
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  self-gating-workflows:
    description: |
      Blocks cross-repo @main refs in .github/workflows/*.yml (retro §4.8).
      Requires local-path ./.github/workflows/*.yml or pinned SHA/tag.
    central_source: "scripts/check_self_gating_workflows.py (OMN-9039)"
    pre_commit: required
    ci_workflow: optional
    required_check_on_main: null
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-self-gating-workflows"
      - "self-gating-workflows"
    ci_workflow_keywords:
      - "check_self_gating_workflows"
      - "self-gating"
    excludes:
      allowed: []
      forbidden: []
    applies_to_repos: all

  branch-protection-rollout-guard:
    description: |
      PreToolUse Claude Code hook that blocks gh api PUT/PATCH .../branches/*/protection
      unless all required_status_checks contexts are emitted by a workflow on the repo.
      Lives in omniclaude plugin only (runs at Claude-session level).
    central_source: "omniclaude plugins/onex/hooks/lib/branch_protection_verifier.py (OMN-9038)"
    pre_commit: optional
    ci_workflow: optional
    required_check_on_main: null
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "branch-protection-rollout-guard"
    ci_workflow_keywords:
      - "branch_protection_verifier"
    excludes:
      allowed: []
      forbidden: []
    applies_to_repos:
      - omniclaude

  bandit-security:
    description: |
      Python security linting (medium+ severity).
    central_source: "bandit (pip); per-repo .bandit config"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Security Gate / bandit"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "bandit"
    ci_workflow_keywords:
      - "bandit"
    excludes:
      allowed: ["^tests/", "^examples/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      - omninode_infra
      # OMN-13579: Python repos with src/
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  mypy-type-check:
    description: |
      Strict mypy on src/.
    central_source: "mypy (pip); per-repo pyproject.toml [tool.mypy]"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Quality Gate / mypy"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "mypy-type-check"
      - "mypy"
    ci_workflow_keywords:
      - "mypy"
    excludes:
      allowed: ["^tests/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos with src/ + pyproject.toml
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  ruff-format-check:
    description: |
      Ruff format + check, universal across Python repos.
    central_source: "astral-sh/ruff-pre-commit"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Quality Gate / ruff"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "ruff-format"
      - "ruff-fix"
      - "ruff"
    ci_workflow_keywords:
      - "ruff"
    excludes:
      allowed: []
      forbidden: []
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      - omninode_infra
      - onex_change_control
      # OMN-13579: Python repos — ruff applies to all with pyproject.toml
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  aislop-patterns:
    description: |
      Detects AI-generated boilerplate, narrative docstrings, step_narration anti-patterns.
    central_source: "omniclaude plugins/onex/skills/aislop_sweep"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "AI Slop / check"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-ai-slop"
      - "aislop"
    ci_workflow_keywords:
      - "aislop"
      - "ai-slop"
      - "check_ai_slop"
    excludes:
      allowed: ["^docs/", "^CHANGELOG\\.md$"]
      forbidden: ["^src/"]
    applies_to_repos: all

  pydantic-patterns:
    description: |
      Enforces ConfigDict(frozen=True, extra="forbid"), Field(..., description), no Any, PEP 604 unions.
    central_source: "omnibase_core.validation.validate_pydantic_patterns"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Pydantic Patterns / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validate-pydantic-patterns"
      - "validate-pydantic-conventions"
      - "pydantic-patterns"
    ci_workflow_keywords:
      - "pydantic"
    excludes:
      allowed: ["^tests/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos that use pydantic models
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  single-class-per-file:
    description: |
      Enforces one class per .py file (protocols + TypedDicts exempt).
    central_source: "omnibase_core.validation.validate_single_class_per_file"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Single Class / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "onex-single-class-per-file"
      - "single-class-per-file"
    ci_workflow_keywords:
      - "single-class-per-file"
      - "single_class"
    excludes:
      allowed: ["^tests/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omniclaude
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnibase_compat
      - omnimarket
      - omnimemory
      - omniintelligence
      # OMN-13579: Python repos with src/
      - omnicursor
      - onex-self-extending-agent
      - knowledge-base

  detect-secrets:
    description: |
      Yelp/detect-secrets baseline, catches committed API keys / passwords / PEM keys.
    central_source: "Yelp/detect-secrets"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Security Gate / detect-secrets"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "detect-secrets"
    ci_workflow_keywords:
      - "detect-secrets"
      - "detect_secrets"
    excludes:
      allowed: ["\\.secrets\\.baseline$", "^tests/fixtures/"]
      forbidden: []
    applies_to_repos: all

  no-untracked-todos:
    description: |
      Blocks bare TODO/FIXME. Requires # TODO(OMN-XXXX): format.
    central_source: "onex_change_control (centralized)"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "ARCH-Invariants / no-untracked-todos"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "no-untracked-todos"
    ci_workflow_keywords:
      - "no-untracked-todos"
      - "untracked-todos"
    excludes:
      allowed: ["^docs/"]
      forbidden: ["^src/", "^tests/"]
    applies_to_repos: all

  arch-002-no-transport-imports:
    description: |
      Nodes must not import aiokafka/httpx/asyncpg directly (SPI boundary).
      Only handlers/adapters may import transport libraries.
    central_source: "omnibase_core.validation.validate_no_transport_imports"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "ARCH-002 / no-transport-imports"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validate-no-transport-imports"
      - "no-transport-imports"
    ci_workflow_keywords:
      - "validate_no_transport_imports"
      - "no-transport-imports"
    excludes:
      allowed: ["^tests/", "^src/.*/runtime/", "^src/.*/api/", "^src/.*/adapters/"]
      forbidden: ["^src/.*/nodes/"]
    applies_to_repos:
      - omnibase_core
      - omnibase_infra
      - omnibase_spi
      - omnimarket
      - omnimemory
      - omniintelligence

  banned-compose-env-vars:
    description: |
      Detects docker-compose / Kubernetes manifests that reference env vars the
      handler code no longer reads. Bidirectional drift guard between kernel
      version bumps and compose config. Trigger class: OMN-8840 runtime-effects
      crash where banned ONEX_INPUT_TOPIC persisted in compose after code removal.
    central_source: "omnibase_core.validation.validator_banned_compose_vars"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "Compose Drift / validate"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "validator-banned-compose-vars"
      - "banned-compose-vars"
      - "banned-compose-env-vars"
    ci_workflow_keywords:
      - "validator_banned_compose_vars"
      - "banned-compose-vars"
      - "banned-compose-env-vars"
    excludes:
      allowed: []
      forbidden: []
    applies_to_repos:
      - omnibase_infra
      - omninode_infra

  doc-content-scan:
    description: |
      Blocks local-environment traces (RFC1918 LAN IPs, .201/.200 host shorthand,
      personal /Users//home/ paths, ssh user@host, personal e-mail) and Linear
      OMN-<digits> ticket references in DOCUMENTATION files (*.md / *.mdx / .rst /
      .txt / .adoc). The docs-facing union of CLAUDE.md Rule 6 and the
      knowledge-base sanitizer. Generated by node_generation_consumer and
      corpus-accepted (OMN-13569); executed as a COMPUTE node over the event bus
      (in-memory pre-commit, Kafka in CI) — same two-transport seam as the
      private-IP / hardcoded-topic validators.

      EXEMPTIONS (operator-set, OMN-13572):
        * onex_change_control/ paths are exempt from the OMN-<digits> rule only —
          the governance ledger legitimately cites ticket ids; the
          local-environment rules (LAN IP / host / personal path / ssh / e-mail)
          still apply there.
        * contracts/ paths are excluded from the OMN-<digits> rule (contract
          fixtures cite ticket ids).
        * a SKILL.md YAML-frontmatter field `ticket: OMN-NNNN` is exempt (a
          machine-readable skill→ticket binding, not a leaked prose reference).
      Suppress a line with `doc-content-ok`; suppress a doc whose subject IS these
      traces with `doc-content-file-ok`.

      ENFORCEMENT SCOPE: wired + required on omnibase_core (pre-commit hook
      check-doc-content-scan + the doc-content-scan CI job that feeds the airtight
      CI Summary rollup, registered in model_b_rollup_enforcement).
      OMN-13579 extends applies_to_repos to knowledge-base, omnibase, omnicursor,
      and onex-self-extending-agent (all have docs/ with .md content). Wiring the
      pre-commit hook + CI job in those repos is tracked under OMN-13576 (fleet
      rollout) — adding them here surfaces MISSING_PRE_COMMIT / MISSING_CI_WORKFLOW
      gaps in the consumer, which is the correct ratchet posture before wiring lands.
      Further fleet rollout to the remaining repos is also OMN-13576.
    central_source: "omnibase_core.validation.doc_content_scan.runtime_doc_content_scan"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "CI Summary"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "check-doc-content-scan"
      - "doc-content-scan"
    ci_workflow_keywords:
      - "doc_content_scan"
      - "doc-content-scan"
    excludes:
      # Tests carry intentional doc-content fixtures (the violations the scanner
      # must flag); the handler's own package carries the file-level suppression
      # marker. The gate targets the repo's real documentation set.
      allowed: ["^tests/", "^contracts/"]
      forbidden: []
    applies_to_repos:
      - omnibase_core
      # OMN-13579: doc-content-scan applies where docs exist (per ticket DoD).
      # These repos have docs/ directories with .md content and are onboarded by
      # this ticket. Wiring their pre-commit hook + CI job is tracked under OMN-13576
      # (fleet rollout) — adding here means the consumer will surface MISSING_*
      # gaps for them, which is the correct enforcement posture.
      - knowledge-base
      - omnibase
      - omnicursor
      - onex-self-extending-agent

  no-new-os-environ:
    description: |
      Canonical AST-based gate: block ALL os.environ[KEY], os.environ.get(KEY),
      and os.getenv(KEY) reads outside the explicit KEEP_ALLOWLIST of
      structurally required bootstrap/path/CI vars. Generalises the infra
      check-env-reads.sh (OMN-11069/11186) as a single canonical implementation
      deployed from omnibase_core. Converts the platform from "block new vs
      frozen 685 baseline" to "zero env reads outside the named bootstrap set."
      KEEP_ALLOWLIST is the only permitted escape, reviewed in CODEOWNERS.
      Suppression: # env-read-ok: <reason> (structural bootstrap seams only).
      Exempts tests/, scripts/, examples/. DoD proof: deliberate red-test corpus
      in test_no_new_os_environ.py asserts the gate catches real violations.
      OMN-13566 (Wave-4 env-read enforcement ratchet).
    central_source: "omnibase_core.validators.no_new_os_environ"
    pre_commit: required
    ci_workflow: required
    required_check_on_main: "CI Summary"
    silent_skip_allowed: false
    pre_commit_hook_ids:
      - "no-new-os-environ"
    ci_workflow_keywords:
      - "no_new_os_environ"
      - "no-new-os-environ"
    excludes:
      allowed: ["^tests/", "^scripts/", "^examples/"]
      forbidden: ["^src/"]
    applies_to_repos:
      - omnibase_core

# ---------------------------------------------------------------------------
# Model B — failing-rollup enforcement (OMN-13574, epic OMN-13573)
# ---------------------------------------------------------------------------
# DECISION (operator-locked): keep ONE required aggregate rollup context per
# repo (NOT granular per-validator branch-protection contexts, "Model A"), but
# make the rollup AIRTIGHT so it goes red if ANY spec-required validator
# sub-job fails. The audit
# (docs/audits/2026-06-24-validator-enforcement-deficiency-audit/) found that a
# repo can be "baseline-clean" (every validator wired as a pre-commit hook and
# present as a CI keyword) while the live required rollup does NOT actually gate
# several of those validators — they run in a workflow with no aggregator that
# is not in branch protection (e.g. omni-standards-compliance.yml), or behind
# continue-on-error, or matched only by an incidental keyword (e.g. "pydantic"
# matching `pip install pydantic`).
#
# This block is PER-REPO OPT-IN (pilot). Only repos listed under
# `model_b_rollup_enforcement.repos` are verified by the Model-B rollup-coverage
# verifier (validator_rollup_coverage.py). The legacy ValidatorRequirements
# consumer schema and behaviour are UNCHANGED, so the other 11 repos' handshake
# gate (`validate-validator-requirements`) keeps passing exactly as before.
# Fleet rollout to the remaining repos is OMN-13576.
#
# For each opted-in repo:
#   required_rollup_context  — the single branch-protection required check that
#                              is the airtight rollup (must be live-required and
#                              emitted by `rollup_workflow`).
#   rollup_workflow          — the workflow file (under .github/workflows/) that
#                              emits `required_rollup_context` as a job name.
#   rollup_job               — the job key in that workflow whose `name` equals
#                              `required_rollup_context`; the verifier walks its
#                              transitive `needs` graph.
#   validator_jobs           — maps each spec-required validator (that applies to
#                              this repo and has ci_workflow: required) to the
#                              job key(s) in `rollup_workflow` that run it. The
#                              verifier asserts the rollup transitively depends on
#                              at least one listed job for every such validator,
#                              and that none of those jobs carry
#                              continue-on-error: true (which would swallow a
#                              failure before it reaches the rollup).
model_b_rollup_enforcement:
  repos:
    omnibase_core:
      required_rollup_context: "CI Summary"
      rollup_workflow: "ci.yml"
      rollup_job: "ci-summary"
      validator_jobs:
        ruff-format-check: ["lint"]
        mypy-type-check: ["lint", "mypy-validation-scripts"]
        enum-governance: ["enum-governance"]
        arch-002-no-transport-imports: ["core-infra-boundary", "mypy-validation-scripts"]
        naming-conventions: ["naming-conventions"]
        pydantic-patterns: ["pydantic-patterns"]
        aislop-patterns: ["aislop-patterns"]
        doc-content-scan: ["doc-content-scan"]
        no-new-os-environ: ["no-new-os-environ"]
        spdx-headers: ["spdx-headers"]
      # Machine-checkable intentional omissions. These validators are
      # ci_workflow: required and apply to omnibase_core, but are currently
      # grandfathered in validator-requirements-baseline.yaml as
      # MISSING_CI_WORKFLOW gaps — wiring them as rollup-covered CI jobs is
      # deferred to their own per-validator tickets. The meta-check asserts
      # applicable_required_validators == validator_jobs.keys() ∪
      # grandfathered_validators, so a NEW ci_workflow: required validator that
      # starts applying to omnibase_core cannot silently escape Model B: it
      # must be added to validator_jobs (covered) or here (explicitly deferred).
      grandfathered_validators:
        # OMN-13576: spdx-headers graduated from grandfathered → validator_jobs.
        # The `spdx-headers` CI job in ci.yml runs the same validator the
        # pre-commit hook runs (full-tree, mirroring the hook's files:/exclude:
        # scope) and feeds quality-gate → ci-summary, so a missing/incorrect SPDX
        # header turns the single required CI Summary rollup red.
        - stub-implementations
        - single-class-per-file
        - bandit-security
        - no-hardcoded-topics
        - no-untracked-todos
        - hardcoded-local-paths
        - hardcoded-private-ip
        - hardcoded-localhost-url
        - detect-secrets


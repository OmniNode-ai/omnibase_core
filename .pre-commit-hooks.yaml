---
# Pre-commit hooks exported by omnibase_core.
# Consumers reference these via:
#
#   - repo: https://github.com/OmniNode-ai/omnibase_core
#     rev: <tag>
#     hooks:
#       - id: check-local-paths

- id: validate-string-versions
  name: ONEX String Version Anti-Pattern Detection
  description: >
    Detect hardcoded __version__ string literals in __init__.py files and string version anti-patterns
    in Python and YAML files. In __init__.py, use importlib.metadata.version("package-name") instead.
  language: system
  entry: validate-string-versions
  types_or: [python, yaml]
  pass_filenames: true
  stages: [pre-commit]

- id: check-local-paths
  name: Check for local path references
  description: >
    Detect machine-specific absolute paths that break portability when code or skills are distributed.
    Covers /Volumes/, /Users/, /home/, and Windows user paths. Add `# local-path-ok` to suppress a specific
    line.
  language: python
  entry: python -m omnibase_core.validation.validator_local_paths
  types: [text]
  pass_filenames: true
  stages: [pre-commit]

- id: check-duplicate-registry-ids
  name: Check for duplicate ids in config/registry YAML files
  description: >
    OMN-14401: reject config/registry YAML files declaring duplicate ids over a key that is not guaranteed
    unique (e.g. two routing_tiers.yaml model entries sharing an id with overlapping use_for, or two prod_promotion_grants.yaml
    entries sharing a grant_id). Checked registries are declared config-as-data in a manifest file (default
    .duplicate-id-registries.yaml at repo root); a repo with no manifest is a no-op. Consumers pass --manifest
    / --repo-root via args: and scope triggering via files: on the manifest + declared registry paths.
  language: python
  entry: python -m omnibase_core.validation.validator_duplicate_config_ids
  pass_filenames: false
  stages: [pre-commit]

- id: check-local-paths-compute
  name: Check for local path references (COMPUTE node over the bus)
  description: >
    Same machine-specific absolute-path check as check-local-paths, executed as a canonical COMPUTE node
    (omnibase_core.validation.local_paths.HandlerLocalPathsCompute) dispatched over the in-memory event
    bus — the two-transport seam (in-memory locally, Kafka in CI; same handler, only the backend changes).
    The scanning logic was generated by node_generation_consumer and accepted only because it reproduces
    the hand-authored ground truth across a deterministic corpus (OMN-13293, G1). Add `# local-path-ok`
    to suppress a specific line.
  language: python
  entry: python -m omnibase_core.validation.local_paths.runtime_local_paths
  types: [text]
  pass_filenames: true
  stages: [pre-commit]

- id: check-private-ip-compute
  name: Check for hardcoded private-IP literals (COMPUTE node over the bus)
  description: >
    Detect hardcoded RFC1918 private-IP literals (10/8, 172.16/12, 192.168/16) that break portability
    and leak environment config when code is distributed. Executed as a canonical COMPUTE node (omnibase_core.validation.private_ip.HandlerPrivateIpCompute)
    dispatched over the in-memory event bus — the same two-transport seam as check-local-paths-compute
    (in-memory locally, Kafka in CI; same handler, only the backend changes). The scanning logic was generated
    by node_generation_consumer and accepted only because it passed a deterministic acceptance corpus
    in the hardened sandbox (OMN-13294, G2; corpus seeded from node_aislop_sweep's RFC1918 ground truth).
    Add `# onex-allow-internal-ip` to suppress a specific line, or `# onex-allow-file-internal-ip` to
    suppress a documentation-heavy file whose subject IS IP literals.
  language: python
  entry: python -m omnibase_core.validation.private_ip.runtime_private_ip
  types: [text]
  pass_filenames: true
  stages: [pre-commit]

- id: check-no-faked-boundary
  name: Check for faked inference/routing/dispatch boundaries (COMPUTE node over the bus)
  description: >
    Ban hand-written fakes/stubs of the platform's OWN inference / routing / dispatch boundary — a Fake/Stub/Mock
    class subclassing an *InferenceAdapter / *Bridge / *Router / *RoutingResolver / *Registry / *Dispatch*
    protocol, a patch("httpx.Client")/patch("httpx.AsyncClient") around an inference call, a MagicMock/AsyncMock
    assigned to an inference/bridge/router/dispatch target, or an echo completion derived from the prompt
    (completion=prompt / completion=f"...{prompt}..."). These are exactly the "handler-isolation tests
    pass while live fails" fakes (feedback_real_dispatch_path_tests). Executed as a canonical COMPUTE
    node (omnibase_core.validation.no_faked_boundary.HandlerNoFakedBoundaryCompute) dispatched over the
    in-memory event bus — the same two-transport seam as check-private-ip-compute (in-memory locally,
    Kafka in CI; same handler, only the backend changes). The scanning logic was generated by node_generation_consumer
    and accepted only because it passed a deterministic acceptance corpus in the hardened sandbox (OMN-13497;
    corpus corpus_no_faked_boundary). A recorded-from-real replay adapter, a real RoutingResolvedJudgeInferenceAdapter,
    a real EventBusInmemory test, and a legit mock of a genuinely-external service (slack_sdk/boto3) stay
    clean. Add `# onex-allow-faked-boundary` to suppress an approved fixture line. Lands REPORT-ONLY (--report-only)
    during the OMN-13497 burn-down of the pre-existing boundary-fake population surfaced by the real shadow
    run; flip to blocking by dropping --report-only once findings reach zero.
  language: python
  entry: python -m omnibase_core.validation.no_faked_boundary.runtime_no_faked_boundary --report-only
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: check-todo-fixme-marker-compute
  name: Check for agent-left TODO/FIXME/HACK markers (COMPUTE node over the bus)
  description: >
    Detect agent-left unfinished-work markers (whole-word TODO / FIXME / HACK) that must not merge silently.
    Executed as a canonical COMPUTE node (omnibase_core.validation.todo_marker.HandlerTodoMarkerCompute)
    dispatched over the in-memory event bus — the same two-transport seam as check-private-ip-compute
    (in-memory locally, Kafka in CI; same handler, only the backend changes). The scanning logic was GENERATED
    by node_generation_consumer (omnimarket) against the live model and accepted ONLY because it passed
    a deterministic acceptance corpus (corpus_todo_marker.TODO_MARKER_CORPUS) in the hardened sandbox
    on the first attempt — the corpus verdict, not the LLM, is the acceptance authority (OMN-13480, G2;
    corpus seeded from node_aislop_sweep's _TODO_PATTERN ground truth). Add `# onex-allow-todo-marker`
    to suppress an approved, ticket-referenced note on a line, or `# onex-allow-file-todo-marker` to suppress
    a documentation-heavy file whose subject IS the marker token.
  language: python
  entry: python -m omnibase_core.validation.todo_marker.runtime_todo_marker
  types: [text]
  pass_filenames: true
  stages: [pre-commit]

- id: check-localhost-url-compute
  name: Check for hardcoded localhost/loopback URL literals (COMPUTE node over the bus)
  description: >
    Detect hardcoded http(s)://localhost / http(s)://127.0.0.1 URL literals that break portability and
    leak endpoint config when code is distributed (an endpoint that only resolves on the author's box,
    never in CI / containers / the .201 server). Executed as a canonical COMPUTE node (omnibase_core.validation.localhost_url.HandlerLocalhostUrlCompute)
    dispatched over the in-memory event bus — the same two-transport seam as check-private-ip-compute
    (in-memory locally, Kafka in CI; same handler, only the backend changes). The loopback-URL scanning
    logic was GENERATED by node_generation_consumer (omnimarket) against the live model and accepted only
    because it passed a deterministic acceptance corpus (corpus_hardcoded_localhost_url) in the hardened
    sandbox — the corpus verdict, not the LLM, is the acceptance authority (OMN-13480, residual of OMN-13294,
    G2). This is the COMPLEMENT of check-url-authority, whose public-https-literal rule deliberately EXCLUDES
    localhost/loopback and whose url-const-assignment rule only catches a loopback literal assigned to
    a *_URL/*_ENDPOINT constant. A real public host whose NAME merely contains "localhost" (e.g. localhost-mirror.example.com),
    the bare word "localhost" in prose, and a contract-sourced endpoint reference stay clean. Add `# onex-allow-internal-ip`
    to suppress a specific line, or `# onex-allow-file-internal-ip` to suppress a documentation-heavy
    file whose subject IS localhost URL literals.
  language: python
  entry: python -m omnibase_core.validation.localhost_url.runtime_localhost_url
  types: [text]
  pass_filenames: true
  stages: [pre-commit]

- id: check-stub-implementations
  name: ONEX Stub Implementation Detector
  description: >
    AST-based detection of stub implementations (pass, ellipsis, NotImplementedError). Exempts Protocol
    classes, ABC abstract methods, @overload, test files, and lines annotated with "# stub-ok: <reason>".
  language: script
  entry: scripts/validation/check_stub_implementations.py
  pass_filenames: true
  types: [python]
  exclude: ^(tests/|archived/|archive/|examples/prototypes/).*\.py$
  stages: [pre-commit]

- id: validator-banned-compose-vars
  name: ValidatorBannedComposeVars (kernel-sourced banned env vars in compose/k8s)
  description: >
    Flags any docker-compose or k8s manifest that exposes an env var whose NAME appears in the kernel's
    `_DEPRECATED_TOPIC_ENV_VARS` tuple (OMN-8784 canonical source). Direct OMN-8840 regression guard —
    ONEX_INPUT_TOPIC persisted in compose after code removal. Consumer repos MUST override `args:` to
    pass `--kernel-source` pointing at their vendored/checked-out service_kernel.py path.
  language: python
  entry: python -m omnibase_core.validation.validator_banned_compose_vars
  files: (docker-compose.*\.ya?ml|k8s/.*\.ya?ml|kubernetes/.*\.ya?ml)$
  pass_filenames: true
  require_serial: true
  stages: [pre-commit]

- id: handler-di-gate
  name: Handler DI Gate (OMN-10726)
  description: >
    AST-based gate that enforces handlers and nodes acquire all resources via DI container. Rejects __init__
    signatures with extra parameters beyond (self, container) and rejects direct infrastructure construction
    (EventBusInmemory(), sqlite3.connect(), etc.) inside __init__. Suppression: # handler-di-ok: <reason>
  language: python
  entry: python -m omnibase_core.validators.handler_di_gate
  types: [python]
  files: (handlers/handler_.*\.py|nodes/node\.py)$
  pass_filenames: true
  stages: [pre-commit]

- id: no-new-env-vars
  name: No New os.environ/os.getenv Additions (OMN-11186)
  description: >
    Block new os.environ[...], os.environ.get(...), and os.getenv(...) calls outside the established allowlist.
    All config must flow through contract YAML or Infisical. Exempts test files, scripts/, and lines annotated
    with `# env-var-ok`. Extend _BOOTSTRAP_ALLOWLIST in scripts/validation/validate_no_new_env_vars.py
    via PR review for structural bootstrap vars.
  language: python
  entry: python scripts/validation/validate_no_new_env_vars.py
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: no-new-os-environ
  name: No New os.environ/os.getenv Reads (OMN-13566)
  description: >
    Canonical AST-based gate: block ALL os.environ[KEY], os.environ.get(KEY), and os.getenv(KEY) reads
    outside the explicit KEEP_ALLOWLIST of structurally required bootstrap/path/CI vars. This is the canonical
    generalisation of check-env-reads.sh (OMN-11069/11186) deployed from omnibase_core as a pre-commit
    hook + REQUIRED CI status check on all repos. Exempts test files (tests/), scripts/, and lines annotated
    with `# env-read-ok: <reason>`. Extend KEEP_ALLOWLIST in omnibase_core.validators.no_new_os_environ
    via a CODEOWNERS-reviewed PR. Suppression: # env-read-ok: <reason>. DoD: OMN-13566.
  language: python
  entry: python -m omnibase_core.validators.no_new_os_environ
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: check-hardcoded-topics-v2
  name: Hardcoded ONEX Topic Strings (contract-driven)
  description: >
    Reject hardcoded onex.(cmd|evt|dlq).* topic strings and *_TOPIC env-var assignments outside approved
    constant files. Contract-driven with per-rule enable/disable and line-level suppression markers. Suppression:
    # onex-topic-sot, # onex-topic-test-fixture, # onex-topic-doc-example, # onex-topic-allow: <reason>
  language: python
  entry: python -m omnibase_core.validation.validator_hardcoded_topics
  types_or: [python, yaml, shell, dockerfile]
  pass_filenames: true
  require_serial: true
  stages: [pre-commit]

- id: validate-gitignore-baseline
  name: Gitignore Baseline Validator (OMN-12453)
  description: >
    Assert that every managed block declared in architecture-handshakes/gitignore-baseline.yaml appears
    VERBATIM in the target repo's .gitignore. Enforces universal block on all repos; python block on repos
    that contain pyproject.toml. Suppress all findings for a file with: # gitignore-ok: <reason>
  language: python
  entry: python -m omnibase_core.validators.gitignore_baseline
  pass_filenames: false
  stages: [pre-commit]

- id: check-receipt-honesty
  name: Receipt Honesty Gate (OMN-12791)
  description: >
    Scan ModelDodReceipt YAML files for gaming patterns: no-op echo probes marked PASS, deferral language
    (PENDING/TBD/TODO) in PASS receipts, self-attestation (verifier==runner), fake human verifiers (agent
    runner + human verifier name), and deploy-keyword evidence backed only by echo probe_command. Fails
    on any violation in supplied receipt files. Operates over onex_change_control/drift/dod_receipts/
    when no filenames are supplied; pass --receipts-dir to override.
  language: python
  entry: python -m omnibase_core.validation.validator_receipt_honesty
  types: [yaml]
  files: drift/dod_receipts/.*\.yaml$
  pass_filenames: true
  stages: [pre-commit]

- id: check-antipatterns
  name: KB Antipattern Checker (offline, non-semantic rules only)
  description: >
    Offline antipattern checker (OMN-11923). Loads the resolved antipattern registry (defaults + per-repo
    .onex/antipattern-overrides.yaml), filters to non-semantic rules (regex_line, regex_ast_docstring,
    grep_code), and validates staged Python files. No network calls. Outputs registry version and SHA-256
    hash for reproducibility. Suppression: per-entry suppression_annotation inline comment (e.g. # ai-slop-ok).
  language: python
  entry: python -m omnibase_core.validation.antipattern_checker
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: transport-mock-lint
  name: Transport Mock Lint (OMN-13026)
  description: >
    Detect bare AsyncMock()/MagicMock() without spec=/spec_set= on EventBus/transport/Kafka mock surfaces
    in test files. Reference incident: PR #1181 bare AsyncMock hid missing EventBusKafka.stop(), masking
    a runtime-fatal bug. Pass --baseline <yaml> to activate ratchet mode (new violations blocked; existing
    ones tracked per-site). Suppression: # transport-mock-ok: <reason> on the offending line.
  language: python
  entry: python -m omnibase_core.validators.transport_mock_lint
  types: [python]
  files: (^|/)test_.*\.py$
  pass_filenames: true
  stages: [pre-commit]

- id: check-github-token-env-reads
  name: GitHub-Token Env Read Ban (OMN-13310)
  description: >
    Fleet-wide ban on raw GitHub-token env reads: os.environ["GH_PAT"], os.environ.get("GH_PAT"), os.getenv("GH_PAT"),
    and equivalents for GH_TOKEN / GITHUB_TOKEN. The canonical replacement is contract_secret_ref + resolve_api_key
    (OMN-12856 / OMN-13310). Excludes tests/, conftest.py, __pycache__, .pyc files. Suppression: # omn-allow-env-read
    or # ONEX_EXCLUDE on the offending line. Implemented as a canonical COMPUTE handler on ProtocolMessageHandler.
  language: python
  entry: uv run python -m omnibase_core.validation.validator_github_token_env_reads
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: check-delegation-profile
  name: Delegation Runtime Profile Validator (OMN-13306)
  description: >
    Schema + semantic validation of delegation runtime profile YAML files. Rejects raw URLs/IPs in bifrost_endpoint_ref
    fields, max_tokens_hard_limit below max_tokens_default, and URL-form bootstrap_servers. Wired as pre-commit
    hook from previously-unwired validator_delegation_profile (OMN-13306 W6b). Pass filenames: true —
    pre-commit invokes per staged YAML file. Suppression: none; fix the profile to use symbolic refs and
    valid token limits. See: OMN-13306 (W6b).
  language: python
  entry: python -m omnibase_core.validation.delegation.validator_delegation_profile
  types: [yaml]
  files: (delegation.*runtime_profile|runtime_profile.*delegation)\.ya?ml$
  pass_filenames: true
  stages: [pre-commit]

- id: check-routing-authority
  name: Routing Authority Gate (OMN-13306)
  description: >
    Verifies that model-routing fields (provider, served_model_id, endpoint_ref, routing_source) resolve
    from contract/overlay/routing authority rather than env vars, hardcoded literals, or CLI shell-outs.
    Runs four audits: positive route-source proof, negative env-read/literal scan over demo-path sources,
    residue ratchet over known debt files, and provider-class endpoint URL shape audit over bifrost config.
    Ported from omnimarket check_routing_authority.py (OMN-12821/12877/12883) into a canonical COMPUTE
    handler. Suppression: # contract-config-ok for bootstrap-config-loader bootstrap env reads. See: OMN-13306
    (W6b).
  language: python
  entry: python -m omnibase_core.validation.validator_routing_authority
  pass_filenames: false
  stages: [pre-commit]

- id: check-url-authority
  name: URL Authority Gate (OMN-12818)
  description: >
    Ratchet gate: reject NEW URL/endpoint literals outside contracts (PR-2 of OMN-12803). Every URL and
    *_URL/*_ENDPOINT env read must resolve from a contract (routing authority / integration catalog).
    Existing violations are grandfathered by sha256 fingerprint; only NEW fingerprints fail the gate.
    Baseline is burn-down only — may shrink, never grow. Migration debt: OMN-12806 (omnibase_core), OMN-12807
    (omnibase_infra), OMN-12808 (others). Suppression: # url-authority-ok: <reason>
  language: python
  entry: python -m omnibase_core.validation.validator_url_authority
  args: [--repo, omnibase_core, --repo-root, .]
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: validate-validator-requirements
  name: Validator Requirements Fleet Gate (OMN-13291)
  description: >
    Enforce architecture-handshakes/validator-requirements.yaml for a downstream repo (OMN-9115). Reads
    the spec from the installed omnibase_core package and cross-references the target repo's .pre-commit-config.yaml
    + .github/workflows/*.yml. Exits non-zero and reports ALL missing gates (never fail-on-first) when
    any required validator is absent or wrapped in a silent-skip shim. Accepts a per-repo baseline YAML
    (structured schema_version/classification/gaps format, or legacy flat-list) for the ratchet pattern.
    Usage: add to your repo's .pre-commit-config.yaml referencing omnibase_core and pass --repo <your-repo-name>
    --baseline architecture-handshakes/validator-requirements-baseline.yaml. See OMN-13291 and architecture-handshakes/validator-requirements-baseline.yaml.
  language: python
  entry: python -m omnibase_core.validation.validator_requirements_consumer
  pass_filenames: false
  always_run: true
  stages: [pre-commit]

- id: check-doc-content-scan
  name: Doc-Content Scan Gate (OMN-13572)
  description: >
    Blocks local-environment traces (RFC1918 LAN IPs, .201/.200 host shorthand, personal /Users//home/
    paths, ssh user@host, personal e-mail) and Linear OMN-<digits> ticket references in DOCUMENTATION
    files (*.md / *.mdx / .rst / .txt / .adoc). The docs-facing union of CLAUDE.md Rule 6 and the knowledge-base
    sanitizer. Generated + corpus-accepted COMPUTE validator (OMN-13569) executed over the in-memory event
    bus (Kafka backend in CI). Exemptions (OMN-13572): onex_change_control/ paths are exempt from the
    OMN-<digits> rule only (local-env rules still apply); contracts/ excluded from the OMN rule; a SKILL.md
    `ticket: OMN-NNNN` frontmatter field is exempt. Suppress a line with `doc-content-ok`; suppress a
    doc whose subject IS these traces with `doc-content-file-ok`.
  language: python
  entry: python -m omnibase_core.validation.doc_content_scan.runtime_doc_content_scan
  types_or: [markdown, rst, text]
  pass_filenames: true
  stages: [pre-commit]

- id: backend-secret-discipline
  name: Backend Secret Discipline (OMN-13290)
  description: >
    Reject literal credentials (PEM private keys, service-account JSON, bearer tokens, sk-/AIza/ya29.
    keys) in committed config, and require a logical secret reference (secret_ref/api_key_ref/api_key_env
    for API-key auth, or credential_ref for ADC) on every authenticated cloud backend in a bifrost routing-authority
    config. ADC and api-key auth are mutually exclusive on one backend. Ported from omnimarket check_backend_secret_discipline
    (OMN-12971) to core for fleet wiring. Credential VALUES live in the secret store, never in routing-authority
    config. Suppression (test fixtures only): # backend-secret-ok: <reason> on the offending line.
  language: python
  entry: python -m omnibase_core.validators.backend_secret_discipline
  files: \.(ya?ml|json)$
  pass_filenames: true
  stages: [pre-commit]

- id: check-backend-secret-discipline
  name: Backend Secret-Ref Discipline Gate (OMN-13305)
  description: >
    Canonical COMPUTE hook for backend secret discipline. Rejects literal PEM, service-account JSON, bearer
    tokens, sk-/AIza/ya29-style keys in committed routing-authority config, and requires every authenticated
    cloud backend to declare a logical secret reference (secret_ref / api_key_ref / api_key_env / credential_ref).
    ADC and API-key auth are mutually exclusive per backend.
  language: python
  entry: python -m omnibase_core.validation.validator_backend_secret_discipline
  files: \.(ya?ml|json)$
  pass_filenames: true
  stages: [pre-commit]

- id: check-no-utcnow
  name: No datetime.utcnow() Usage (OMN-14656)
  description: >
    Reject datetime.utcnow() / datetime.datetime.utcnow() (any ast.Attribute with attr == "utcnow") —
    timezone-naive timestamps cause clock-skew bugs when compared against timezone-aware datetimes from
    Kafka or PostgreSQL. Ported from the CI gate at omniclaude/scripts/validation/validate_no_utcnow.py
    (OMN-2592 Task 11) into a canonical two-node split (OMN-14656, revives OMN-2362): the AST scan itself
    runs as a pure COMPUTE node (node_no_utcnow_check_compute) over explicit (path, source) pairs, and
    the paired EFFECT node (node_source_file_gather_effect) owns the filesystem walk for full-tree (no-filenames)
    invocation. Same node backs the pre-commit hook and any CI entrypoint — no separate implementation
    to drift. Replace flagged usage with datetime.now(tz=timezone.utc) or datetime.now(UTC). No suppression
    marker; timezone-naive timestamps are never acceptable.
  language: python
  entry: python -m omnibase_core.nodes.node_no_utcnow_check_compute.runtime_no_utcnow_check
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: check-enum-governance
  name: ONEX Enum Governance Validation (OMN-13287)
  description: >
    Enforce ONEX enum governance across Python source (canonical core validator omnibase_core.validation.checker_enum_governance,
    W10B consolidation). Rules: ENUM_001 enum members must be UPPER_SNAKE_CASE; ENUM_002 module-scope
    Literal type aliases carrying status/type vocabulary with 3+ values should be Enums; ENUM_003 duplicate
    string values shared across two or more Enum classes (cross-file). The validator discovers files under
    the positional target; consumer repos override the target via args: [<src-dir>]. Suppression: # enum-governance-ok:
    <reason>.
  language: python
  entry: python -m omnibase_core.validation.checker_enum_governance
  args: [src/]
  types: [python]
  pass_filenames: false
  stages: [pre-commit]

- id: check-no-backward-compat
  name: ONEX No Backward Compatibility Anti-Pattern Detection (OMN-13287)
  description: >
    Reject backward-compatibility anti-patterns (canonical core script scripts/validation/validate-no-backward-compatibility.py,
    W10B consolidation): @deprecated decorators, backward-compat comments/docstrings, _legacy/_compat/_backward
    re-export aliases, and Protocol* backward-compat conditions. Scans the directories passed via --dir
    (default src/); file-level architectural exemptions live in the script's ARCHITECTURAL_EXEMPTIONS.
    language: script runs the file from the checked-out hook repo (the script is not packaged in the wheel).
  language: script
  entry: scripts/validation/validate-no-backward-compatibility.py
  args: [--dir, src/]
  types: [python]
  pass_filenames: false
  stages: [pre-commit]

- id: check-canonical-inference
  name: Canonical Inference Gate (OMN-13219)
  description: >
    Ratchet gate: reject NEW non-canonical model-inference surfaces. Inference must go through the contract-driven
    routing authority (bus / inference-effect / Bifrost), never a shelled model CLI (codex/claude/gemini/opencode)
    and never a hardcoded/env-resolved model or provider (*_MODEL, *_MODEL_ID, *_PROVIDER env reads).
    Existing violations are grandfathered by sha256 fingerprint in src/omnibase_core/validation/baselines/canonical_inference_baseline.json;
    only NEW fingerprints fail the gate. Structural carve-out: a model-CLI shell-out is permitted iff
    the enclosing node contract.yaml declares descriptor.agent_invocation: true (OMN-13249 — a contract
    fact, never a free-text comment). Suppression: # canonical-inference-ok: <reason>
  language: python
  entry: python -m omnibase_core.validation.validator_canonical_inference
  args: [--repo, omnibase_core, --repo-root, .]

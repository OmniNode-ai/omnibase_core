- id: operation-match-requires-operation
  name: operation_match handler 'operation' field guard (OMN-13530)
  description: >
    Require a non-empty 'operation' field on every handler_routing.handlers[] entry whose routing_strategy
    is operation_match — or absent, which RuntimeLocal._validate_routing defaults into the same branch.
    A missing 'operation' makes the whole contract fail closed at runtime startup with 'handlers[i].operation
    is missing' / result=failed, which is exactly the 0.46.0 regression that took down the headless automation
    fleet (merge_sweep, ci_watch, auto_merge, build_loop, coderabbit_triage, create_ticket). This gate
    blocks that regression from re-landing. Scope: checks ONLY the operation field, not the nested handler
    block. Consumers reference this hook by id; it scans staged contract.yaml files (or src/ when none
    are supplied).
  language: python
  entry: python -m omnibase_core.validators.operation_match_requires_operation
  files: (^|/)contract\.yaml$
  pass_filenames: true
  stages: [pre-commit]

- id: dispatched-contract-operation
  name: dispatched contract handlers[0].operation guard (OMN-13324)
  description: >
    Require a non-empty 'operation' field on handlers[0] of every dispatched node contract — any contract.yaml
    that declares a non-empty handler_routing.handlers list. The dispatch-envelope unwrap (node_dod_verify
    test_dispatch_envelope_unwrap) resolves the primary handler's operation from handler_routing.handlers[0].operation;
    a missing value surfaces as 'handlers[0].operation is missing' and the dispatch never resolves an
    operation. Unlike operation-match-requires-operation (OMN-13530), this gate is strategy-agnostic:
    it asserts handlers[0].operation even for payload_type_match dispatch targets, because the unwrap
    reads it regardless of routing_strategy. Consumers reference this hook by id; it scans staged contract.yaml
    files (or src/ when none are supplied).
  language: python
  entry: python -m omnibase_core.validators.dispatched_contract_operation
  files: (^|/)contract\.yaml$
  pass_filenames: true
  stages: [pre-commit]

- id: check-fsm-handler-drift
  name: FSM YAML-vs-handler drift guard (OMN-13735)
  description: >
    Reconcile every reducer contract.yaml's state_machine.transitions (filtered by the fsm_handler_binding.state_filter
    for each declared FSM type) against the handler module's exported VALID_TRANSITIONS and GUARD_CONDITIONS
    Python symbols via AST literal evaluation — no import required. EXISTENCE (blocking): every contract
    transition MUST appear in VALID_TRANSITIONS with the correct to_state; any handler transition not
    in the contract is also a block; guard field/value mismatches block. Zero allowlist entries. Scans
    the repo root (cwd); pass_filenames is false so it re-reconciles whenever a contract.yaml or a handler
    .py changes.
  language: python
  entry: python -m omnibase_core.validators.fsm_handler_drift
  files: (^|/)(contract\.yaml|handlers/handler_.*\.py)$
  pass_filenames: false
  stages: [pre-commit]

- id: check-projection-exposure-drift
  name: Projection exposure-column drift (OMN-13663)
  description: >
    Reconcile every projection node contract.yaml's projection_api.exposures against the materialized
    columns of the table/view each exposure reads from (extracted from the node's migration DDL — CREATE
    TABLE / ALTER TABLE ADD COLUMN / CREATE [OR REPLACE] VIEW). EXISTENCE (blocking): every exposure column/json_columns
    entry MUST exist among the materialized columns; a phantom column makes the projection query fail
    at runtime. OMISSION (warn): a materialized identity/tier/cost column (cost_tier, tier, *_id, correlation_id,
    cost_*, savings_*, tokens_*) not surfaced by ANY exposure is the cost_tier_name class of bug (OMN-13649)
    — the column existed in DDL (migration 0018) but was dropped at the projection boundary; annotate
    intentional omissions in .projection-exposure-allowlist.yaml. Scans the repo root (cwd); pass_filenames
    is false so it re-reconciles whenever a contract.yaml or a migration .sql changes.
  language: python
  entry: python -m omnibase_core.validators.projection_exposure_drift
  files: (^|/)(contract\.yaml|migrations/.*\.sql)$
  pass_filenames: false
  stages: [pre-commit]

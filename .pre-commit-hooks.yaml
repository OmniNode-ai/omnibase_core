- id: no-plugin-daemon-classes
  name: Block Plugin* daemon/service/worker classes (OMN-13284)
  description: >
    Canonical Plugin* lifecycle guard (relocated from omnibase_infra, OMN-10123). AST-based: a class named
    Plugin* may only be a deterministic compute plugin (direct PluginComputeBase subclass). Any Plugin*
    class whose own name or a base name contains a lifecycle term (Daemon, Service, Worker, Runtime, Consumer,
    Publisher, Controller, Server, Client) owns a forbidden lifecycle — move it behind an ONEX node/handler/
    contract. Consumers reference this hook by id to enforce the canonical 3-primitives architecture (OMN-12525).
  language: python
  entry: python -m omnibase_core.validators.no_plugin_daemon_classes
  types: [python]
  pass_filenames: true
  stages: [pre-commit]

- id: pydantic-extra-forbid
  name: Pydantic extra="forbid" ratchet (OMN-14515)
  description: >
    Asserts the POSITIVE: every Pydantic model must resolve to an explicit extra="forbid" (inheriting
    it from a compliant base counts). ABSENCE IS A VIOLATION — Pydantic's default for an undeclared extra
    is "ignore", which SILENTLY DROPS unknown fields, so a model with no model_config at all is already
    broken; a validator that only greps for the literal string extra="ignore" is vacuous. Four confirmed
    live silent-data-loss bugs came from this exact shape (OMN-14490/14506/14513/14514). Resolution prefers
    real runtime introspection of cls.model_config (Pydantic merges config down the MRO itself), falling
    back to static AST for unimportable files. Ratchet, not allowlist: NEW models fail outright; --enforce-modified
    <ref|:staged> also fails a BASELINED model whose body the diff touched; --check-stale forces the baseline
    count down. The only suppression is an EXPIRING waiver keyed to an open ticket + PR — an expired waiver
    is a hard failure. Consumers pass their own baseline + scan root via args, e.g. args: [--check-stale,
    --baseline, .onex_ratchets/extra_forbid_baseline.yaml, --waivers, .onex_ratchets/extra_forbid_waivers.yaml,
    src/<pkg>] plus a files: filter to scope the trigger. NOTE: prefer wiring this with language: system
    + `uv run` in the consuming repo, so the validator runs in that repo's venv and can import its models
    for runtime introspection; under this isolated `language: python` env the consuming repo is not importable
    and the static AST fallback is used instead.
  language: python
  entry: python -m omnibase_core.validators.pydantic_extra_forbid
  types: [python]
  pass_filenames: false
  stages: [pre-commit]

- id: no-noncanonical-lifecycle-classes

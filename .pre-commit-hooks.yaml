---
# Pre-commit hooks exported by omnibase_core.
# Consumers reference these via:
#
#   - repo: https://github.com/OmniNode-ai/omnibase_core
#     rev: <tag>
#     hooks:
#       - id: check-local-paths

- id: validate-string-versions
  name: ONEX String Version Anti-Pattern Detection
  description: >
    Detect hardcoded __version__ string literals in __init__.py files and
    string version anti-patterns in Python and YAML files. In __init__.py,
    use importlib.metadata.version("package-name") instead.
  language: python
  entry: python scripts/validation/validate-string-versions.py
  types_or: [python, yaml]
  pass_filenames: true
  stages: [pre-commit]
  additional_dependencies: [pyyaml]

- id: check-local-paths
  name: Check for local path references
  description: >
    Detect machine-specific absolute paths (/Volumes/..., /Users/..., /home/..., C:\Users\...) that break
    portability when code or skills are distributed. Add `# local-path-ok` to suppress a specific line.
  language: python
  entry: python -m omnibase_core.validation.validator_local_paths
  types: [text]
  pass_filenames: true
  stages: [pre-commit]
